<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Pro (v2026.FINAL)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-panel { background: linear-gradient(145deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="antialiased min-h-screen selection:bg-indigo-500 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // Forzamos una nueva base de datos para borrar memorias viejas corrompidas
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('dispatcherDataVFinal_OK');
                return saved ? JSON.parse(saved) : { flights: [], apiSettings: { apiKey: '', model: 'gemini-2.5-flash' } };
            });

            const [flights, setFlights] = useState(data.flights || []);
            const [activeShift, setActiveShift] = useState('Turno Diurno');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'info', isSettings: false });
            
            const [isScanning, setIsScanning] = useState(false);
            const [forecastData, setForecastData] = useState({});
            const [flightItinerary, setFlightItinerary] = useState([]);
            const [audioUnlocked, setAudioUnlocked] = useState(false);

            const updateData = (newData) => {
                const merged = { ...data, ...newData };
                setData(merged);
                localStorage.setItem('dispatcherDataVFinal_OK', JSON.stringify(merged));
            };

            const unlockAudio = () => {
                const silentUtterance = new SpeechSynthesisUtterance('');
                silentUtterance.volume = 0;
                window.speechSynthesis.speak(silentUtterance);
                setAudioUnlocked(true);
            };

            const speak = (text) => {
                if ('speechSynthesis' in window && audioUnlocked) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'es-MX';
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now);
                    
                    const hour = now.getHours();
                    const isDayShift = hour >= 7 && hour < 19;
                    setActiveShift(isDayShift ? 'Turno Diurno' : 'Turno Nocturno');

                    if (now.getSeconds() === 0) {
                        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
                        
                        if (timeStr === "07:45") {
                            speak("Atención piloto. Es hora de aterrizar. Junta obligatoria en cinco minutos.");
                        }

                        const currentFlight = flightItinerary.find(f => f.time === timeStr);
                        if (currentFlight) {
                            speak(`Atención. Vuelo programado para las ${timeStr}. Tipo de vuelo: ${currentFlight.type}. Viento verificado.`);
                        }
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [flightItinerary, audioUnlocked]);

            const generateIntelligentSchedule = (currentForecast, currentFlights) => {
                let schedule = [];
                
                const toMins = (timeStr) => {
                    let [h, m] = timeStr.split(':').map(Number);
                    return h * 60 + m;
                };

                // AUDITORÍA DE CLIMA
                let dayBlocked = 0;
                for(let i=7; i<=18; i++) { if(currentForecast[i]?.windGust > 43) dayBlocked++; }
                
                let nightBlocked = 0;
                for(let i=19; i<=23; i++) { if(currentForecast[i]?.windGust > 43) nightBlocked++; }
                for(let i=0; i<=6; i++) { if(currentForecast[i]?.windGust > 43) nightBlocked++; }

                // REGLA DE COMPRESIÓN (Si se pierden 6h, comprimir a 50m)
                const daySpacing = dayBlocked >= 6 ? 50 : 80;
                const nightSpacing = nightBlocked >= 6 ? 50 : 80;

                const canAddFlight = (proposedTimeMins, requiredSpacing) => {
                    for (let f of schedule) {
                        let fMins = toMins(f.time);
                        let diff = Math.abs(fMins - proposedTimeMins);
                        if (diff > 12 * 60) diff = 24 * 60 - diff; // Medianoche
                        if (diff < requiredSpacing) return false; 
                    }
                    return true;
                };

                // VUELOS FORZOSOS
                schedule.push({ time: "08:20", type: "Forzoso (Post-Junta)", shift: "Turno Diurno", fixed: true });
                schedule.push({ time: "14:00", type: "Forzoso (Cambio)", shift: "Turno Diurno", fixed: true });
                schedule.push({ time: "17:00", type: "Forzoso", shift: "Turno Diurno", fixed: true });
                schedule.push({ time: "21:30", type: "Forzoso", shift: "Turno Nocturno", fixed: true });

                // RELLENAR DIURNOS (Meta: 7 vuelos totales)
                let dayAdded = 3; 
                for(let h=7; h<=18 && dayAdded < 7; h++) {
                    if(currentForecast[h]?.windGust > 43) continue; 
                    for(let m=0; m<=50 && dayAdded < 7; m+=10) {
                        if(h===7 && m>=40) continue; // Bloqueo junta
                        if(h===8 && m<20) continue;
                        
                        let mins = h * 60 + m;
                        if(canAddFlight(mins, daySpacing)) {
                            let timeStr = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                            schedule.push({ time: timeStr, type: dayBlocked >= 6 ? "Dinámico (Comp. 50m)" : "Dinámico", shift: "Turno Diurno", fixed: false });
                            dayAdded++;
                        }
                    }
                }

                // HERENCIA A LA NOCHE
                let inheritedToNight = 7 - dayAdded; 

                // NOCTURNOS Bloque 1 (19:00 - 23:59) Meta: 2 + heredados
                let eveningTarget = 2 + inheritedToNight; 
                let nightAdded1 = 1; // Ya llevamos el de las 21:30
                
                for(let h=19; h<=23 && nightAdded1 < eveningTarget; h++) {
                    if(currentForecast[h]?.windGust > 43) continue;
                    for(let m=0; m<=50 && nightAdded1 < eveningTarget; m+=10) {
                        let mins = h * 60 + m;
                        if(canAddFlight(mins, nightSpacing)) {
                            let timeStr = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                            schedule.push({ time: timeStr, type: nightBlocked >= 6 ? "Dinámico (Comp. 50m)" : "Dinámico", shift: "Turno Nocturno", fixed: false });
                            nightAdded1++;
                        }
                    }
                }

                // NOCTURNOS Bloque 2 (00:00 - 06:59) Meta: 4
                let nightAdded2 = 0;
                for(let h=0; h<=6 && nightAdded2 < 4; h++) {
                    if(currentForecast[h]?.windGust > 43) continue;
                    for(let m=0; m<=50 && nightAdded2 < 4; m+=10) {
                        let mins = h * 60 + m;
                        if(canAddFlight(mins, nightSpacing)) {
                            let timeStr = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                            schedule.push({ time: timeStr, type: nightBlocked >= 6 ? "Dinámico (Comp. 50m)" : "Dinámico", shift: "Turno Nocturno", fixed: false });
                            nightAdded2++;
                        }
                    }
                }

                // ORDENAR (Día Operativo 07:00 a 06:59)
                schedule.sort((a, b) => {
                    let ah = parseInt(a.time.split(':')[0]); let am = parseInt(a.time.split(':')[1]);
                    let bh = parseInt(b.time.split(':')[0]); let bm = parseInt(b.time.split(':')[1]);
                    if(ah < 7) ah += 24; 
                    if(bh < 7) bh += 24;
                    return (ah * 60 + am) - (bh * 60 + bm);
                });

                setFlightItinerary(schedule);
                speak("Análisis completado. Plan táctico de vuelo generado y organizado en pantalla.");
            };

            const analyzeImage = async (base64Image) => {
                if (!data.apiSettings.apiKey) {
                    setModal({ isOpen: true, title: "Falta API Key", message: "Configura tu API Key en el engranaje inferior.", type: "error" });
                    setIsScanning(false);
                    return;
                }

                // IA SOLO COMO LECTOR OCULAR
                const promptText = `
                    Extrae los datos de la tabla de clima de esta imagen.
                    Devuelve ÚNICAMENTE un arreglo JSON plano, sin formato markdown ni explicaciones.
                    Debe tener esta estructura exacta:
                    [
                      {"time": "16:00", "texto": "Vientos fuertes >30m"},
                      {"time": "20:00", "texto": "Ráfagas fuertes >80m, 14 120m"},
                      {"time": "22:00", "texto": "Apto para volar"}
                    ]
                    REGLAS:
                    1. Usa siempre formato de 24 horas (ej. 4:00pm es 16:00).
                    2. Copia el texto descriptivo del clima exactamente como aparece en la imagen. No inventes nada.
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${data.apiSettings.model}:generateContent?key=${data.apiSettings.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: promptText },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }
                                ]
                            }],
                            generationConfig: { response_mime_type: "application/json" }
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(JSON.stringify(errorData));
                    }

                    const responseData = await response.json();
                    const textResult = responseData.candidates[0].content.parts[0].text;
                    const cleanJson = textResult.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    let parsedData;
                    try {
                        parsedData = JSON.parse(cleanJson);
                    } catch(e) {
                        throw new Error("La IA no pudo formatear los datos. Asegúrate de tomar una buena captura de la tabla.");
                    }
                    
                    const forecastDict = {};
                    
                    // JAVASCRIPT HACE LAS MATEMÁTICAS EXACTAS (Para auditoría)
                    parsedData.forEach(item => {
                        if(!item.time || !item.texto) return;
                        
                        let hour = parseInt(item.time.split(':')[0]);
                        let statusText = item.texto.toLowerCase();
                        let windKm = 25; // Seguro por defecto
                        
                        if (statusText.includes("apto para volar")) {
                            windKm = 25;
                        } else {
                            // Buscar patrón como "14 120m"
                            const match = statusText.match(/(\d+)\s*(120m|90m|60m|30m|10m|m\b)/);
                            if (match) {
                                let metrosPorSegundo = parseInt(match[1]); // Extrae el "14"
                                windKm = Math.round(metrosPorSegundo * 3.6); // Multiplica por 3.6
                            } else {
                                windKm = 45; // Peligro si no hay número claro
                            }
                        }
                        
                        // isPermitted ahora incluye exactamente 43
                        forecastDict[hour] = { windGust: windKm, isPermitted: windKm <= 43 };
                    });
                    
                    setForecastData(forecastDict);
                    generateIntelligentSchedule(forecastDict, flights);
                    setModal({ isOpen: true, title: "Análisis Táctico Completado", message: "Clima extraído y convertido a km/h exitosamente.", type: "success" });
                } catch (error) {
                    setModal({ isOpen: true, title: "Error de Servidor", message: error.message, type: "error" });
                } finally {
                    setIsScanning(false);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsScanning(true);
                const reader = new FileReader();
                reader.onloadend = () => analyzeImage(reader.result);
                reader.readAsDataURL(file);
            };

            const handleLogFlight = () => {
                const flightTime = currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const currentHour = currentTime.getHours();
                const currentWind = forecastData[currentHour] ? forecastData[currentHour].windGust : 0;

                const newLog = {
                    id: Date.now(),
                    time: flightTime,
                    timestamp: currentTime.toISOString(),
                    shift: activeShift,
                    wind: currentWind
                };
                
                const updatedLogs = [newLog, ...flights].sort((a,b) => b.id - a.id);
                setFlights(updatedLogs);
                updateData({ flights: updatedLogs });
                
                speak(`Vuelo registrado exitosamente a las ${flightTime}.`);
                setModal({ isOpen: true, title: "¡Despegue Registrado!", message: `Vuelo de las ${flightTime} registrado.`, type: "success" });
            };

            const handleSaveSettings = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                updateData({ 
                    apiSettings: { 
                        apiKey: formData.get('apiKey'), 
                        model: formData.get('model') 
                    } 
                });
                setModal({ isOpen: false, title: '', message: '', type: 'info' });
            };

            const currentHourInt = currentTime.getHours();
            const currentWind = forecastData[currentHourInt] ? forecastData[currentHourInt].windGust : 0;
            const isDanger = currentWind > 43;
            const isWarning = currentWind === 43;
            const isMeetingTime = currentHourInt === 7 && currentTime.getMinutes() >= 45;
            
            // Cálculos del Día Operativo
            const getOperativeDayStart = () => {
                const d = new Date(currentTime);
                if (d.getHours() < 7) d.setDate(d.getDate() - 1);
                d.setHours(7, 0, 0, 0);
                return d;
            };
            const operativeStart = getOperativeDayStart();
            const todayFlightsTotal = flights.filter(f => new Date(f.timestamp) >= operativeStart);
            const needsScanUI = Object.keys(forecastData).length === 0;

            return (
                <div className="pb-24">
                    {/* TOP BAR */}
                    <div className="fixed top-0 w-full bg-[#020617]/90 backdrop-blur-md border-b border-slate-800 p-3 z-30 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.5)]">
                                <span className="text-white font-black">DP</span>
                            </div>
                            <div>
                                <h1 className="text-white font-bold text-sm leading-tight tracking-wide">DISPATCHER PRO</h1>
                                <p className="text-indigo-400 text-[10px] font-bold tracking-widest uppercase">v2026.FINAL | Híbrido</p>
                            </div>
                        </div>
                        {!audioUnlocked && (
                            <button onClick={unlockAudio} className="text-xs bg-amber-500/20 text-amber-500 border border-amber-500/50 px-3 py-1.5 rounded-full font-bold animate-pulse">
                                🔇 Activar Asistente de Voz
                            </button>
                        )}
                        {audioUnlocked && (
                            <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
                        )}
                    </div>

                    <div className="max-w-md mx-auto pt-20 px-4">
                        {/* ESTADO PRINCIPAL */}
                        <div className="glass p-5 rounded-3xl relative overflow-hidden flex justify-between items-center mb-6">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                            <div>
                                <p className="text-[10px] font-black tracking-widest text-indigo-400 uppercase mb-1">Turno en curso</p>
                                <h2 className="text-2xl font-black text-white">{activeShift}</h2>
                                <div className="mt-2 text-3xl font-mono font-bold text-white tracking-wider">
                                    {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                                </div>
                            </div>
                            
                            <input type="file" id="file-upload-input" accept="image/*" onChange={handleImageUpload} className="hidden" />
                            <button 
                                onClick={() => document.getElementById('file-upload-input').click()} 
                                disabled={isScanning}
                                className={`flex flex-col items-center justify-center p-3 rounded-2xl transition border ${isScanning ? 'bg-indigo-900/50 border-indigo-400 animate-pulse' : needsScanUI ? 'bg-rose-600 border-rose-400 shadow-[0_0_20px_rgba(225,29,72,0.4)] animate-pulse' : 'bg-indigo-600/20 border-indigo-500/30 hover:bg-indigo-600/40'}`}>
                                <span className="text-2xl mb-1">{isScanning ? '⏳' : '📸'}</span>
                                <span className={`text-[10px] font-black uppercase text-center ${needsScanUI || isScanning ? 'text-white' : 'text-indigo-300'}`}>
                                    {isScanning ? 'Analizando...' : needsScanUI ? 'URGE CLIMA' : 'Escanear OK to Fly'}
                                </span>
                            </button>
                        </div>

                        {/* PANEL DE ESTADO ACTUAL */}
                        <div className={`mb-6 p-4 rounded-3xl border ${isMeetingTime ? 'bg-amber-950/40 border-amber-500/50' : needsScanUI ? 'bg-slate-900 border-slate-800' : isDanger ? 'bg-rose-950/40 border-rose-500/50' : isWarning ? 'bg-orange-950/40 border-orange-500/50' : 'bg-emerald-950/40 border-emerald-500/50'}`}>
                            <div className="flex items-center gap-3">
                                <div className={`w-3 h-3 rounded-full animate-ping ${isMeetingTime ? 'bg-amber-500' : needsScanUI ? 'bg-slate-600' : isDanger ? 'bg-rose-500' : isWarning ? 'bg-orange-500' : 'bg-emerald-500'}`}></div>
                                <div>
                                    <p className="text-[10px] font-black text-slate-400 tracking-widest uppercase">ESTADO ACTUAL DEL VIENTO</p>
                                    <h3 className={`font-black text-sm uppercase ${isMeetingTime ? 'text-amber-500' : needsScanUI ? 'text-slate-500' : isDanger ? 'text-rose-500' : isWarning ? 'text-orange-500' : 'text-emerald-500'}`}>
                                        {isMeetingTime ? "BLOQUEO: JUNTA OBLIGATORIA" : needsScanUI ? "Esperando datos..." : isDanger ? `PELIGRO: BLOQUEADO (${currentWind} km/h)` : isWarning ? `OPERABLE CON PRECAUCIÓN (${currentWind} km/h)` : `OPERABLE (${currentWind} km/h)`}
                                    </h3>
                                </div>
                            </div>
                        </div>

                        {/* PROGRESO GLOBAL 13 VUELOS */}
                        <div className="glass rounded-3xl p-6 text-center border border-slate-800 mb-6 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-slate-800">
                                <div className="h-full bg-indigo-500 transition-all duration-500" style={{width: `${Math.min((todayFlightsTotal.length / 13) * 100, 100)}%`}}></div>
                            </div>
                            <p className="text-[10px] font-black tracking-widest text-slate-400 uppercase mb-2">Meta Operativa Global del Día</p>
                            <div className="flex items-end justify-center gap-2">
                                <span className="text-5xl font-black text-indigo-400">{todayFlightsTotal.length}</span>
                                <span className="text-2xl font-bold text-slate-600 mb-1">/ 13 Vuelos</span>
                            </div>
                            {todayFlightsTotal.length >= 13 && (
                                <p className="mt-2 text-xs font-bold text-emerald-400 uppercase bg-emerald-950/50 inline-block px-3 py-1 rounded-full border border-emerald-900/50">¡Objetivo Global Cumplido!</p>
                            )}
                        </div>

                        {}
                        {/* PLAN MAESTRO GENERADO */}
                        {flightItinerary.length > 0 && (
                            <div className="glass rounded-3xl p-4 border border-slate-800 mb-6">
                                <h3 className="text-[11px] font-black tracking-widest text-indigo-400 uppercase mb-3 flex items-center justify-between">
                                    <span>🤖 Plan Maestro (24h)</span>
                                    <span className="bg-indigo-600 text-white px-2 py-0.5 rounded-full text-[10px]">{flightItinerary.length} Vuelos calculados</span>
                                </h3>
                                <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                                    {flightItinerary.map((f, i) => {
                                        const [h] = f.time.split(':').map(Number);
                                        const wInfo = forecastData[h];
                                        const windDanger = wInfo && wInfo.windGust > 43;
                                        const windWarning = wInfo && wInfo.windGust === 43;

                                        return (
                                            <div key={i} className={`flex flex-col p-2.5 rounded-xl border ${windDanger ? 'bg-rose-950/20 border-rose-900/50 opacity-50' : windWarning ? 'bg-orange-950/20 border-orange-900/50' : f.fixed ? 'bg-indigo-900/20 border-indigo-500/30' : 'bg-slate-800/40 border-slate-700/50'}`}>
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-white font-bold text-sm">{f.time} <span className="text-xs text-slate-400 font-normal ml-1">({f.shift})</span></span>
                                                    <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border ${f.fixed ? 'bg-indigo-600/20 text-indigo-300 border-indigo-500/50' : 'bg-slate-700 text-slate-300 border-slate-600'}`}>
                                                        {f.type}
                                                    </span>
                                                </div>
                                                {wInfo && (
                                                    <div className="text-[10px] flex items-center gap-1">
                                                        <span className={windDanger ? 'text-rose-400' : windWarning ? 'text-orange-400' : 'text-emerald-400'}>
                                                            {windDanger ? '❌ Bloqueado' : windWarning ? '⚠️ Precaución' : '✅ Libre'}
                                                        </span>
                                                        <span className="text-slate-500">({wInfo.windGust} km/h estim.)</span>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* BITÁCORA */}
                        <div className="glass rounded-3xl p-4 border border-slate-800 mb-6">
                            <h3 className="text-[11px] font-black tracking-widest text-slate-400 uppercase mb-3">✅ Últimos Registros</h3>
                            <div className="space-y-2">
                                {flights.slice(0, 5).map((f, i) => (
                                    <div key={i} className="flex justify-between items-center p-2.5 rounded-xl bg-slate-800/40 border border-slate-700/50">
                                        <div>
                                            <span className="text-white font-bold text-sm block">Despegue {f.time}</span>
                                            <span className="text-[9px] text-slate-400 uppercase">{f.shift}</span>
                                        </div>
                                        <span className={`text-xs font-bold px-2 py-1 rounded-md border ${f.wind > 43 ? 'text-rose-400 bg-rose-950/50 border-rose-900/50' : f.wind === 43 ? 'text-orange-400 bg-orange-950/50 border-orange-900/50' : 'text-emerald-400 bg-emerald-950/50 border-emerald-900/50'}`}>{f.wind} km/h</span>
                                    </div>
                                ))}
                                {flights.length === 0 && <div className="text-center py-4 text-xs text-slate-500">No hay vuelos registrados aún.</div>}
                            </div>
                        </div>

                        {/* SETTINGS BUTTON */}
                        <div className="flex justify-center pb-8">
                            <button onClick={() => setModal({ isOpen: true, title: "Configuración del Sistema", isSettings: true })} className="text-xs text-slate-500 hover:text-white flex items-center gap-1 transition">
                                ⚙️ Configurar API Key y Motor IA
                            </button>
                        </div>
                    </div>

                    {/* BOTÓN FLOTANTE REGISTRAR */}
                    <div className="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent flex justify-center z-40 pointer-events-none">
                        <button 
                            onClick={handleLogFlight}
                            disabled={isDanger || isMeetingTime}
                            className={`pointer-events-auto w-full max-w-sm py-4 rounded-2xl font-black text-lg tracking-widest uppercase transition-all shadow-2xl flex items-center justify-center gap-3 ${isMeetingTime ? 'bg-slate-800 text-slate-500 cursor-not-allowed opacity-50' : isDanger ? 'bg-rose-900/80 text-rose-300 cursor-not-allowed' : isWarning ? 'bg-orange-500 hover:bg-orange-400 text-white shadow-[0_0_30px_rgba(249,115,22,0.3)]' : 'bg-emerald-500 hover:bg-emerald-400 text-white shadow-[0_0_30px_rgba(16,185,129,0.3)]'}`}>
                            {isMeetingTime ? 'BLOQUEO (JUNTA)' : isDanger ? 'BLOQUEO (CLIMA)' : '🚀 REGISTRAR DESPEGUE'}
                        </button>
                    </div>

                    {/* MODALES */}
                    {modal.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="glass-panel w-full max-w-sm rounded-3xl overflow-hidden border border-slate-700 p-6 animate-in fade-in zoom-in duration-200">
                                <h3 className="text-xl font-black text-white mb-2">{modal.title}</h3>
                                
                                {modal.isSettings ? (
                                    <form onSubmit={handleSaveSettings} className="space-y-4 mt-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Google API Key (AQ. o AIza.)</label>
                                            <input type="password" name="apiKey" defaultValue={data.apiSettings.apiKey} required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 font-mono text-sm" placeholder="Pega tu llave aquí..." />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Motor Táctico de IA</label>
                                            <select name="model" defaultValue={data.apiSettings.model} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 text-sm">
                                                <option value="gemini-2.5-flash">Gemini 2.5 Flash (Más Seguro/Estable)</option>
                                                <option value="gemini-2.5-pro">Gemini 2.5 Pro (Avanzado)</option>
                                            </select>
                                        </div>
                                        <div className="flex gap-3 mt-6">
                                            <button type="button" onClick={() => setModal({ isOpen: false })} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700 transition">Cancelar</button>
                                            <button type="submit" className="flex-1 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-500 transition shadow-[0_0_15px_rgba(79,70,229,0.4)]">Guardar y Limpiar</button>
                                        </div>
                                    </form>
                                ) : (
                                    <div className="max-h-60 overflow-y-auto pr-2">
                                        <p className="text-slate-300 text-sm whitespace-pre-wrap">{modal.message}</p>
                                        <button onClick={() => setModal({ isOpen: false })} className="w-full mt-6 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 transition">Entendido</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
