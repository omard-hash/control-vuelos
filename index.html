<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dispatcher Pro V29</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overscroll-behavior-y: none; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-animate { animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="antialiased min-h-screen pb-24">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const toOpMins = (h, m) => {
            let adjH = h < 7 ? h + 24 : h;
            return adjH * 60 + m;
        };

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [forecastData, setForecastData] = useState({});
            const [flights, setFlights] = useState([]);
            const [isRaining, setIsRaining] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [audioUnlocked, setAudioUnlocked] = useState(false);
            
            const [cloudConfig, setCloudConfig] = useState({
                geminiKey: localStorage.getItem('dispatcher_gemini_key') || '',
                firebaseJson: localStorage.getItem('dispatcher_firebase_json') || ''
            });

            const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'info' });
            const [settingsOpen, setSettingsOpen] = useState(false);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const unlockAudio = () => {
                if (!audioUnlocked) {
                    try {
                        const silent = new Audio("data:audio/mp3;base64,//MkxAAQAAAAQQQQAAAAQAAAAAAAQAAAAAAAQQQQAAAAQAAAAAAAQAAAAAAAQQQQAAAAQAAAAAAAQAAAAAAAQQQQAAAAQAAAAAAAQAAAAAAAAAAAAA");
                        silent.play().catch(() => {});
                        if ('speechSynthesis' in window) {
                            const u = new SpeechSynthesisUtterance('');
                            u.volume = 0; 
                            window.speechSynthesis.speak(u);
                        }
                        setAudioUnlocked(true);
                    } catch(e) {}
                }
            };

            const speak = (text) => {
                if (!audioUnlocked || !('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-MX';
                utterance.rate = 1.0;
                utterance.volume = 1.0;
                window.speechSynthesis.speak(utterance);
            };

            const generateIntelligentSchedule = (forecast, completedFlights, raining) => {
                let schedule = [];
                const forzosos = [
                    { h: 8, m: 20 }, { h: 14, m: 0 }, { h: 17, m: 0 }, { h: 21, m: 30 }, { h: 6, m: 0 }
                ];

                forzosos.forEach(fz => {
                    let speed = forecast[fz.h.toString()] || 0;
                    schedule.push({
                        time: `${fz.h.toString().padStart(2, '0')}:${fz.m.toString().padStart(2, '0')}`,
                        type: 'FORZOSO',
                        wind: speed,
                        isPermitted: !raining && speed <= 43,
                        slotMins: toOpMins(fz.h, fz.m)
                    });
                });

                const currentH = currentTime.getHours();
                const currentM = currentTime.getMinutes();
                const nowMins = toOpMins(currentH, currentM);

                const todayStr = new Date().toLocaleDateString();
                const todayFlightsTotal = completedFlights.filter(f => new Date(f.timestamp).toLocaleDateString() === todayStr);
                const remainingTotal = 13 - todayFlightsTotal.length;
                const futureForzososCount = schedule.filter(s => s.slotMins > nowMins).length;
                let neededDynamics = remainingTotal - futureForzososCount;

                if (neededDynamics > 0) {
                    let possibleSlots = [];
                    for (let h = 0; h < 24; h++) {
                        if (h === 6) continue; // Regla estricta 6 AM
                        
                        let speed = forecast[h.toString()] || 0;
                        if (speed > 43 || raining) continue; 

                        for (let m = 0; m <= 50; m += 10) {
                            if (h === 8 && m === 20) continue;
                            if (h === 14 && m === 0) continue;
                            if (h === 17 && m === 0) continue;
                            if (h === 21 && m === 30) continue;

                            let slotMins = toOpMins(h, m);
                            let limitMins = toOpMins(6, 0); 
                            
                            if (currentH >= 6) { limitMins += 24 * 60; }

                            if (slotMins > nowMins + 10 && slotMins < limitMins) {
                                possibleSlots.push({ h, m, slotMins, wind: speed });
                            }
                        }
                    }

                    // Espaciado uniforme para no amontonar vuelos
                    if (possibleSlots.length > 0) {
                        let step = Math.max(1, Math.floor(possibleSlots.length / neededDynamics));
                        
                        let assigned = 0;
                        for (let i = 0; i < possibleSlots.length && assigned < neededDynamics; i += step) {
                            let slot = possibleSlots[i];
                            schedule.push({
                                time: `${slot.h.toString().padStart(2, '0')}:${slot.m.toString().padStart(2, '0')}`,
                                type: 'DINÁMICO',
                                wind: slot.wind,
                                isPermitted: true,
                                slotMins: slot.slotMins
                            });
                            assigned++;
                        }
                    }
                }

                schedule.sort((a, b) => a.slotMins - b.slotMins);
                return schedule.filter(s => s.slotMins >= nowMins);
            };

            const dynamicSchedule = generateIntelligentSchedule(forecastData, flights, isRaining);

            useEffect(() => {
                if (!audioUnlocked || currentTime.getSeconds() !== 0) return;
                const currentH = currentTime.getHours();
                const currentM = currentTime.getMinutes();
                const nowMins = toOpMins(currentH, currentM);

                if (!forecastData.hasOwnProperty(currentH.toString()) && currentM % 5 === 0) {
                    speak("Alerta. Clima desactualizado. Por favor, suba una nueva captura de inmediato.");
                }

                const upcomingFlight = dynamicSchedule.find(f => f.slotMins - nowMins === 10);
                if (upcomingFlight && upcomingFlight.isPermitted) {
                    speak(`Atención pilotos. Próximo despegue programado en exactamente 10 minutos.`);
                }
            }, [currentTime, audioUnlocked, forecastData, dynamicSchedule]);

            const analyzeImage = async (base64Image) => {
                if (!cloudConfig.geminiKey) {
                    setModal({ isOpen: true, title: "Sin Llave", message: "Ve a los ajustes (⚙️) y pega tu Gemini API Key.", type: "error" });
                    return;
                }

                setIsScanning(true);
                try {
                    const promptText = `Eres un despachador de vuelos automatizado. Lee esta tabla de clima.
EXTRAE LA VELOCIDAD MÁXIMA DEL VIENTO POR CADA HORA.
REGLAS ESTRICTAS Y ABSOLUTAS:
1. Revisa la tabla FILA POR FILA.
2. Si en la fila "AHORA" (o cualquier hora) dice "Apto para volar" o "Calma", el viento es 0 (CERO). ¡Pon 0!
3. NO te asustes ni bloquees la hora actual solo porque hay ráfagas pronosticadas para horas de la tarde. ¡Respeta lo que dice la hora actual!
4. Si a las 2:00pm o más tarde dice "Ráfagas fuertes" o "Vientos >40m", extrae el número (ej. 45) SOLO para esa hora específica.
5. Devuelve ÚNICAMENTE un objeto JSON con este formato exacto: {"0": 15, "1": 0, "2": 45, "14": 0} (claves en 24h, valores en km/h). NUNCA devuelvas texto fuera del JSON.`;

                    const payload = {
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }
                            ]
                        }]
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.6-flash:generateContent?key=${cloudConfig.geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || "Error al conectar con Google IA");
                    }

                    const data = await response.json();
                    let responseText = data.candidates[0].content.parts[0].text;
                    responseText = responseText.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    const parsedData = JSON.parse(responseText);
                    setForecastData(parsedData);
                    
                    speak("Análisis de clima completado. Itinerario actualizado y libre de errores.");
                    setModal({ isOpen: true, title: "Análisis Exitoso", message: "El clima ha sido procesado correctamente.", type: "success" });

                } catch (error) {
                    setModal({ isOpen: true, title: "Error de IA", message: error.message, type: "error" });
                } finally {
                    setIsScanning(false);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => analyzeImage(event.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const currentHStr = currentTime.getHours().toString();
            const currentWind = forecastData[currentHStr] !== undefined ? forecastData[currentHStr] : null;
            const needsScanUI = currentWind === null;
            const isBlocked = isRaining || (currentWind !== null && currentWind > 43);
            const activeShift = (currentTime.getHours() >= 7 && currentTime.getHours() < 19) ? 'Turno Diurno' : 'Turno Nocturno';
            const todayStr = new Date().toLocaleDateString();
            const todayFlightsTotal = flights.filter(f => new Date(f.timestamp).toLocaleDateString() === todayStr);

            return (
                <div className="w-full max-w-md mx-auto p-4 flex flex-col h-full relative" onClick={unlockAudio}>
                    
                    <div className="flex justify-between items-center mb-6 pt-4">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center font-black text-xl shadow-lg">DP</div>
                            <div className="leading-tight">
                                <h1 className="font-black text-lg tracking-wide uppercase">Dispatcher Pro</h1>
                                <p className="text-[10px] text-emerald-400 font-bold uppercase tracking-wider flex items-center gap-1">
                                    V29 FINAL <span className="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span> {cloudConfig.geminiKey ? 'Nube Activa' : 'Sin Configurar'}
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsRaining(!isRaining)} className={`px-4 py-2 rounded-xl text-xs font-bold transition-colors shadow-lg ${isRaining ? 'bg-blue-600 text-white shadow-blue-500/50' : 'bg-slate-800 text-slate-400 border border-slate-700'}`}>
                                🌧️ LLUVIA
                            </button>
                            <button onClick={() => setSettingsOpen(true)} className="p-2.5 rounded-xl bg-slate-800 text-slate-400 border border-slate-700 hover:text-white">
                                ⚙️
                            </button>
                        </div>
                    </div>

                    {!audioUnlocked && (
                        <div className="mb-4 bg-amber-500/10 border border-amber-500/50 text-amber-500 text-xs font-bold p-3 rounded-xl text-center animate-pulse shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                            🔇 Toca cualquier parte de la pantalla para activar el audio de Alertas
                        </div>
                    )}

                    <div className="glass p-5 rounded-3xl relative overflow-hidden flex justify-between items-center mb-4">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                        <div>
                            <p className="text-[10px] font-black tracking-widest text-indigo-400 uppercase mb-1">Turno en curso</p>
                            <h2 className="text-2xl font-black text-white">{activeShift}</h2>
                            <div className="mt-2 text-3xl font-mono font-bold text-white tracking-wider">
                                {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                            </div>
                        </div>
                        <input type="file" id="file-upload-input" accept="image/*" onChange={handleImageUpload} className="hidden" />
                        <button 
                            onClick={() => document.getElementById('file-upload-input').click()} 
                            disabled={isScanning}
                            className={`flex flex-col items-center justify-center p-3 rounded-2xl transition border ${isScanning ? 'bg-indigo-900/50 border-indigo-400 animate-pulse' : needsScanUI ? 'bg-rose-600 border-rose-400 shadow-[0_0_20px_rgba(225,29,72,0.4)] animate-pulse' : 'bg-indigo-600/20 border-indigo-500/30 hover:bg-indigo-600/40'}`}>
                            <span className="text-2xl mb-1">{isScanning ? '⏳' : '📸'}</span>
                            <span className={`text-[10px] font-black uppercase text-center ${needsScanUI || isScanning ? 'text-white' : 'text-indigo-300'}`}>
                                {isScanning ? 'Analizando...' : needsScanUI ? 'ESCANEAR' : 'ESCANEAR'}
                            </span>
                        </button>
                    </div>

                    <div className={`p-4 rounded-2xl border flex items-center gap-3 mb-6 shadow-lg transition-colors ${needsScanUI ? 'bg-slate-900 border-slate-800' : isBlocked ? 'bg-rose-950/50 border-rose-900 text-rose-500 shadow-rose-900/20' : 'bg-emerald-950/30 border-emerald-900/50 text-emerald-400 shadow-emerald-900/10'}`}>
                        <div className={`w-3 h-3 rounded-full shadow-[0_0_10px] ${needsScanUI ? 'bg-slate-500 shadow-slate-500' : isBlocked ? 'bg-rose-500 shadow-rose-500 animate-pulse' : 'bg-emerald-400 shadow-emerald-400'}`}></div>
                        <div>
                            <p className="text-[9px] font-black tracking-widest uppercase opacity-70">Estado del Viento</p>
                            <p className="text-sm font-bold mt-0.5">
                                {needsScanUI ? 'SIN DATOS PARA ESTA HORA' : isBlocked ? `PELIGRO: BLOQUEADO (${currentWind} km/h)` : `OPERABLE (${currentWind} km/h)`}
                                {isRaining && ' + LLUVIA'}
                            </p>
                        </div>
                    </div>

                    <div className="glass rounded-3xl p-5 mb-6">
                        <div className="flex justify-between items-end mb-4">
                            <div>
                                <p className="text-[10px] font-black tracking-widest text-slate-400 uppercase mb-1">Meta de hoy</p>
                                <div className="text-5xl font-black text-indigo-400 leading-none">
                                    {todayFlightsTotal.length} <span className="text-2xl text-slate-600">/ 13</span>
                                </div>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-slate-900/80 rounded-2xl p-3 border border-slate-800 flex flex-col items-center">
                                <span className="text-[10px] font-bold text-amber-500 uppercase mb-1 flex items-center gap-1">☀️ Diurno</span>
                                <span className="text-2xl font-black text-white">{todayFlightsTotal.filter(f=>f.shift==='Turno Diurno').length}</span>
                            </div>
                            <div className="bg-slate-900/80 rounded-2xl p-3 border border-slate-800 flex flex-col items-center">
                                <span className="text-[10px] font-bold text-blue-400 uppercase mb-1 flex items-center gap-1">🌙 Nocturno</span>
                                <span className="text-2xl font-black text-white">{todayFlightsTotal.filter(f=>f.shift==='Turno Nocturno').length}</span>
                            </div>
                        </div>
                    </div>

                    <div className="glass rounded-3xl p-4 border border-slate-800 mb-24">
                        <h3 className="text-[11px] font-black tracking-widest text-slate-400 uppercase mb-4 flex items-center gap-2">
                            <span>🤖 Plan Restante (Calculado)</span>
                        </h3>
                        <div className="space-y-3">
                            {dynamicSchedule.length === 0 ? (
                                <div className="text-center py-6 text-sm text-slate-500 bg-slate-900/50 rounded-2xl">Misión completada o bloqueada por clima.</div>
                            ) : (
                                dynamicSchedule.map((p, i) => (
                                    <div key={i} className="flex justify-between items-center p-3 rounded-2xl bg-slate-800/30 border border-slate-700/50 relative overflow-hidden">
                                        {!p.isPermitted && <div className="absolute inset-0 bg-rose-950/20"></div>}
                                        <div className="relative z-10">
                                            <span className={`text-xl font-black ${!p.isPermitted ? 'text-rose-500/50 line-through' : 'text-white'}`}>{p.time}</span>
                                            <div className="flex items-center gap-2 mt-1">
                                                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${!p.isPermitted ? 'bg-rose-950 text-rose-500' : 'bg-emerald-950 text-emerald-400'}`}>
                                                    {!p.isPermitted ? 'Bloqueado' : 'Libre'} ({p.wind} km/h)
                                                </span>
                                            </div>
                                        </div>
                                        <span className={`relative z-10 text-[9px] font-black px-2 py-1 rounded-md uppercase border ${p.type === 'FORZOSO' ? 'bg-indigo-900/50 text-indigo-400 border-indigo-500/30' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>
                                            {p.type}
                                        </span>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    <div className="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent flex justify-center z-40">
                        <button 
                            onClick={() => {
                                const newFlight = {
                                    id: Date.now(),
                                    time: currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                                    timestamp: currentTime.toISOString(),
                                    shift: activeShift,
                                    wind: currentWind || 0
                                };
                                setFlights([newFlight, ...flights]);
                                speak("Despegue registrado.");
                                setModal({isOpen: true, title: "Despegue Registrado", message: "Vuelo guardado correctamente.", type: "success"});
                            }}
                            disabled={needsScanUI || isBlocked}
                            className={`w-full max-w-md h-16 rounded-2xl font-black text-lg tracking-widest uppercase transition-all shadow-2xl ${needsScanUI || isBlocked ? 'bg-rose-950 text-rose-500 border border-rose-900' : 'bg-emerald-500 text-emerald-950 hover:bg-emerald-400 shadow-[0_0_30px_rgba(16,185,129,0.3)]'}`}>
                            {needsScanUI ? 'Falta Clima' : isBlocked ? 'Bloqueo Activo' : 'Registrar Despegue'}
                        </button>
                    </div>

                    {modal.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                            <div className="glass modal-animate w-full max-w-sm rounded-3xl p-6 border border-slate-700 shadow-2xl relative overflow-hidden">
                                <div className={`absolute top-0 left-0 w-full h-1 ${modal.type === 'error' ? 'bg-rose-500' : modal.type === 'success' ? 'bg-emerald-500' : 'bg-indigo-500'}`}></div>
                                <h3 className="text-xl font-black text-white mb-2">{modal.title}</h3>
                                <p className="text-slate-300 text-sm mb-6">{modal.message}</p>
                                <button onClick={() => setModal({...modal, isOpen: false})} className="w-full py-3 rounded-xl bg-slate-800 text-white font-bold border border-slate-700 hover:bg-slate-700">Cerrar</button>
                            </div>
                        </div>
                    )}

                    {settingsOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                            <div className="glass modal-animate w-full max-w-sm rounded-3xl p-6 border border-slate-700 shadow-2xl">
                                <h3 className="text-xl font-black text-white mb-4">Configuración Nube (V29)</h3>
                                
                                <div className="mb-4">
                                    <label className="text-xs font-bold text-emerald-400 mb-1 block">1. Gemini API Key</label>
                                    <input 
                                        type="password"
                                        value={cloudConfig.geminiKey}
                                        onChange={(e) => setCloudConfig({...cloudConfig, geminiKey: e.target.value})}
                                        className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:border-indigo-500 outline-none"
                                        placeholder="Pegar llave aquí..."
                                    />
                                </div>

                                <div className="mb-6">
                                    <label className="text-xs font-bold text-amber-400 mb-1 block">2. Firebase Config (Opcional)</label>
                                    <textarea 
                                        value={cloudConfig.firebaseJson}
                                        onChange={(e) => setCloudConfig({...cloudConfig, firebaseJson: e.target.value})}
                                        className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-slate-400 h-24 outline-none font-mono opacity-50"
                                        placeholder='{"apiKey": "..."}'
                                    />
                                </div>

                                <button onClick={() => {
                                    localStorage.setItem('dispatcher_gemini_key', cloudConfig.geminiKey);
                                    localStorage.setItem('dispatcher_firebase_json', cloudConfig.firebaseJson);
                                    window.location.reload();
                                }} className="w-full py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-500 mb-2">Guardar y Reiniciar</button>
                                
                                <button onClick={() => setSettingsOpen(false)} className="w-full py-3 rounded-xl bg-slate-800 text-slate-400 font-bold hover:bg-slate-700 hover:text-white">Cancelar</button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
