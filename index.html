<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dispatcher Pro (v2026.G3_CLOUD_V12)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-panel { background: linear-gradient(145deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .rain-glass { background: rgba(100, 0, 0, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 0, 0, 0.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="antialiased min-h-screen selection:bg-indigo-500 selection:text-white">

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDXjwv133-dIKyprCktTUkjx_adAz1DhAY",
            authDomain: "control-vuelos.firebaseapp.com",
            projectId: "control-vuelos",
            storageBucket: "control-vuelos.firebasestorage.app",
            messagingSenderId: "756032981781",
            appId: "1:756032981781:web:451641e72abe3692c0771c"
        };

        const app = initializeApp(firebaseConfig);
        
        window.firebaseDb = getFirestore(app);
        window.firebaseAuth = getAuth(app);
        window.firebaseDoc = doc;
        window.firebaseSetDoc = setDoc;
        window.firebaseOnSnapshot = onSnapshot;
        window.firebaseSignInAnonymously = signInAnonymously;
        
        window.dispatchEvent(new Event('firebase-modules-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const App = () => {
            const [localSettings, setLocalSettings] = useState(() => {
                const saved = localStorage.getItem('dispatcherSettings_v2026');
                return saved ? JSON.parse(saved) : { apiKey: '', model: 'gemini-3-flash-preview' };
            });

            const [flights, setFlights] = useState([]);
            const [forecastData, setForecastData] = useState({});
            const [isRaining, setIsRaining] = useState(false);
            const [isCloudConnected, setIsCloudConnected] = useState(false);
            
            const [activeShift, setActiveShift] = useState('Turno Diurno');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'info', isSettings: false, isManualLog: false });
            
            const [isScanning, setIsScanning] = useState(false);
            const [flightItinerary, setFlightItinerary] = useState([]);
            const [audioUnlocked, setAudioUnlocked] = useState(false);
            
            const fileInputRef = useRef(null);
            const lastMinuteRef = useRef(null);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'control-vuelos-multiplayer';

            useEffect(() => {
                let unsubscribe = null;

                const connectToCloud = async () => {
                    if (!window.firebaseAuth || !window.firebaseDb) return;
                    
                    try {
                        const userCred = await window.firebaseSignInAnonymously(window.firebaseAuth);
                        if (!userCred.user) return;

                        setIsCloudConnected(true);

                        const docRef = window.firebaseDoc(window.firebaseDb, 'artifacts', appId, 'public', 'data', 'dispatcherState', 'global');
                        
                        unsubscribe = window.firebaseOnSnapshot(docRef, (snapshot) => {
                            if (snapshot.exists()) {
                                const data = snapshot.data();
                                setFlights(data.flights || []);
                                setForecastData(data.forecastData || {});
                                setIsRaining(data.isRaining || false);
                            }
                        }, (error) => {
                            console.error("Error en Nube:", error);
                            setIsCloudConnected(false);
                        });

                    } catch (error) {
                        console.error("Error al conectar a Firebase:", error);
                        setIsCloudConnected(false);
                    }
                };

                if (window.firebaseAuth) {
                    connectToCloud();
                } else {
                    window.addEventListener('firebase-modules-ready', connectToCloud);
                }

                return () => {
                    if (unsubscribe) unsubscribe();
                    window.removeEventListener('firebase-modules-ready', connectToCloud);
                };
            }, []);

            const pushToCloud = async (updates) => {
                if (!window.firebaseDb || !window.firebaseAuth.currentUser) return;
                
                try {
                    const docRef = window.firebaseDoc(window.firebaseDb, 'artifacts', appId, 'public', 'data', 'dispatcherState', 'global');
                    await window.firebaseSetDoc(docRef, updates, { merge: true });
                } catch (error) {
                    console.error("Error al guardar en la nube:", error);
                    setModal({ isOpen: true, title: "Error de Sincronización", message: "No se pudo guardar en la nube. Revisa tu internet.", type: "error" });
                }
            };

            const unlockAudio = useCallback(() => {
                if (audioUnlocked) return;
                const silentUtterance = new SpeechSynthesisUtterance('');
                silentUtterance.volume = 0;
                window.speechSynthesis.speak(silentUtterance);
                setAudioUnlocked(true);
            }, [audioUnlocked]);

            useEffect(() => {
                window.addEventListener('click', unlockAudio, { once: true });
                window.addEventListener('touchstart', unlockAudio, { once: true });
            }, [unlockAudio]);

            const speak = (text) => {
                if ('speechSynthesis' in window && audioUnlocked) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'es-MX';
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const getOperativeDayStart = (dateObj) => {
                const d = new Date(dateObj);
                if (d.getHours() < 7) d.setDate(d.getDate() - 1);
                d.setHours(7, 0, 0, 0);
                return d;
            };

            const toOpMins = (h, m) => {
                let opH = h < 7 ? h + 24 : h;
                return opH * 60 + m;
            };

            const generateIntelligentSchedule = useCallback((currentForecast, currentFlights, rainStatus) => {
                if (rainStatus || Object.keys(currentForecast).length === 0) {
                    setFlightItinerary([]); 
                    return;
                }

                const now = new Date(); 
                const operativeStart = getOperativeDayStart(now);
                const nowOpMins = toOpMins(now.getHours(), now.getMinutes());
                
                const completedToday = currentFlights.filter(f => new Date(f.timestamp) >= operativeStart);
                let remainingTotal = 13 - completedToday.length;
                
                if (remainingTotal <= 0) {
                    setFlightItinerary([]);
                    return;
                }

                let schedule = [];
                
                const canAdd = (opMins, requiredSpacing) => {
                    for (let f of schedule) {
                        let [fh, fm] = f.time.split(':').map(Number);
                        if (Math.abs(toOpMins(fh, fm) - opMins) < requiredSpacing) return false;
                    }
                    for (let c of completedToday) {
                        let [ch, cm] = c.time.split(':').map(Number);
                        if (Math.abs(toOpMins(ch, cm) - opMins) < requiredSpacing) return false;
                    }
                    return true;
                };

                const forcedTimes = ["06:00", "08:20", "14:00", "17:00", "21:30"];
                
                for (let timeStr of forcedTimes) {
                    if (remainingTotal <= 0) break;
                    let [h, m] = timeStr.split(':').map(Number);
                    let opMins = toOpMins(h, m);
                    
                    if (opMins > nowOpMins - 15) {
                        if (currentForecast[h]?.windGust <= 43) {
                            schedule.push({ time: timeStr, type: "Forzoso", shift: (h>=7 && h<19)?"Turno Diurno":"Turno Nocturno", fixed: true });
                            remainingTotal--;
                        }
                    }
                }

                if (remainingTotal > 0) {
                    let possibleSlots = [];
                    for (let h=0; h<24; h++) {
                        let opH = h < 7 ? h + 24 : h;
                        if (currentForecast[h]?.windGust > 43) continue; 
                        
                        for (let m=0; m<=50; m+=10) {
                            if(h===7 && m>=40) continue; 
                            if(h===8 && m<20) continue;
                            
                            let opMins = opH * 60 + m;
                            if (opMins > nowOpMins + 10) {
                                possibleSlots.push({ h, m, opMins });
                            }
                        }
                    }

                    possibleSlots.sort(() => Math.random() - 0.5);

                    let availableFutureMins = (31 * 60) - nowOpMins; 
                    let targetSpacing = Math.floor(availableFutureMins / (remainingTotal + 1));
                    targetSpacing = Math.min(90, Math.max(40, targetSpacing)); 

                    let addedDynamic = 0;
                    
                    for (let slot of possibleSlots) {
                        if (addedDynamic >= remainingTotal) break;
                        if (canAdd(slot.opMins, targetSpacing)) {
                            let timeStr = `${slot.h.toString().padStart(2,'0')}:${slot.m.toString().padStart(2,'0')}`;
                            schedule.push({ 
                                time: timeStr, 
                                type: "Dinámico", 
                                shift: (slot.h>=7 && slot.h<19)?"Turno Diurno":"Turno Nocturno", 
                                fixed: false 
                            });
                            addedDynamic++;
                        }
                    }

                    if (addedDynamic < remainingTotal) {
                        for (let slot of possibleSlots) {
                             if (addedDynamic >= remainingTotal) break;
                             let timeStr = `${slot.h.toString().padStart(2,'0')}:${slot.m.toString().padStart(2,'0')}`;
                             if (!schedule.find(s => s.time === timeStr)) {
                                 if (canAdd(slot.opMins, 30)) {
                                    schedule.push({ 
                                        time: timeStr, 
                                        type: "Dinámico (Comprimido)", 
                                        shift: (slot.h>=7 && slot.h<19)?"Turno Diurno":"Turno Nocturno", 
                                        fixed: false 
                                    });
                                    addedDynamic++;
                                 }
                             }
                        }
                    }
                }

                schedule.sort((a, b) => {
                    let [ah, am] = a.time.split(':').map(Number);
                    let [bh, bm] = b.time.split(':').map(Number);
                    return toOpMins(ah, am) - toOpMins(bh, bm);
                });

                setFlightItinerary(schedule);
                
            }, []);

            useEffect(() => {
                generateIntelligentSchedule(forecastData, flights, isRaining);
            }, [forecastData, flights, isRaining, generateIntelligentSchedule]);

            const forceRecalculate = () => {
                if(Object.keys(forecastData).length > 0) {
                    generateIntelligentSchedule(forecastData, flights, isRaining);
                    speak("Analizando variables futuras. Plan maestro recalculado exitosamente.");
                } else {
                    setModal({ isOpen: true, title: "Falta Clima", message: "Escanea el clima antes de recalcular.", type: "error" });
                }
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now);
                    
                    const hour = now.getHours();
                    const minute = now.getMinutes();
                    const isDayShift = hour >= 7 && hour < 19;
                    setActiveShift(isDayShift ? 'Turno Diurno' : 'Turno Nocturno');

                    if (lastMinuteRef.current !== minute) {
                        lastMinuteRef.current = minute;
                        const timeStr = `${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`;
                        
                        if (isRaining) return;

                        if (timeStr === "07:50") {
                            speak("Atención piloto. Es hora de aterrizar. Junta obligatoria en curso.");
                        }

                        if (Object.keys(forecastData).length === 0 && minute % 5 === 0) {
                            speak("Alerta. No hay datos meteorológicos. Suba la captura del clima.");
                        }

                        const futureDate = new Date(now.getTime() + 10 * 60000);
                        const futureTimeStr = `${futureDate.getHours().toString().padStart(2,'0')}:${futureDate.getMinutes().toString().padStart(2,'0')}`;
                        const upcomingFlight = flightItinerary.find(f => f.time === futureTimeStr);
                        if (upcomingFlight) {
                            speak(`Atención piloto. Prepárese. Faltan 10 minutos para su vuelo de las ${upcomingFlight.time}.`);
                        }

                        const currentFlight = flightItinerary.find(f => f.time === timeStr);
                        if (currentFlight) {
                            speak(`Atención. Es hora de su vuelo programado. Despegue autorizado.`);
                        }
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [flightItinerary, audioUnlocked, forecastData, isRaining]);

            const analyzeImage = async (base64Image, retryCount = 0) => {
                if (!localSettings.apiKey) {
                    setModal({ isOpen: true, title: "Falta API Key", message: "Configura tu API Key en el botón del Engranaje (⚙️).", type: "error" });
                    setIsScanning(false);
                    return;
                }

                const promptText = `
                    Eres un asistente lector de pantallas de alta precisión. Tu único trabajo es buscar el número de km/h a 120m de altura en esta tabla de Airdata "OK TO FLY".
                    
                    REGLAS INQUEBRANTABLES:
                    1. NO HAGAS NINGUNA OPERACIÓN MATEMÁTICA. PROHIBIDO MULTIPLICAR.
                    2. Busca la hora de la previsión.
                    3. Busca en la ventana el texto que dice "A 120m" o "At 120m".
                    4. Lee el número en km/h que está escrito justo a su derecha. (Ejemplo: Si dice "38 km/h", extrae solo el número 38).
                    5. Devuelve EXACTAMENTE este formato JSON puro: 
                    [{"time": "14:00", "windGust": 38}]
                    6. Si la imagen NO tiene la ventana abierta, busca en la tabla principal y si dice "Ráfagas fuertes >40m" extrae 45. Si dice ">80m" extrae 85.
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${localSettings.model}:generateContent?key=${localSettings.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: promptText },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }
                                ]
                            }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        if (errorData.error && (errorData.error.code === 503 || errorData.error.code === 429) && retryCount < 2) {
                             await new Promise(resolve => setTimeout(resolve, 2000));
                             return analyzeImage(base64Image, retryCount + 1);
                        }
                        throw new Error(`Error del Servidor: ${JSON.stringify(errorData.error)}`);
                    }

                    const responseData = await response.json();
                    if (!responseData.candidates || responseData.candidates.length === 0) {
                        throw new Error("La IA no detectó la información. Usa una captura más clara.");
                    }
                    
                    const textResult = responseData.candidates[0].content.parts[0].text;
                    const cleanJson = textResult.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    let parsedData = JSON.parse(cleanJson);
                    
                    const forecastDict = {};
                    parsedData.forEach(item => {
                        if(!item.time || item.windGust === undefined) return;
                        let hour = parseInt(item.time.split(':')[0]);
                        forecastDict[hour] = { windGust: parseInt(item.windGust) }; 
                    });
                    
                    await pushToCloud({ forecastData: forecastDict });
                    speak("Análisis completado. Clima sincronizado en la red.");
                    
                } catch (error) {
                    console.error(error);
                    setModal({ isOpen: true, title: "Error de Escaneo", message: error.message, type: "error" });
                } finally {
                    setIsScanning(false);
                    if (fileInputRef.current) fileInputRef.current.value = ''; 
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsScanning(true);
                const reader = new FileReader();
                reader.onloadend = () => analyzeImage(reader.result);
                reader.readAsDataURL(file);
            };

            const handleLogFlight = async () => {
                const flightTime = currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const currentHour = currentTime.getHours();
                const currentWind = forecastData[currentHour] ? forecastData[currentHour].windGust : 0;

                const newLog = {
                    id: Date.now(),
                    time: flightTime,
                    timestamp: currentTime.toISOString(),
                    shift: activeShift,
                    wind: currentWind
                };
                
                const updatedLogs = [newLog, ...flights].sort((a,b) => b.id - a.id);
                await pushToCloud({ flights: updatedLogs });
                speak(`Despegue registrado exitosamente a las ${flightTime}.`);
            };

            const handleManualLogSubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const timeStr = formData.get('timeStr');
                const windNum = parseInt(formData.get('windNum')) || 0;
                
                const hour = parseInt(timeStr.split(':')[0]);
                const shift = (hour >= 7 && hour < 19) ? 'Turno Diurno' : 'Turno Nocturno';

                const newTimestamp = new Date();
                newTimestamp.setHours(hour, parseInt(timeStr.split(':')[1]), 0, 0);
                
                if (hour < 7 && currentTime.getHours() >= 7) {
                    newTimestamp.setDate(newTimestamp.getDate() + 1);
                }

                const newLog = {
                    id: Date.now(),
                    time: timeStr,
                    timestamp: newTimestamp.toISOString(),
                    shift: shift,
                    wind: windNum
                };
                
                const updatedLogs = [newLog, ...flights].sort((a,b) => b.id - a.id);
                await pushToCloud({ flights: updatedLogs });
                
                setModal({ isOpen: false, title: '', message: '', type: 'info', isSettings: false, isManualLog: false });
                speak(`Vuelo pasado sincronizado a las ${timeStr}.`);
            };

            const handleSaveSettings = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newSettings = { apiKey: formData.get('apiKey'), model: formData.get('model') };
                setLocalSettings(newSettings);
                localStorage.setItem('dispatcherSettings_v2026', JSON.stringify(newSettings));
                setModal({ isOpen: false, title: '', message: '', type: 'info', isSettings: false, isManualLog: false });
            };

            const handleRainToggle = async () => {
                const newRainState = !isRaining;
                await pushToCloud({ isRaining: newRainState });
                
                if (newRainState) {
                    speak("Alerta. Lluvia local detectada. Bloqueo activado en toda la red.");
                } else {
                    speak("Condiciones favorables. Reanudando operaciones en la red.");
                }
            };

            const currentHourInt = currentTime.getHours();
            const currentMinInt = currentTime.getMinutes();
            const currentWind = forecastData[currentHourInt] ? forecastData[currentHourInt].windGust : 0;
            const isDanger = currentWind > 43; 
            const isWarning = currentWind === 43; 
            
            const isMeetingTime = (currentHourInt === 7 && currentMinInt >= 50) || (currentHourInt === 8 && currentMinInt < 20);
            
            const operativeStart = getOperativeDayStart(currentTime);
            const todayFlightsTotal = flights.filter(f => new Date(f.timestamp) >= operativeStart);
            
            const dayFlightsCount = todayFlightsTotal.filter(f => f.shift === 'Turno Diurno').length;
            const nightFlightsCount = todayFlightsTotal.filter(f => f.shift === 'Turno Nocturno').length;
            
            const needsScanUI = Object.keys(forecastData).length === 0;

            return (
                <div className="pb-24">
                    <div className="fixed top-0 w-full bg-[#020617]/90 backdrop-blur-md border-b border-slate-800 p-3 z-30 flex justify-between items-center shadow-lg">
                        <div className="flex items-center gap-3">
                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.5)] ${isRaining ? 'bg-red-600 animate-pulse' : 'bg-indigo-600'}`}>
                                <span className="text-white font-black text-lg">{isRaining ? '🌧' : 'DP'}</span>
                            </div>
                            <div>
                                <h1 className="text-white font-black text-sm md:text-base leading-tight tracking-wide">DISPATCHER PRO</h1>
                                <p className="text-indigo-400 text-[9px] md:text-xs font-bold tracking-widest uppercase flex items-center gap-1">
                                    V12_CLOUD 
                                    {isCloudConnected ? <span className="text-emerald-400">🟢 Conectado</span> : <span className="text-rose-400">🔴 Sin red</span>}
                                </p>
                            </div>
                        </div>
                        
                        <button 
                            onClick={handleRainToggle}
                            className={`px-4 py-2 rounded-xl text-[10px] md:text-sm font-black uppercase tracking-wider transition-all border shadow-lg ${isRaining ? 'bg-emerald-500 border-emerald-400 text-white shadow-[0_0_20px_rgba(16,185,129,0.8)] animate-pulse' : 'bg-blue-500 border-blue-400 text-white hover:bg-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.6)]'}`}>
                            {isRaining ? '☀️ Reanudar Vuelos' : '🌧 Lluvia Local'}
                        </button>
                    </div>

                    <div className="max-w-md mx-auto pt-24 px-4">
                        
                        {isRaining && (
                            <div className="rain-glass rounded-3xl p-4 mb-6 flex flex-col items-center justify-center text-center shadow-2xl animate-pulse">
                                <span className="text-4xl mb-2">🌧️🛑</span>
                                <h2 className="text-white font-black text-lg uppercase tracking-widest">Alerta Meteorológica</h2>
                                <p className="text-red-200 text-sm">Operaciones suspendidas por lluvia. Sistema bloqueado en toda la red.</p>
                            </div>
                        )}

                        <div className={`glass p-5 rounded-3xl relative overflow-hidden flex justify-between items-center mb-6 ${isRaining ? 'opacity-50 pointer-events-none' : ''}`}>
                            <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                            <div>
                                <p className="text-[10px] font-black tracking-widest text-indigo-400 uppercase mb-1">Turno en curso</p>
                                <h2 className="text-2xl font-black text-white">{activeShift}</h2>
                                <div className="mt-2 text-3xl font-mono font-bold text-white tracking-wider flex items-center gap-2">
                                    {!audioUnlocked && <span className="text-[10px] animate-pulse text-amber-500 border border-amber-500/50 bg-amber-500/10 px-2 py-1 rounded">🔇 Toca la pantalla</span>}
                                    {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                                </div>
                            </div>
                            
                            <input type="file" ref={fileInputRef} accept="image/*" onChange={handleImageUpload} className="hidden" />
                            <button 
                                onClick={() => { if (fileInputRef.current) fileInputRef.current.click(); }} 
                                disabled={isScanning || isRaining}
                                className={`flex flex-col items-center justify-center p-3 rounded-2xl transition border z-10 relative ${isScanning ? 'bg-indigo-900/50 border-indigo-400 animate-pulse' : needsScanUI ? 'bg-rose-600 border-rose-400 shadow-[0_0_20px_rgba(225,29,72,0.4)] animate-pulse' : 'bg-indigo-600/20 border-indigo-500/30 hover:bg-indigo-600/40'}`}>
                                <span className="text-2xl mb-1">{isScanning ? '⏳' : '📸'}</span>
                                <span className={`text-[10px] font-black uppercase text-center ${needsScanUI || isScanning ? 'text-white' : 'text-indigo-300'}`}>
                                    {isScanning ? 'Analizando...' : needsScanUI ? 'URGE CLIMA' : 'Escanear IA'}
                                </span>
                            </button>
                        </div>

                        <div className={`mb-6 p-4 rounded-3xl border ${isRaining ? 'bg-slate-900 border-slate-800 opacity-50' : isMeetingTime ? 'bg-amber-950/40 border-amber-500/50' : needsScanUI ? 'bg-slate-900 border-slate-800' : isDanger ? 'bg-rose-950/40 border-rose-500/50' : isWarning ? 'bg-orange-950/40 border-orange-500/50' : 'bg-emerald-950/40 border-emerald-500/50'}`}>
                            <div className="flex items-center gap-3">
                                <div className={`w-3 h-3 rounded-full animate-ping ${isRaining ? 'bg-red-500' : isMeetingTime ? 'bg-amber-500' : needsScanUI ? 'bg-slate-600' : isDanger ? 'bg-rose-500' : isWarning ? 'bg-orange-500' : 'bg-emerald-500'}`}></div>
                                <div>
                                    <p className="text-[10px] font-black text-slate-400 tracking-widest uppercase">ESTADO ACTUAL DEL VIENTO</p>
                                    <h3 className={`font-black text-sm uppercase ${isRaining ? 'text-slate-500' : isMeetingTime ? 'text-amber-500' : needsScanUI ? 'text-slate-500' : isDanger ? 'text-rose-500' : isWarning ? 'text-orange-500' : 'text-emerald-500'}`}>
                                        {isRaining ? "CLIMA IGNORADO (LLUVIA)" : isMeetingTime ? "BLOQUEO: JUNTA OBLIGATORIA" : needsScanUI ? "Esperando datos..." : isDanger ? `PELIGRO: BLOQUEADO (${currentWind} km/h)` : isWarning ? `OPERABLE CON PRECAUCIÓN (${currentWind} km/h)` : `OPERABLE (${currentWind} km/h)`}
                                    </h3>
                                </div>
                            </div>
                        </div>

                        <div className="glass rounded-3xl p-6 text-center border border-slate-800 mb-6 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-slate-800">
                                <div className="h-full bg-indigo-500 transition-all duration-500" style={{width: `${Math.min((todayFlightsTotal.length / 13) * 100, 100)}%`}}></div>
                            </div>
                            
                            <div className="flex justify-between items-center mb-4">
                                <p className="text-[10px] font-black tracking-widest text-slate-400 uppercase">Meta Operativa del Día</p>
                                <button 
                                    onClick={() => setModal({ isOpen: true, title: "Registrar Vuelo Pasado", isSettings: false, isManualLog: true })} 
                                    className="text-[9px] font-bold uppercase tracking-wider bg-slate-800/80 hover:bg-slate-700 text-slate-300 py-1.5 px-3 rounded-lg border border-slate-700 transition shadow-sm">
                                    + Añadir Pasado
                                </button>
                            </div>
                            
                            <div className="flex items-end justify-center gap-2 mb-4">
                                <span className="text-5xl font-black text-indigo-400">{todayFlightsTotal.length}</span>
                                <span className="text-2xl font-bold text-slate-600 mb-1">/ 13 Totales</span>
                            </div>

                            <div className="grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-slate-800/50">
                                <div className="bg-slate-900/50 rounded-xl p-2 border border-slate-800 shadow-inner">
                                    <p className="text-[10px] text-slate-400 font-bold uppercase mb-1 flex items-center justify-center gap-1">☀️ Diurno</p>
                                    <p className="text-xl font-black text-amber-400">{dayFlightsCount}</p>
                                </div>
                                <div className="bg-slate-900/50 rounded-xl p-2 border border-slate-800 shadow-inner">
                                    <p className="text-[10px] text-slate-400 font-bold uppercase mb-1 flex items-center justify-center gap-1">🌙 Nocturno</p>
                                    <p className="text-xl font-black text-blue-400">{nightFlightsCount}</p>
                                </div>
                            </div>
                        </div>

                        {flightItinerary.length > 0 && !isRaining && (
                            <div className="glass rounded-3xl p-4 border border-slate-800 mb-6">
                                <h3 className="text-[11px] font-black tracking-widest text-indigo-400 uppercase mb-3 flex items-center justify-between">
                                    <span>🤖 Plan Maestro Restante</span>
                                    <button onClick={forceRecalculate} className="bg-indigo-900/50 hover:bg-indigo-800 text-indigo-300 px-2 py-0.5 rounded-full text-[10px] border border-indigo-700/50 flex items-center gap-1 transition">
                                        <span>🔄 Forzar Voz</span>
                                    </button>
                                </h3>
                                <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                                    {flightItinerary.map((f, i) => {
                                        const [h] = f.time.split(':').map(Number);
                                        const wInfo = forecastData[h];
                                        const windDanger = wInfo && wInfo.windGust > 43;
                                        const windWarning = wInfo && wInfo.windGust === 43;

                                        return (
                                            <div key={i} className={`flex flex-col p-2.5 rounded-xl border ${windDanger ? 'bg-rose-950/20 border-rose-900/50 opacity-50' : windWarning ? 'bg-orange-950/20 border-orange-900/50' : f.fixed ? 'bg-indigo-900/20 border-indigo-500/30' : 'bg-slate-800/40 border-slate-700/50'}`}>
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-white font-bold text-sm">{f.time} <span className="text-xs text-slate-400 font-normal ml-1">({f.shift})</span></span>
                                                    <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border ${f.fixed ? 'bg-indigo-600/20 text-indigo-300 border-indigo-500/50' : 'bg-slate-700 text-slate-300 border-slate-600'}`}>
                                                        {f.type}
                                                    </span>
                                                </div>
                                                {wInfo && (
                                                    <div className="text-[10px] flex items-center gap-1">
                                                        <span className={windDanger ? 'text-rose-400' : windWarning ? 'text-orange-400' : 'text-emerald-400'}>
                                                            {windDanger ? '❌ Bloqueado' : windWarning ? '⚠️ Precaución' : '✅ Libre'}
                                                        </span>
                                                        <span className="text-slate-500">({wInfo.windGust} km/h est.)</span>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        <div className="glass rounded-3xl p-4 border border-slate-800 mb-6">
                            <h3 className="text-[11px] font-black tracking-widest text-slate-400 uppercase mb-3 flex items-center justify-between">
                                <span>✅ Bitácora Compartida</span>
                                <span className="bg-emerald-600 text-white px-2 py-0.5 rounded-full text-[10px]">{todayFlightsTotal.length}</span>
                            </h3>
                            <div className="space-y-2">
                                {todayFlightsTotal.length === 0 ? (
                                    <div className="text-center py-4 text-xs text-slate-500 font-medium bg-slate-900/50 rounded-xl">Esperando vuelos en la red...</div>
                                ) : (
                                    todayFlightsTotal.map((f, i) => (
                                        <div key={i} className="flex justify-between items-center p-2.5 rounded-xl bg-slate-800/40 border border-slate-700/50">
                                            <span className="text-white font-bold text-sm">Despegue: {f.time}</span>
                                            <span className="text-xs font-bold text-emerald-400 bg-emerald-950/50 px-2 py-1 rounded-md border border-emerald-900/50 block">{f.wind} km/h</span>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        <div className="flex justify-center pb-8">
                            <button onClick={() => setModal({ isOpen: true, title: "Configuración del Sistema", isSettings: true, isManualLog: false })} className="text-xs text-slate-500 hover:text-white flex items-center gap-1 transition">
                                ⚙️ Ajustes Privados del Navegador
                            </button>
                        </div>
                    </div>

                    <div className="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent flex justify-center z-40 pointer-events-none">
                        <button 
                            onClick={handleLogFlight}
                            disabled={isDanger || isMeetingTime || isRaining}
                            className={`pointer-events-auto w-full max-w-sm py-4 rounded-2xl font-black text-lg tracking-widest uppercase transition-all shadow-2xl flex items-center justify-center gap-3 ${isRaining ? 'bg-red-900/80 text-red-300 cursor-not-allowed' : isMeetingTime ? 'bg-slate-800 text-slate-500 cursor-not-allowed opacity-50' : isDanger ? 'bg-rose-900/80 text-rose-300 cursor-not-allowed' : isWarning ? 'bg-orange-500 hover:bg-orange-400 text-white shadow-[0_0_30px_rgba(249,115,22,0.3)]' : 'bg-emerald-500 hover:bg-emerald-400 text-white shadow-[0_0_30px_rgba(16,185,129,0.3)]'}`}>
                            {isRaining ? 'BLOQUEO (LLUVIA)' : isMeetingTime ? 'BLOQUEO (JUNTA)' : isDanger ? 'BLOQUEO (CLIMA)' : '🚀 REGISTRAR DESPEGUE'}
                        </button>
                    </div>

                    {modal.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="glass-panel w-full max-w-sm rounded-3xl overflow-hidden border border-slate-700 p-6 animate-in fade-in zoom-in duration-200">
                                <h3 className="text-xl font-black text-white mb-2">{modal.title}</h3>
                                
                                {modal.isSettings ? (
                                    <form onSubmit={handleSaveSettings} className="space-y-4 mt-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Google API Key (AQ. o AIZA.)</label>
                                            <input type="password" name="apiKey" defaultValue={localSettings.apiKey} required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 font-mono text-sm" placeholder="Pégala aquí..." />
                                            <p className="text-[9px] text-emerald-400 mt-1">Tu llave se guarda solo aquí. No se comparte en la red.</p>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Motor Táctico de IA</label>
                                            <select name="model" defaultValue={localSettings.model} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 text-sm">
                                                <option value="gemini-3-flash-preview">Gemini 3 Flash (Máxima Precisión)</option>
                                                <option value="gemini-1.5-pro">Gemini 1.5 Pro (Vía VIP / No Saturado)</option>
                                            </select>
                                        </div>
                                        <div className="flex gap-3 mt-6">
                                            <button type="button" onClick={() => setModal({ isOpen: false })} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700 transition">Cancelar</button>
                                            <button type="submit" className="flex-1 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-500 transition shadow-[0_0_15px_rgba(79,70,229,0.4)]">Guardar</button>
                                        </div>
                                    </form>
                                ) : modal.isManualLog ? (
                                    <form onSubmit={handleManualLogSubmit} className="space-y-4 mt-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Hora Exacta del Despegue (HH:MM)</label>
                                            <input type="time" name="timeStr" required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 font-mono text-xl text-center" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Viento a 120m (km/h)</label>
                                            <input type="number" name="windNum" min="0" defaultValue="0" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 font-mono text-sm text-center" />
                                        </div>
                                        <div className="flex gap-3 mt-6">
                                            <button type="button" onClick={() => setModal({ isOpen: false })} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700 transition">Cancelar</button>
                                            <button type="submit" className="flex-1 py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-500 transition shadow-[0_0_15px_rgba(16,185,129,0.4)]">Enviar a la Nube</button>
                                        </div>
                                    </form>
                                ) : (
                                    <div className="max-h-60 overflow-y-auto pr-2">
                                        <p className="text-slate-300 text-sm whitespace-pre-wrap">{modal.message}</p>
                                        <button onClick={() => setModal({ isOpen: false })} className="w-full mt-6 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 transition">Entendido</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
