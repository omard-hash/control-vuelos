<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Pro - V40 Master</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FIREBASE (LA NUBE) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDXjwv133-dIKyprCktTUkjx_adAz1DhAY",
            authDomain: "control-vuelos.firebaseapp.com",
            projectId: "control-vuelos",
            storageBucket: "control-vuelos.firebasestorage.app",
            messagingSenderId: "756032981781",
            appId: "1:756032981781:web:451641e72abe3692c0771c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState, useEffect, useRef } = React;

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isScanning, setIsScanning] = useState(false);
            const [flights, setFlights] = useState([]);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_key') || '');
            const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'error' });
            
            const [loggedFlightsCount, setLoggedFlightsCount] = useState(0);
            const totalFlightsTarget = 13;

            // Estado para el sistema de voz
            const [audioUnlocked, setAudioUnlocked] = useState(false);
            const audioUnlockedRef = useRef(false);

            // SINCRONIZACIÓN EN TIEMPO REAL CON LA NUBE
            useEffect(() => {
                let unsubscribe = () => {};

                // Iniciar sesión silenciosamente para que Firebase nos de permiso
                firebase.auth().signInAnonymously().then(() => {
                    unsubscribe = db.collection('operaciones').doc('turno_actual').onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.flights) setFlights(data.flights);
                            if (data.loggedFlightsCount !== undefined) setLoggedFlightsCount(data.loggedFlightsCount);
                        }
                    }, (err) => {
                        console.error("Error leyendo datos:", err);
                    });
                }).catch((error) => {
                    console.error("Error al autenticar:", error);
                });

                return () => unsubscribe();
            }, []);

            // Sincronizar el ref con el estado para usarlo dentro del setInterval
            useEffect(() => {
                audioUnlockedRef.current = audioUnlocked;
            }, [audioUnlocked]);

            // Función para hablar
            const speak = (text) => {
                if (audioUnlockedRef.current && 'speechSynthesis' in window) {
                    // Cancelar cualquier audio previo para que no se encimen
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'es-MX'; // Español de México
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            };

            // Desbloquear audio con el primer toque
            const unlockAudio = () => {
                if (!audioUnlocked) {
                    setAudioUnlocked(true);
                    audioUnlockedRef.current = true;
                    // Audio invisible para engañar al navegador y desbloquear el motor
                    const utterance = new SpeechSynthesisUtterance("Sistema de voz activado.");
                    utterance.lang = 'es-MX';
                    utterance.volume = 0.5;
                    window.speechSynthesis.speak(utterance);
                }
            };

            // Reloj y alarmas (7:50 AM)
            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now);
                    
                    // ALARMA 7:50 AM EXACTAS
                    if (now.getHours() === 7 && now.getMinutes() === 50 && now.getSeconds() === 0) {
                        speak("Atención comandante. Es hora de la junta operativa de las siete cincuenta.");
                        setModal({ isOpen: true, title: '⏰ JUNTA OPERATIVA', message: 'Alarma de las 7:50 AM. Junta de operaciones.', type: 'error' });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!geminiKey || geminiKey.trim() === '') {
                    speak("Error. Falta la llave de la inteligencia artificial.");
                    setModal({ isOpen: true, title: 'Falta la Llave', message: 'Por favor, abre los ajustes (⚙️) y pega tu llave API de Gemini.' });
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64Data = event.target.result.split(',')[1];
                    analyzeImageWithAI(base64Data);
                };
                reader.readAsDataURL(file);
            };

            const analyzeImageWithAI = async (base64Image) => {
                setIsScanning(true);
                speak("Analizando el clima con Inteligencia Artificial...");
                
                try {
                    const key = geminiKey.trim();
                    // Usando 3.6-flash como lo solicitaste
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.6-flash:generateContent?key=${key}`;
                    
                    const payload = {
                        contents: [{
                            parts: [
                                { text: "Analiza el clima. Regla estricta: Si dice 'Apto para volar' el viento es 0. Si dice 'Ráfagas fuertes' o vientos > 40, el viento es 45. Devuelve un JSON con un arreglo llamado 'hourlyData' donde cada objeto tenga 'time' (ej. '12:00pm') y 'wind' (numero)." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || "Error de credenciales. Verifica que tu llave sea correcta.");
                    }

                    const data = await response.json();
                    let aiResponseText = data.candidates[0].content.parts[0].text;
                    
                    if (aiResponseText.startsWith('```json')) {
                         aiResponseText = aiResponseText.replace(/```json\n?/, '').replace(/```\n?$/, '');
                    }
                    
                    const parsedData = JSON.parse(aiResponseText);
                    
                    if (parsedData && parsedData.hourlyData) {
                         generateIntelligentSchedule(parsedData.hourlyData);
                         speak("Itinerario calculado exitosamente.");
                    } else {
                         throw new Error("Formato de respuesta de IA incorrecto.");
                    }

                } catch (error) {
                    console.error("AI Analysis Error:", error);
                    speak("Error al analizar el clima. Verifica la llave.");
                    setModal({ isOpen: true, title: 'Error de Análisis', message: error.message });
                    generateIntelligentSchedule([]); 
                } finally {
                    setIsScanning(false);
                }
            };

            const generateIntelligentSchedule = (hourlyWeatherData) => {
                let windMap = { 6: 0, 7: 0, 8: 0, 9: 0, 10: 0, 11: 0, 12: 0, 13: 0, 14: 0, 15: 0, 16: 0, 17: 0, 18: 0, 19: 0, 20: 0, 21: 0, 22: 0 };

                if (hourlyWeatherData && hourlyWeatherData.length > 0) {
                     hourlyWeatherData.forEach(dataPoint => {
                          let hourMatch = dataPoint.time.match(/(\d+):00([ap]m)/i);
                          if (hourMatch) {
                               let hour = parseInt(hourMatch[1]);
                               let ampm = hourMatch[2].toLowerCase();
                               if (ampm === 'pm' && hour < 12) hour += 12;
                               if (ampm === 'am' && hour === 12) hour = 0;
                               
                               windMap[hour] = dataPoint.wind;
                          }
                     });
                } else {
                     windMap = { 11: 0, 12: 45, 13: 45, 14: 45, 15: 45, 16: 45, 17: 45, 18: 45, 19: 45 };
                }

                let newSchedule = [
                    { time: "06:00", type: "FORZOSO", wind: windMap[6] || 0, hour24: 6 },
                    { time: "07:20", type: "FORZOSO", wind: windMap[7] || 0, hour24: 7 }
                ];

                // REGLAS DE COMPRESIÓN MATUTINA (Si hay clima feo temprano)
                const isSuspendedAt11 = windMap[11] >= 40;
                const isSuspendedAt12 = windMap[12] >= 40 && !isSuspendedAt11;

                if (isSuspendedAt11) {
                    // Si se suspende a las 11:00, aseguramos 4 vuelos exactos antes de esa hora
                    newSchedule.push(
                        { time: "08:30", type: "DINÁMICO", wind: windMap[8] || 0, hour24: 8 },
                        { time: "09:45", type: "DINÁMICO", wind: windMap[9] || 0, hour24: 9 },
                        { time: "11:00", type: "DINÁMICO", wind: windMap[11], hour24: 11 }, // Aparecerá suspendido
                        { time: "12:15", type: "DINÁMICO", wind: windMap[12] || 0, hour24: 12 }
                    );
                } else if (isSuspendedAt12) {
                    // Si se suspende a las 12:00, apretamos el itinerario para asegurar 5 vuelos exactos
                    newSchedule.push(
                        { time: "08:20", type: "DINÁMICO", wind: windMap[8] || 0, hour24: 8 },
                        { time: "09:30", type: "DINÁMICO", wind: windMap[9] || 0, hour24: 9 },
                        { time: "10:45", type: "DINÁMICO", wind: windMap[10] || 0, hour24: 10 },
                        { time: "12:00", type: "DINÁMICO", wind: windMap[12], hour24: 12 } // Aparecerá suspendido
                    );
                } else {
                    // Itinerario estándar relajado si no hay mal clima temprano
                    newSchedule.push(
                        { time: "08:40", type: "DINÁMICO", wind: windMap[8] || 0, hour24: 8 },
                        { time: "10:00", type: "DINÁMICO", wind: windMap[10] || 0, hour24: 10 },
                        { time: "11:30", type: "DINÁMICO", wind: windMap[11] || 0, hour24: 11 },
                        { time: "12:45", type: "DINÁMICO", wind: windMap[12] || 0, hour24: 12 }
                    );
                }

                // Bloque de la tarde y noche (Vuelos restantes)
                newSchedule.push(
                    { time: "14:00", type: "FORZOSO", wind: windMap[14] || 20, hour24: 14 },
                    { time: "15:30", type: "DINÁMICO", wind: windMap[15] || 20, hour24: 15 },
                    { time: "17:00", type: "FORZOSO", wind: windMap[17] || 20, hour24: 17 },
                    { time: "18:30", type: "DINÁMICO", wind: windMap[18] || 0, hour24: 18 },
                    { time: "20:00", type: "DINÁMICO", wind: windMap[20] || 0, hour24: 20 },
                    { time: "21:30", type: "FORZOSO", wind: windMap[21] || 0, hour24: 21 },
                    { time: "22:45", type: "DINÁMICO", wind: windMap[22] || 0, hour24: 22 }
                );
                
                setFlights(newSchedule);
                
                // GUARDAR ITINERARIO EN LA NUBE AL CALCULAR
                db.collection('operaciones').doc('turno_actual').set({ flights: newSchedule }, { merge: true });
            };

            const handleLogManualFlight = () => {
                 if (loggedFlightsCount < totalFlightsTarget) {
                      const newCount = prev => prev + 1;
                      setLoggedFlightsCount(newCount);
                      
                      // ACTUALIZAR CONTEO EN LA NUBE PARA TODOS
                      db.collection('operaciones').doc('turno_actual').set({ loggedFlightsCount: loggedFlightsCount + 1 }, { merge: true });
                      
                      speak("Vuelo registrado exitosamente.");
                      setModal({ isOpen: true, title: 'Vuelo Registrado', message: 'Vuelo registrado exitosamente en la bitácora local.', type: 'success' });
                 } else {
                      speak("Alerta. Has alcanzado el límite de vuelos permitidos para hoy.");
                      setModal({ isOpen: true, title: 'Límite Alcanzado', message: 'Ya has registrado el máximo de vuelos para hoy.', type: 'error' });
                 }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-3xl mx-auto pb-24" onClick={unlockAudio}>
                    
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h1 className="text-xl md:text-2xl font-black tracking-tight flex items-center gap-3">
                                <span className="bg-indigo-600 text-white px-2 py-1 rounded-lg text-sm">DP</span>
                                DISPATCHER PRO
                            </h1>
                            <p className="text-xs font-bold text-indigo-400 mt-1 tracking-widest uppercase">V40 MASTER • 🟢 IA & VOZ ACTIVAS</p>
                        </div>
                        <button 
                            onClick={(e) => { e.stopPropagation(); setSettingsOpen(true); }}
                            className="bg-slate-800 hover:bg-slate-700 p-3 rounded-xl border border-slate-700 transition"
                        >
                            ⚙️
                        </button>
                    </div>

                    {/* Aviso de Audio */}
                    {!audioUnlocked && (
                        <div className="bg-amber-500/20 border border-amber-500/50 text-amber-400 text-xs font-bold text-center p-2 rounded-xl mb-4 animate-pulse">
                            🔇 Toca cualquier parte de la pantalla para activar la voz
                        </div>
                    )}

                    {/* Current Shift Card */}
                    <div className="glass p-6 rounded-3xl mb-6 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                        
                        {/* Flight Counter Display */}
                        <div className="absolute top-6 right-6 text-right">
                             <p className="text-[10px] font-black tracking-widest text-slate-400 uppercase mb-1">Meta Diaria</p>
                             <div className="text-2xl font-black text-indigo-400">
                                  {loggedFlightsCount} <span className="text-slate-500 text-lg">/ {totalFlightsTarget}</span>
                             </div>
                        </div>

                        <p className="text-[10px] font-black tracking-widest text-slate-400 uppercase mb-1">Turno en curso</p>
                        <h2 className="text-3xl font-black text-white">Turno Actual</h2>
                        <div className="mt-2 text-4xl font-mono font-bold text-white tracking-wider mb-6">
                            {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                        </div>
                        
                        <input type="file" id="upload" accept="image/*" className="hidden" onChange={handleImageUpload} />
                        <button 
                            onClick={(e) => { e.stopPropagation(); document.getElementById('upload').click(); }}
                            disabled={isScanning}
                            className={`w-full py-4 rounded-2xl font-black text-lg transition flex justify-center items-center gap-2 ${isScanning ? 'bg-indigo-900/50 text-indigo-300 animate-pulse' : 'bg-[#1e293b] hover:bg-[#334155] text-white border border-slate-700'}`}
                        >
                            {isScanning ? '⏳ Analizando...' : '📸 ESCANEAR CLIMA'}
                        </button>
                    </div>

                    {/* Schedule List */}
                    <div className="glass p-6 rounded-3xl mb-6">
                        <p className="text-[10px] font-black tracking-widest text-slate-400 uppercase mb-4">🗓️ Plan Restante (Calculado)</p>
                        
                        {flights.length === 0 ? (
                            <div className="text-center py-8 text-sm font-bold text-slate-500">
                                Sube una captura de pantalla del clima para calcular el itinerario.
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {flights.map((f, i) => (
                                    <div key={i} className={`flex justify-between items-center p-4 bg-[#0f172a] border rounded-2xl ${f.wind >= 42 ? 'border-rose-900/50 opacity-75' : 'border-slate-800'}`}>
                                        <div>
                                            <div className="text-xl font-black text-white tracking-wide">{f.time}</div>
                                            <div className={`text-xs font-bold mt-1 uppercase tracking-wider flex items-center gap-1 ${f.wind >= 42 ? 'text-rose-500' : 'text-emerald-400'}`}>
                                                {f.wind >= 42 ? '🚫' : '✅'}
                                                {f.wind >= 42 ? `Suspendido (${f.wind} km/h)` : `Libre (${f.wind} km/h)`}
                                            </div>
                                        </div>
                                        <span className={`text-[10px] font-black uppercase px-3 py-1.5 rounded-lg border ${f.type === 'FORZOSO' ? 'bg-indigo-950 text-indigo-400 border-indigo-900' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>
                                            {f.type}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Botón Flotante para Registrar Vuelo */}
                    <div className="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent flex justify-center z-40 pointer-events-none">
                         <button 
                             onClick={(e) => { e.stopPropagation(); handleLogManualFlight(); }}
                             className="pointer-events-auto w-full max-w-sm bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-2xl shadow-[0_0_20px_rgba(79,70,229,0.4)] transition transform hover:scale-[1.02]"
                         >
                             ✈️ REGISTRAR DESPEGUE AHORA
                         </button>
                    </div>

                    {/* Modals */}
                    {modal.isOpen && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="bg-[#0f172a] border border-slate-800 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
                                <div className={`h-1.5 w-full ${modal.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                                <div className="p-6">
                                    <h2 className="text-xl font-black text-white mb-2">{modal.title}</h2>
                                    <p className="text-slate-300 text-sm mb-6 leading-relaxed">{modal.message}</p>
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setModal({isOpen: false, title: '', message: '', type: 'error'}); }} 
                                        className="w-full bg-[#1e293b] hover:bg-[#334155] border border-slate-700 text-white font-bold py-3.5 rounded-xl transition"
                                    >
                                        Entendido
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {settingsOpen && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4" onClick={(e) => e.stopPropagation()}>
                            <div className="bg-[#0f172a] border border-slate-800 rounded-3xl w-full max-w-sm shadow-2xl p-6">
                                <h2 className="text-xl font-black text-white mb-5">⚙️ Ajustes</h2>
                                
                                <div className="mb-6">
                                    <label className="block text-[10px] font-black tracking-widest text-slate-400 uppercase mb-2">
                                        Llave Gemini API
                                    </label>
                                    <input 
                                        type="password" 
                                        value={geminiKey} 
                                        onChange={e => setGeminiKey(e.target.value)}
                                        placeholder="Empieza con AQ..."
                                        className="w-full bg-[#1e293b] border border-slate-700 rounded-xl p-3 text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition font-mono text-sm"
                                    />
                                    <p className="text-[10px] text-slate-500 mt-2 font-bold leading-relaxed">
                                        Pega aquí tu llave AQ... o AIzaSy... de Google AI Studio.
                                    </p>
                                </div>

                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => setSettingsOpen(false)} 
                                        className="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-3.5 rounded-xl transition text-sm border border-slate-700"
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={() => {
                                            localStorage.setItem('gemini_key', geminiKey);
                                            setSettingsOpen(false);
                                            speak("Ajustes guardados.");
                                        }} 
                                        className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl transition text-sm shadow-[0_0_15px_rgba(79,70,229,0.3)]"
                                    >
                                        Guardar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
