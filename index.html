<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Pro - V43 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen relative overflow-hidden">
    <!-- Fondo Animado -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-900/20 blur-[120px] mix-blend-screen"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-blue-900/10 blur-[150px] mix-blend-screen"></div>
    </div>

    <div id="root" class="relative z-10 h-screen overflow-y-auto"></div>

    <script type="text/babel">
        const App = () => {
            const [currentTime, setCurrentTime] = React.useState(new Date());
            const [activeShift, setActiveShift] = React.useState("Turno Diurno");
            const [flights, setFlights] = React.useState([]);
            const [isScanning, setIsScanning] = React.useState(false);
            const [needsScanUI, setNeedsScanUI] = React.useState(true);
            const [audioUnlocked, setAudioUnlocked] = React.useState(false);
            const [isRaining, setIsRaining] = React.useState(false);
            
            // Log de vuelos registrados
            const [todayFlightsTotal, setTodayFlightsTotal] = React.useState([]);
            
            // Configuración
            const [isSettingsOpen, setIsSettingsOpen] = React.useState(false);
            const [settings, setSettings] = React.useState({
                geminiKey: localStorage.getItem('geminiKey') || '',
                firebaseConfigText: localStorage.getItem('firebaseConfigText') || ''
            });

            const [modal, setModal] = React.useState({ isOpen: false, title: '', message: '', type: 'info' });
            const [db, setDb] = React.useState(null);
            
            const [windDataMap, setWindDataMap] = React.useState({});
            const currentHour = currentTime.getHours();
            const currentWind = windDataMap[currentHour] !== undefined ? windDataMap[currentHour] : 0;
            const isSuspendedNow = currentWind >= 40 || isRaining;

            const speak = (text) => {
                if (!audioUnlocked) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-MX';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                window.speechSynthesis.speak(utterance);
            };

            const unlockAudio = () => {
                if (!audioUnlocked) {
                    setAudioUnlocked(true);
                    speak("Sistema de voz activado.");
                }
            };

            React.useEffect(() => {
                if (settings.firebaseConfigText) {
                    try {
                        const config = JSON.parse(settings.firebaseConfigText);
                        if (!firebase.apps.length) {
                            firebase.initializeApp(config);
                        }
                        const firestore = firebase.firestore();
                        setDb(firestore);
                        
                        // Autenticación Silenciosa
                        firebase.auth().signInAnonymously()
                            .then(() => {
                                console.log("Conectado a Firebase silenciosamente");
                            })
                            .catch((error) => {
                                console.error("Error Auth:", error);
                                setModal({isOpen: true, title: "Error de Permisos", message: "Habilita el inicio de sesión Anónimo en Firebase Authentication.", type: "error"});
                            });
                    } catch (e) {
                        console.error("Error parseando Firebase JSON", e);
                    }
                }
            }, [settings.firebaseConfigText]);

            React.useEffect(() => {
                if (!db) return;
                const unsubscribe = db.collection('operaciones').doc('turno_actual')
                    .onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.flights) setFlights(data.flights);
                            if (data.todayFlightsTotal) setTodayFlightsTotal(data.todayFlightsTotal);
                            if (data.windDataMap) setWindDataMap(data.windDataMap);
                            if (data.needsScanUI !== undefined) setNeedsScanUI(data.needsScanUI);
                            if (data.isRaining !== undefined) setIsRaining(data.isRaining);
                        }
                    });
                return () => unsubscribe();
            }, [db]);

            const updateData = (data) => {
                if (db) {
                    db.collection('operaciones').doc('turno_actual').set(data, { merge: true });
                }
            };

            React.useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now);
                    const hours = now.getHours();
                    const minutes = now.getMinutes();
                    const secs = now.getSeconds();

                    // Cambio de Turno Automático
                    if (hours >= 7 && hours < 19) {
                        setActiveShift("Turno Diurno");
                    } else {
                        setActiveShift("Turno Nocturno");
                    }

                    // Alertas Programadas
                    if (hours === 7 && minutes === 50 && secs === 0) {
                        speak("Atención comandantes, junta operativa en 10 minutos.");
                    }
                    if (hours === 12 && minutes === 0 && secs === 0) {
                        speak("Atención, es hora de elaborar los K P I.");
                        setModal({ isOpen: true, title: "⏰ 12:00 PM", message: "Hora de elaborar los KPIs.", type: "info" });
                    }
                    if ((hours === 0 || hours === 12) && minutes === 5 && secs === 0) {
                        speak("Atención, actualizar captura del clima, Ok to fly.");
                        setModal({ isOpen: true, title: "🌤️ Clima", message: "Actualizar captura del clima (OK to Fly) para garantizar seguridad.", type: "warning" });
                    }

                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const generateIntelligentSchedule = (hourlyWeatherData) => {
                let windMap = {};
                for(let i=0; i<24; i++) windMap[i] = 0;

                if (hourlyWeatherData && hourlyWeatherData.length > 0) {
                     hourlyWeatherData.forEach(dataPoint => {
                          let hourMatch = dataPoint.time.match(/(\d+):00([ap]m)/i);
                          if (hourMatch) {
                               let hour = parseInt(hourMatch[1]);
                               let ampm = hourMatch[2].toLowerCase();
                               if (ampm === 'pm' && hour < 12) hour += 12;
                               if (ampm === 'am' && hour === 12) hour = 0;
                               
                               // Regla estricta: Si a las 11 AM dice solo UV, es vuelo seguro (viento 0)
                               if (hour === 11 && dataPoint.wind === 0 && dataPoint.rawText && dataPoint.rawText.includes('UV')) {
                                   windMap[11] = 0;
                               } else {
                                   windMap[hour] = dataPoint.wind;
                               }
                          }
                     });
                }

                setWindDataMap(windMap);
                updateData({ windDataMap: windMap });

                // Función para aplicar Variabilidad Táctica a los vuelos
                const applyVariance = (timeStr, isForzoso = false) => {
                    if (isForzoso) return timeStr; // Forzosos no cambian
                    
                    let [h, m] = timeStr.split(':').map(Number);
                    // Variación entre -15 y +15 minutos
                    let variance = Math.floor(Math.random() * 31) - 15; 
                    let date = new Date(2026, 0, 1, h, m + variance);
                    
                    let newH = String(date.getHours()).padStart(2, '0');
                    let newM = String(date.getMinutes()).padStart(2, '0');
                    return `${newH}:${newM}`;
                };

                let newSchedule = [];

                const isSuspendedAt11 = windMap[11] >= 40;
                const isSuspendedAt12 = windMap[12] >= 40 && !isSuspendedAt11;

                // 1. BLOQUE MAÑANA
                if (isSuspendedAt11) {
                    newSchedule.push(
                        { time: applyVariance("06:00"), type: "DINÁMICO", wind: windMap[6] || 0, hour24: 6 },
                        { time: applyVariance("07:20", true), type: "FORZOSO", wind: windMap[7] || 0, hour24: 7 },
                        { time: applyVariance("08:30"), type: "DINÁMICO", wind: windMap[8] || 0, hour24: 8 },
                        { time: applyVariance("09:45"), type: "DINÁMICO", wind: windMap[9] || 0, hour24: 9 }
                    );
                } else if (isSuspendedAt12) {
                    // Exactamente 5 vuelos con intervalo de 1 hr desde las 7:20
                    newSchedule.push(
                        { time: applyVariance("07:20", true), type: "FORZOSO", wind: windMap[7] || 0, hour24: 7 },
                        { time: applyVariance("08:20"), type: "DINÁMICO", wind: windMap[8] || 0, hour24: 8 },
                        { time: applyVariance("09:20"), type: "DINÁMICO", wind: windMap[9] || 0, hour24: 9 },
                        { time: applyVariance("10:20"), type: "DINÁMICO", wind: windMap[10] || 0, hour24: 10 },
                        { time: applyVariance("11:20"), type: "DINÁMICO", wind: windMap[11] || 0, hour24: 11 } 
                    );
                } else {
                    newSchedule.push(
                        { time: applyVariance("07:20", true), type: "FORZOSO", wind: windMap[7] || 0, hour24: 7 },
                        { time: applyVariance("08:40"), type: "DINÁMICO", wind: windMap[8] || 0, hour24: 8 },
                        { time: applyVariance("10:00"), type: "DINÁMICO", wind: windMap[10] || 0, hour24: 10 },
                        { time: applyVariance("11:30"), type: "DINÁMICO", wind: windMap[11] || 0, hour24: 11 },
                        { time: applyVariance("12:45"), type: "DINÁMICO", wind: windMap[12] || 0, hour24: 12 }
                    );
                }

                // 2. BLOQUE TARDE
                newSchedule.push(
                    { time: applyVariance("14:00", true), type: "FORZOSO", wind: windMap[14] || 20, hour24: 14 },
                    { time: applyVariance("15:30"), type: "DINÁMICO", wind: windMap[15] || 20, hour24: 15 },
                    { time: applyVariance("17:00", true), type: "FORZOSO", wind: windMap[17] || 20, hour24: 17 },
                    { time: applyVariance("18:30"), type: "DINÁMICO", wind: windMap[18] || 0, hour24: 18 }
                );
                
                // 3. BLOQUE NOCTURNO (Recuperación)
                newSchedule.push(
                    { time: applyVariance("20:00"), type: "RECUPERAR", wind: windMap[20] || 0, hour24: 20 },
                    { time: applyVariance("21:10", true), type: "FORZOSO", wind: windMap[21] || 0, hour24: 21 },
                    { time: applyVariance("22:20"), type: "RECUPERAR", wind: windMap[22] || 0, hour24: 22 },
                    { time: applyVariance("23:30"), type: "RECUPERAR", wind: windMap[23] || 0, hour24: 23 }
                );
                
                // Ordenar cronológicamente
                newSchedule.sort((a, b) => {
                    let timeA = a.time.split(':').map(Number);
                    let timeB = b.time.split(':').map(Number);
                    return (timeA[0] * 60 + timeA[1]) - (timeB[0] * 60 + timeB[1]);
                });

                setFlights(newSchedule);
                updateData({ flights: newSchedule, needsScanUI: false });
                setNeedsScanUI(false);
            };

            const toggleRainProtocol = () => {
                const newState = !isRaining;
                setIsRaining(newState);
                updateData({ isRaining: newState });
                
                if (newState) {
                    speak("Alerta de lluvia. Operaciones suspendidas temporalmente.");
                    setModal({ isOpen: true, title: "🌧️ Lluvia Declarada", message: "Las operaciones están bloqueadas hasta nuevo aviso.", type: "error" });
                } else {
                    speak("Lluvia finalizada. Reprogramando itinerario restante.");
                    // Reprogramar los que faltan
                    const flightsDone = todayFlightsTotal.length;
                    const flightsLeft = 13 - flightsDone;
                    
                    if (flightsLeft > 0) {
                        const h = currentTime.getHours();
                        const m = currentTime.getMinutes();
                        let startMins = h * 60 + m + 15; // Empezar en 15 mins
                        const endMins = 23 * 60 + 30; // Límite 23:30
                        
                        let newRemaining = [];
                        if (startMins < endMins) {
                            const interval = (endMins - startMins) / (flightsLeft > 1 ? flightsLeft - 1 : 1);
                            
                            for(let i=0; i<flightsLeft; i++) {
                                let flightMins = Math.floor(startMins + (i * interval));
                                let fh = Math.floor(flightMins / 60);
                                let fm = flightMins % 60;
                                let timeStr = `${String(fh).padStart(2,'0')}:${String(fm).padStart(2,'0')}`;
                                
                                newRemaining.push({
                                    time: timeStr,
                                    type: "REPROGRAMADO",
                                    wind: windDataMap[fh] || 0,
                                    hour24: fh
                                });
                            }
                            
                            // Reemplazar solo vuelos futuros
                            const pastFlights = flights.filter(f => {
                                const fMins = parseInt(f.time.split(':')[0]) * 60 + parseInt(f.time.split(':')[1]);
                                return fMins < (h * 60 + m);
                            });
                            
                            const finalSchedule = [...pastFlights, ...newRemaining];
                            setFlights(finalSchedule);
                            updateData({ flights: finalSchedule });
                        }
                    }
                    
                    setModal({ isOpen: true, title: "☀️ Cielo Despejado", message: "Itinerario recalculado para lo que resta del día.", type: "success" });
                }
            };

            const handleImageUpload = async (event) => {
                const file = event.target.files[0];
                if (!file || !settings.geminiKey) {
                    if (!settings.geminiKey) setModal({ isOpen: true, title: 'Falta API Key', message: 'Configura tu clave de Gemini en Ajustes ⚙️', type: 'error' });
                    return;
                }

                setIsScanning(true);
                speak("Analizando condiciones meteorológicas...");
                
                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        const base64Data = reader.result.split(',')[1];
                        
                        const payload = {
                            contents: [{
                                parts: [
                                    { text: "Extrae el pronóstico de viento hora por hora de esta imagen. Devuelve SOLO un array JSON válido con objetos { 'time': '7:00am', 'wind': 20, 'rawText': 'Ráfagas fuertes' }. Si ves Ráfagas >20m, >40m o >80m, pon el wind en 45. Si dice 'Apto para volar', pon wind en 0. Si dice 'UV', pon wind en 0." },
                                    { inline_data: { mime_type: file.type, data: base64Data } }
                                ]
                            }],
                            generationConfig: { temperature: 0.1 }
                        };

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.6-flash:generateContent?key=${settings.geminiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.error?.message || 'Error de conexión con IA');
                        }

                        const result = await response.json();
                        const textContent = result.candidates[0].content.parts[0].text;
                        
                        let jsonStr = textContent.replace(/```json/g, '').replace(/```/g, '').trim();
                        const weatherData = JSON.parse(jsonStr);
                        
                        generateIntelligentSchedule(weatherData);
                        speak("Itinerario de vuelos calculado exitosamente.");
                        setModal({ isOpen: true, title: 'Análisis Completado', message: 'Itinerario actualizado con los datos del clima.', type: 'success' });
                    };
                } catch (error) {
                    console.error(error);
                    speak("Error al analizar el clima.");
                    setModal({ isOpen: true, title: 'Error de IA', message: error.message, type: 'error' });
                } finally {
                    setIsScanning(false);
                    event.target.value = '';
                }
            };

            const handleLogFlight = () => {
                if (isSuspendedNow) {
                    setModal({ isOpen: true, title: 'Operación Bloqueada', message: 'No puedes registrar despegues. Viento fuera de límites o lluvia activa.', type: 'error' });
                    return;
                }

                const flightTime = currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const newLog = {
                    id: Date.now(),
                    time: flightTime,
                    timestamp: currentTime.toISOString(),
                    shift: activeShift,
                    wind: currentWind
                };
                
                const updatedLogs = [newLog, ...todayFlightsTotal].sort((a,b) => b.id - a.id);
                setTodayFlightsTotal(updatedLogs);
                updateData({ todayFlightsTotal: updatedLogs });
                
                speak("Vuelo registrado en bitácora.");
                setModal({ isOpen: true, title: "¡Despegue Registrado!", message: `Vuelo de las ${flightTime} registrado exitosamente.`, type: "success" });
            };

            const handleSaveSettings = (e) => {
                e.preventDefault();
                localStorage.setItem('geminiKey', settings.geminiKey);
                localStorage.setItem('firebaseConfigText', settings.firebaseConfigText);
                setIsSettingsOpen(false);
                setModal({ isOpen: true, title: 'Guardado', message: 'Configuración actualizada.', type: 'success' });
            };

            const shiftTarget = 7;
            const shiftFlightsDone = todayFlightsTotal.filter(f => f.shift === "Turno Diurno").length;
            let currentTargetDisplay = 0;
            let currentTargetLabel = "";
            let targetColorClass = "";

            if (activeShift === "Turno Diurno") {
                currentTargetDisplay = Math.max(0, shiftTarget - shiftFlightsDone);
                currentTargetLabel = "Meta Restante Turno Diurno";
                targetColorClass = "text-amber-500 border-amber-900 bg-amber-950/30 shadow-[0_0_30px_rgba(245,158,11,0.2)]";
            } else {
                currentTargetDisplay = Math.max(0, 13 - todayFlightsTotal.length);
                currentTargetLabel = "Vuelos Heredados a Turno Nocturno";
                targetColorClass = "text-fuchsia-400 border-fuchsia-900 bg-fuchsia-950/30 shadow-[0_0_30px_rgba(232,121,249,0.2)]";
            }

            return (
                <div className="max-w-5xl mx-auto p-4 sm:p-6 pb-24" onClick={unlockAudio}>
                    
                    {/* Header */}
                    <header className="flex justify-between items-center mb-6">
                        <div>
                            <h1 className="text-xl sm:text-2xl font-black tracking-tight text-white flex items-center gap-2">
                                <span className="bg-indigo-600 text-white px-2 py-0.5 rounded-md text-sm">DP</span>
                                DISPATCHER PRO
                            </h1>
                            <p className="text-xs font-medium text-indigo-400 tracking-widest mt-1">
                                V43 MASTER • {db ? <span className="text-emerald-400">🟢 NUBE CONECTADA</span> : <span className="text-rose-500 animate-pulse">🔴 NUBE DESCONECTADA</span>}
                            </p>
                        </div>
                        <button onClick={() => setIsSettingsOpen(true)} className="p-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl transition border border-slate-700">
                            ⚙️
                        </button>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* LEFT COLUMN */}
                        <div className="lg:col-span-2 space-y-6">
                            
                            {/* STATUS PANEL V38 STYLE */}
                            <div className="glass p-6 rounded-3xl relative overflow-hidden border border-slate-800">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div>
                                        <p className="text-[10px] font-black tracking-widest text-indigo-400 uppercase mb-1">Turno en curso</p>
                                        <h2 className="text-3xl font-black text-white tracking-tight">{activeShift}</h2>
                                        <div className="mt-2 text-4xl font-mono font-bold text-white tracking-wider flex items-center gap-3">
                                            {!audioUnlocked && <span className="text-xs animate-pulse text-amber-500 border border-amber-500/50 bg-amber-500/10 px-2 py-1 rounded cursor-pointer" onClick={unlockAudio}>🔇 Toca para Audio</span>}
                                            {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col gap-2 w-full sm:w-auto">
                                        <input type="file" id="file-upload-input" accept="image/*" onChange={handleImageUpload} className="hidden" />
                                        <button 
                                            onClick={() => document.getElementById('file-upload-input').click()} 
                                            disabled={isScanning}
                                            className={`w-full sm:w-48 py-4 rounded-2xl transition border font-bold text-sm tracking-wide ${isScanning ? 'bg-indigo-900/50 border-indigo-400 text-white animate-pulse' : needsScanUI ? 'bg-rose-600 border-rose-400 shadow-[0_0_20px_rgba(225,29,72,0.4)] text-white animate-pulse' : 'bg-slate-800 border-slate-700 hover:bg-slate-700 text-slate-300'}`}>
                                            {isScanning ? '⏳ Analizando...' : '📸 ESCANEAR CLIMA'}
                                        </button>
                                        
                                        <div className="grid grid-cols-2 gap-2 w-full sm:w-48">
                                            <button onClick={toggleRainProtocol} className={`py-2 rounded-xl text-xs font-bold border transition ${isRaining ? 'bg-amber-500 text-black border-amber-400 shadow-[0_0_15px_rgba(245,158,11,0.5)]' : 'bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700'}`}>
                                                {isRaining ? '☀️ Reanudar' : '🌧️ Lluvia'}
                                            </button>
                                            <button onClick={handleLogFlight} disabled={isSuspendedNow} className={`py-2 rounded-xl text-xs font-bold border transition ${isSuspendedNow ? 'bg-slate-900 text-slate-600 border-slate-800 opacity-50 cursor-not-allowed' : 'bg-indigo-600 text-white border-indigo-500 hover:bg-indigo-500'}`}>
                                                ✈️ Registrar
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* PLAN DE VUELOS CALCULADO */}
                            <div className="glass rounded-3xl p-5 border border-slate-800">
                                <h3 className="text-[11px] font-black tracking-widest text-slate-400 uppercase mb-4 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-indigo-500 rounded-sm"></span> PLAN RESTANTE (CALCULADO)
                                </h3>
                                
                                {flights.length === 0 ? (
                                    <div className="text-center py-10 bg-[#0f172a] rounded-2xl border border-slate-800">
                                        <span className="text-4xl mb-3 block opacity-50">📋</span>
                                        <p className="text-slate-400 font-medium text-sm">Escanea el clima para generar el itinerario.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {flights.map((f, i) => {
                                            const [fh, fm] = f.time.split(':').map(Number);
                                            const fTime = fh * 60 + fm;
                                            const currTime = currentTime.getHours() * 60 + currentTime.getMinutes();
                                            const isPast = fTime < currTime;
                                            
                                            // Decoración según tipo de vuelo
                                            let badgeClass = 'bg-slate-800 text-slate-400 border-slate-700';
                                            if (f.type === 'FORZOSO') badgeClass = 'bg-indigo-950 text-indigo-400 border-indigo-900';
                                            if (f.type === 'REPROGRAMADO') badgeClass = 'bg-amber-950 text-amber-500 border-amber-900';
                                            if (f.type === 'RECUPERAR') badgeClass = 'bg-fuchsia-950/30 text-fuchsia-400 border-fuchsia-900';

                                            return (
                                                <div key={i} className={`flex justify-between items-center p-4 bg-[#0f172a] border rounded-2xl transition-all ${isPast ? 'opacity-30 grayscale border-slate-800' : f.wind >= 40 ? 'border-rose-900/50' : 'border-slate-800 hover:border-indigo-500/30'}`}>
                                                    <div>
                                                        <div className={`text-xl font-black tracking-wide ${f.wind >= 40 ? 'text-rose-400' : 'text-white'}`}>{f.time}</div>
                                                        <div className={`text-[10px] font-bold mt-1 uppercase tracking-wider flex items-center gap-1.5 ${f.wind >= 40 ? 'text-rose-500' : 'text-emerald-400'}`}>
                                                            {f.wind >= 40 ? `🚫 SUSPENDIDO (${f.wind} KM/H)` : `✅ LIBRE (${f.wind} KM/H)`}
                                                        </div>
                                                    </div>
                                                    <span className={`text-[9px] font-black uppercase px-2.5 py-1 rounded border ${badgeClass}`}>
                                                        {f.type}
                                                    </span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* RIGHT COLUMN: METAS Y BITÁCORA */}
                        <div className="space-y-6">
                            
                            {/* METAS GIGANTES */}
                            <div className="glass rounded-3xl p-6 border border-slate-800 flex flex-col items-center justify-center text-center">
                                {/* Meta del Turno Actual */}
                                <div className={`w-full p-4 rounded-2xl border ${targetColorClass} mb-4 transition-all duration-500`}>
                                    <p className="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">{currentTargetLabel}</p>
                                    <div className="text-6xl font-black tracking-tighter">
                                        {currentTargetDisplay}
                                    </div>
                                </div>
                                
                                {/* Meta Global del Día */}
                                <p className="text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Meta Global del Día</p>
                                <div className="text-5xl font-black text-white tracking-tighter">
                                    {todayFlightsTotal.length} <span className="text-3xl text-slate-600">/ 13</span>
                                </div>
                            </div>
                            
                            {/* ESTADO ACTUAL */}
                            <div className="glass rounded-3xl p-5 border border-slate-800">
                                <h3 className="text-[11px] font-black tracking-widest text-slate-400 uppercase mb-4">Condición Actual</h3>
                                <div className={`p-4 rounded-2xl border flex items-center justify-between ${isSuspendedNow ? 'bg-rose-950/30 border-rose-900/50' : 'bg-emerald-950/20 border-emerald-900/30'}`}>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase">VIENTO</p>
                                        <p className={`text-2xl font-black ${isSuspendedNow ? 'text-rose-500' : 'text-emerald-400'}`}>{currentWind} <span className="text-sm">km/h</span></p>
                                    </div>
                                    <div className={`text-3xl ${isSuspendedNow ? 'animate-pulse' : ''}`}>
                                        {isRaining ? '🌧️' : isSuspendedNow ? '🚫' : '✅'}
                                    </div>
                                </div>
                            </div>
                            
                            {/* BITÁCORA */}
                            <div className="glass rounded-3xl p-5 border border-slate-800">
                                <h3 className="text-[11px] font-black tracking-widest text-slate-400 uppercase mb-4">Bitácora de Despegues</h3>
                                <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                                    {todayFlightsTotal.length === 0 ? (
                                        <div className="text-center py-6 text-xs text-slate-500 font-medium bg-[#0f172a] rounded-xl border border-slate-800">Sin vuelos registrados hoy.</div>
                                    ) : (
                                        todayFlightsTotal.map((f, i) => (
                                            <div key={i} className="flex justify-between items-center p-3 rounded-xl bg-[#0f172a] border border-slate-800">
                                                <div>
                                                    <span className="text-white font-bold text-sm block">{f.time}</span>
                                                    <span className="text-[9px] text-slate-500 uppercase">{f.shift}</span>
                                                </div>
                                                <span className="text-[10px] font-bold text-emerald-400 bg-emerald-950/30 px-2 py-1 rounded-md border border-emerald-900/50">{f.wind} km/h</span>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* MODALES Y SETTINGS */}
                    {modal.isOpen && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="glass p-6 rounded-3xl max-w-sm w-full border border-slate-700 text-center animate-bounce-short">
                                <div className="text-4xl mb-4">
                                    {modal.type === 'error' ? '❌' : modal.type === 'success' ? '✅' : modal.type === 'warning' ? '⚠️' : 'ℹ️'}
                                </div>
                                <h3 className="text-xl font-black text-white mb-2">{modal.title}</h3>
                                <p className="text-slate-300 text-sm mb-6">{modal.message}</p>
                                <button onClick={() => setModal({ ...modal, isOpen: false })} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition">
                                    Entendido
                                </button>
                            </div>
                        </div>
                    )}

                    {isSettingsOpen && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="glass p-6 rounded-3xl max-w-md w-full border border-slate-700">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-white">Configuración del Sistema</h2>
                                    <button onClick={() => setIsSettingsOpen(false)} className="text-slate-400 hover:text-white">✕</button>
                                </div>
                                <form onSubmit={handleSaveSettings} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Gemini API Key (Modelo 3.6)</label>
                                        <input type="password" value={settings.geminiKey} onChange={(e) => setSettings({...settings, geminiKey: e.target.value})} className="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 text-white focus:border-indigo-500 outline-none" placeholder="AQ.Ab8..." />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Firebase Config (JSON)</label>
                                        <textarea value={settings.firebaseConfigText} onChange={(e) => setSettings({...settings, firebaseConfigText: e.target.value})} className="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 text-white font-mono text-xs h-32 focus:border-indigo-500 outline-none" placeholder='{ "apiKey": "AIza...", ... }'></textarea>
                                    </div>
                                    <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition mt-4">
                                        Guardar y Conectar
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
