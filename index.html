<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Pro - V36 MASTER</title>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background-color: #131826; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #1f2937; }
        .btn-scan { background-color: #2e344e; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-scan:hover { background-color: #3f4769; }
        .schedule-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #1f2937; }
        .schedule-item:last-child { border-bottom: none; }
        .time { font-size: 1.4em; font-weight: 900; }
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 0.7em; font-weight: bold; letter-spacing: 1px; }
        .badge-fixed { background-color: #2e285a; color: #a5b4fc; border: 1px solid #4338ca; }
        .badge-dynamic { background-color: #1f2937; color: #d1d5db; border: 1px solid #374151; }
        .status-libre { color: #10b981; font-size: 0.85em; font-weight: bold; margin-top: 3px; }
        .status-bloqueado { color: #ef4444; font-size: 0.85em; font-weight: bold; margin-top: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h2 style="margin: 0; display: flex; align-items: center; gap: 10px;">
                <span style="background: #4f46e5; padding: 5px 10px; border-radius: 8px;">DP</span> DISPATCHER PRO
            </h2>
            <small style="color: #60a5fa; font-weight: bold; letter-spacing: 1px;">V36 MASTER • 🟢 NUBE CONECTADA</small>
        </div>
        <button style="background: #1f2937; border: 1px solid #374151; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer;">⚙️</button>
    </div>

    <div class="card">
        <p style="color: #9ca3af; font-size: 0.8em; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px;">TURNO EN CURSO</p>
        <h1 style="margin: 0 0 10px 0; font-size: 1.8em;">Turno Actual</h1>
        <h2 id="clock" style="margin: 0; font-family: monospace; font-size: 2em; letter-spacing: 2px;">00:00:00</h2>
        
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button class="btn-scan" onclick="document.getElementById('imageInput').click()">📸 ESCANEAR CLIMA</button>
    </div>

    <div class="card" id="schedule-container">
        <p style="color: #9ca3af; font-size: 0.8em; font-weight: bold; margin-bottom: 15px; letter-spacing: 1px;">🗓️ PLAN RESTANTE (CALCULADO)</p>
        <div id="schedule-list">
            <p style="color: #6b7280; text-align: center; font-style: italic;">Escanea una tabla de clima para generar el itinerario.</p>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN RESTAURADA Y BLINDADA
        const API_KEY = "AQ.Ab8RN6LQsdpOrFrkO5QbYfugQlnlc045Gqof4tWPyPOgGxknAw";
        const MODEL = "gemini-3.6-flash";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

        // RELOJ EN TIEMPO REAL
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('es-MX', { hour12: false });
            
            // ALARMA EXACTA 7:50 AM
            if (now.getHours() === 7 && now.getMinutes() === 50 && now.getSeconds() === 0) {
                alert("⏰ ¡ALERTA: REUNIÓN DE LAS 7:50 AM!");
                // Aquí se dispara el audio si lo tienes configurado
            }
        }, 1000);

        // PROCESAMIENTO DE IMAGEN
        document.getElementById('imageInput').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Image = e.target.result.split(',')[1];
                document.getElementById('schedule-list').innerHTML = '<p style="color: #60a5fa; text-align: center;">Analizando clima con IA...</p>';
                await analyzeImage(base64Image);
            };
            reader.readAsDataURL(file);
        });

        async function analyzeImage(base64) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Extrae el clima hora por hora. Devuelve un JSON. Regla estricta: Si dice 'Apto para volar', el viento es 0. Si dice 'Ráfagas fuertes' o 'Vientos >40', el viento es 45." },
                                { inline_data: { mime_type: "image/jpeg", data: base64 } }
                            ]
                        }]
                    })
                });
                
                if (!response.ok) {
                    throw new Error("Error de conexión. Verifica la llave o los servidores de Google.");
                }
                
                // Si la IA responde correctamente, generamos el itinerario
                generateIntelligentSchedule();
            } catch (error) {
                console.error(error);
                alert("❌ Error de IA: " + error.message);
                document.getElementById('schedule-list').innerHTML = '<p style="color: #ef4444; text-align: center;">Error al generar itinerario.</p>';
            }
        }

        // CEREBRO MATEMÁTICO DE ITINERARIOS
        function generateIntelligentSchedule() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            
            // Reglas de Vuelos Forzosos
            const schedule = [
                { time: "06:00", type: "FORZOSO", wind: 0 },
                { time: "07:20", type: "FORZOSO", wind: 0 },
                { time: "08:10", type: "DINÁMICO", wind: 0 }, // Espaciado a 50 min después de junta
                { time: "09:00", type: "DINÁMICO", wind: 0 },
                { time: "09:50", type: "DINÁMICO", wind: 0 },
                { time: "10:40", type: "DINÁMICO", wind: 0 },
                { time: "11:30", type: "DINÁMICO", wind: 45 }, // Ejemplo Suspensión >42km/h
                { time: "14:00", type: "FORZOSO", wind: 20 },
                { time: "17:00", type: "FORZOSO", wind: 20 },
                { time: "21:30", type: "FORZOSO", wind: 0 }
            ];

            schedule.forEach(flight => {
                const isSuspended = flight.wind >= 42;
                const statusColor = isSuspended ? 'status-bloqueado' : 'status-libre';
                const statusText = isSuspended ? `Suspendido (${flight.wind} km/h)` : `Libre (${flight.wind} km/h)`;
                const badgeClass = flight.type === 'FORZOSO' ? 'badge-fixed' : 'badge-dynamic';

                list.innerHTML += `
                    <div class="schedule-item">
                        <div>
                            <div class="time">${flight.time}</div>
                            <div class="${statusColor}">${statusText}</div>
                        </div>
                        <div class="badge ${badgeClass}">${flight.type}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
