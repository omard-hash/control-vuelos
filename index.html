<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Pro - V41 Master</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { background-color: #0B0F19; color: white; font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; }
        .glass-card { background-color: #131826; border: 1px solid #1f2937; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .rain-overlay { background: linear-gradient(180deg, rgba(15,23,42,0.95) 0%, rgba(30,58,138,0.9) 100%); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyDXjwv133-dIKyprCktTUkjx_adAz1DhAY",
            authDomain: "control-vuelos.firebaseapp.com",
            projectId: "control-vuelos",
            storageBucket: "control-vuelos.firebasestorage.app",
            messagingSenderId: "756032981781",
            appId: "1:756032981781:web:451641e72abe3692c0771c"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const { useState, useEffect, useRef } = React;

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [shiftName, setShiftName] = useState('Turno Diurno');
            const [isScanning, setIsScanning] = useState(false);
            const [flights, setFlights] = useState([]);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_key') || '');
            const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'error' });
            
            const [loggedFlightsCount, setLoggedFlightsCount] = useState(0);
            const totalFlightsTarget = 13;

            // Variables de Lluvia y Clima
            const [isRaining, setIsRaining] = useState(false);
            const [windDataMap, setWindDataMap] = useState({});

            const [audioUnlocked, setAudioUnlocked] = useState(false);
            const audioUnlockedRef = useRef(false);

            useEffect(() => {
                let unsubscribe = () => {};

                firebase.auth().signInAnonymously().then(() => {
                    unsubscribe = db.collection('operaciones').doc('turno_actual').onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.flights) setFlights(data.flights);
                            if (data.loggedFlightsCount !== undefined) setLoggedFlightsCount(data.loggedFlightsCount);
                            if (data.isRaining !== undefined) setIsRaining(data.isRaining);
                            if (data.windDataMap) setWindDataMap(data.windDataMap);
                        }
                    }, (err) => {
                        console.error("Error leyendo datos:", err);
                    });
                }).catch((error) => console.error("Error Auth:", error));

                return () => unsubscribe();
            }, []);

            useEffect(() => {
                audioUnlockedRef.current = audioUnlocked;
            }, [audioUnlocked]);

            const speak = (text) => {
                if (audioUnlockedRef.current && 'speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'es-MX';
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const unlockAudio = () => {
                if (!audioUnlocked) {
                    setAudioUnlocked(true);
                    audioUnlockedRef.current = true;
                    const u = new SpeechSynthesisUtterance("Sistema de voz listo.");
                    u.lang = 'es-MX';
                    u.volume = 0.3;
                    window.speechSynthesis.speak(u);
                }
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now);
                    
                    // Cálculo de Turno (Diurno 07:00-18:59, Nocturno 19:00-06:59)
                    const h = now.getHours();
                    if (h >= 7 && h < 19) {
                        setShiftName('Turno Diurno');
                    } else {
                        setShiftName('Turno Nocturno');
                    }
                    
                    // Alarma Junta 7:50 AM
                    if (now.getHours() === 7 && now.getMinutes() === 50 && now.getSeconds() === 0) {
                        speak("Atención comandante. Es hora de la junta operativa de las siete cincuenta.");
                        setModal({ isOpen: true, title: '⏰ JUNTA OPERATIVA', message: 'Reunión de las 7:50 AM.', type: 'error' });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!geminiKey || geminiKey.trim() === '') {
                    speak("Falta la llave de la inteligencia artificial.");
                    setModal({ isOpen: true, title: 'Falta la Llave', message: 'Abre los ajustes (⚙️) y pega tu llave API.' });
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64Data = event.target.result.split(',')[1];
                    analyzeImageWithAI(base64Data);
                };
                reader.readAsDataURL(file);
            };

            const analyzeImageWithAI = async (base64Image) => {
                setIsScanning(true);
                speak("Analizando el clima...");
                
                try {
                    const key = geminiKey.trim();
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.6-flash:generateContent?key=${key}`;
                    
                    const payload = {
                        contents: [{
                            parts: [
                                { text: "Analiza el clima. Regla ESTRICTA para 11:00am: Si solo dice 'UV' (ej. 'UV 10', 'Extremo UV 13') ES APTO PARA VOLAR, el viento es 0. Regla general: Si dice 'Apto para volar', viento es 0. Si dice 'Ráfagas fuertes' o vientos > 40, viento es 45. Devuelve JSON con 'hourlyData' teniendo 'time' y 'wind' numérico." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error("Error de conexión con Google. Verifica tu llave.");

                    const data = await response.json();
                    let aiResponseText = data.candidates[0].content.parts[0].text;
                    if (aiResponseText.startsWith('```json')) {
                         aiResponseText = aiResponseText.replace(/```json\n?/, '').replace(/```\n?$/, '');
                    }
                    
                    const parsedData = JSON.parse(aiResponseText);
                    if (parsedData && parsedData.hourlyData) {
                         generateIntelligentSchedule(parsedData.hourlyData);
                         speak("Itinerario calculado.");
                    } else {
                         throw new Error("Formato de respuesta incorrecto.");
                    }

                } catch (error) {
                    console.error("AI Error:", error);
                    speak("Error al analizar el clima.");
                    setModal({ isOpen: true, title: 'Error', message: error.message });
                    generateIntelligentSchedule([]); 
                } finally {
                    setIsScanning(false);
                }
            };

            const generateIntelligentSchedule = (hourlyWeatherData) => {
                let windMap = {};
                for(let i=0; i<24; i++) windMap[i] = 0; // Default

                if (hourlyWeatherData && hourlyWeatherData.length > 0) {
                     hourlyWeatherData.forEach(dataPoint => {
                          let hourMatch = dataPoint.time.match(/(\d+):00([ap]m)/i);
                          if (hourMatch) {
                               let hour = parseInt(hourMatch[1]);
                               let ampm = hourMatch[2].toLowerCase();
                               if (ampm === 'pm' && hour < 12) hour += 12;
                               if (ampm === 'am' && hour === 12) hour = 0;
                               windMap[hour] = dataPoint.wind;
                          }
                     });
                }

                // Guardar pronóstico del día en Nube para posibles reprogramaciones por lluvia
                setWindDataMap(windMap);
                db.collection('operaciones').doc('turno_actual').set({ windDataMap: windMap }, { merge: true });

                let newSchedule = [
                    { time: "06:00", type: "FORZOSO", wind: windMap[6] || 0, hour24: 6 },
                    { time: "07:20", type: "FORZOSO", wind: windMap[7] || 0, hour24: 7 }
                ];

                const isSuspendedAt11 = windMap[11] >= 40;
                const isSuspendedAt12 = windMap[12] >= 40 && !isSuspendedAt11;

                if (isSuspendedAt11) {
                    newSchedule.push(
                        { time: "08:30", type: "DINÁMICO", wind: windMap[8] || 0, hour24: 8 },
                        { time: "09:45", type: "DINÁMICO", wind: windMap[9] || 0, hour24: 9 },
                        { time: "11:00", type: "DINÁMICO", wind: windMap[11], hour24: 11 }, 
                        { time: "12:15", type: "DINÁMICO", wind: windMap[12] || 0, hour24: 12 }
                    );
                } else if (isSuspendedAt12) {
                    newSchedule.push(
                        { time: "08:20", type: "DINÁMICO", wind: windMap[8] || 0, hour24: 8 },
                        { time: "09:30", type: "DINÁMICO", wind: windMap[9] || 0, hour24: 9 },
                        { time: "10:45", type: "DINÁMICO", wind: windMap[10] || 0, hour24: 10 },
                        { time: "12:00", type: "DINÁMICO", wind: windMap[12], hour24: 12 } 
                    );
                } else {
                    newSchedule.push(
                        { time: "08:40", type: "DINÁMICO", wind: windMap[8] || 0, hour24: 8 },
                        { time: "10:00", type: "DINÁMICO", wind: windMap[10] || 0, hour24: 10 },
                        { time: "11:30", type: "DINÁMICO", wind: windMap[11] || 0, hour24: 11 },
                        { time: "12:45", type: "DINÁMICO", wind: windMap[12] || 0, hour24: 12 }
                    );
                }

                newSchedule.push(
                    { time: "14:00", type: "FORZOSO", wind: windMap[14] || 20, hour24: 14 },
                    { time: "15:30", type: "DINÁMICO", wind: windMap[15] || 20, hour24: 15 },
                    { time: "17:00", type: "FORZOSO", wind: windMap[17] || 20, hour24: 17 },
                    { time: "18:30", type: "DINÁMICO", wind: windMap[18] || 0, hour24: 18 },
                    { time: "20:00", type: "DINÁMICO", wind: windMap[20] || 0, hour24: 20 },
                    { time: "21:30", type: "FORZOSO", wind: windMap[21] || 0, hour24: 21 },
                    { time: "22:45", type: "DINÁMICO", wind: windMap[22] || 0, hour24: 22 }
                );
                
                setFlights(newSchedule);
                db.collection('operaciones').doc('turno_actual').set({ flights: newSchedule }, { merge: true });
            };

            const toggleRainProtocol = () => {
                const newState = !isRaining;
                setIsRaining(newState);
                db.collection('operaciones').doc('turno_actual').set({ isRaining: newState }, { merge: true });

                if (newState) {
                    speak("Alerta. Operaciones suspendidas por lluvia local.");
                } else {
                    speak("Lluvia finalizada. Reprogramando itinerario restante.");
                    recalculateAfterRain();
                }
            };

            const recalculateAfterRain = () => {
                const currentHour = currentTime.getHours();
                const currentMinute = currentTime.getMinutes();
                const remaining = totalFlightsTarget - loggedFlightsCount;

                if (remaining <= 0) {
                    speak("Meta alcanzada. No se requieren reprogramar vuelos hoy.");
                    return;
                }

                const endTime = 22 * 60 + 45; // 22:45 hrs
                const currentTimeInMins = currentHour * 60 + currentMinute + 15; // Empezar en 15 mins
                const timeWindow = endTime - currentTimeInMins;
                
                if (timeWindow <= 0) {
                    speak("El día está por terminar. No hay tiempo para reprogramar.");
                    return;
                }

                const interval = Math.floor(timeWindow / remaining);
                let newSchedule = [];
                let currentSlot = currentTimeInMins;

                for (let i = 0; i < remaining; i++) {
                    let h = Math.floor(currentSlot / 60);
                    let m = Math.floor(currentSlot % 60);
                    let timeStr = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                    let windAtHour = windDataMap[h] || 0;

                    newSchedule.push({
                        time: timeStr,
                        type: "REPROGRAMADO",
                        wind: windAtHour,
                        hour24: h
                    });
                    currentSlot += interval;
                }
                
                setFlights(newSchedule);
                db.collection('operaciones').doc('turno_actual').set({ flights: newSchedule }, { merge: true });
            };

            const handleLogManualFlight = () => {
                 if (isRaining) {
                     setModal({ isOpen: true, title: 'Operación Suspendida', message: 'No puedes registrar vuelos mientras el protocolo de lluvia esté activo.', type: 'error' });
                     return;
                 }
                 if (loggedFlightsCount < totalFlightsTarget) {
                      const newCount = loggedFlightsCount + 1;
                      setLoggedFlightsCount(newCount);
                      db.collection('operaciones').doc('turno_actual').set({ loggedFlightsCount: newCount }, { merge: true });
                      speak("Vuelo registrado exitosamente.");
                 } else {
                      speak("Límite alcanzado para hoy.");
                 }
            };

            return (
                <div className="min-h-screen p-4 max-w-2xl mx-auto pb-24" onClick={unlockAudio}>
                    
                    {/* Header */}
                    <div className="flex justify-between items-center mb-5">
                        <div>
                            <h1 className="text-lg md:text-xl font-black tracking-tight flex items-center gap-2">
                                <span className="bg-indigo-600 text-white px-2 py-0.5 rounded text-xs">DP</span>
                                DISPATCHER PRO
                            </h1>
                            <p className="text-[10px] font-bold text-indigo-400 mt-1 tracking-widest uppercase">V41 MASTER • 🟢 NUBE CONECTADA</p>
                        </div>
                        <button 
                            onClick={(e) => { e.stopPropagation(); setSettingsOpen(true); }}
                            className="bg-[#1f2937] hover:bg-[#374151] p-2.5 rounded-lg border border-slate-700 transition"
                        >
                            ⚙️
                        </button>
                    </div>

                    {!audioUnlocked && (
                        <div className="bg-amber-500/20 border border-amber-500/50 text-amber-400 text-xs font-bold text-center p-2 rounded-lg mb-4 animate-pulse">
                            🔇 Toca cualquier parte de la pantalla para activar la voz
                        </div>
                    )}

                    {/* Current Shift Card */}
                    <div className="glass-card p-5 rounded-2xl mb-5 relative overflow-hidden">
                        
                        <div className="absolute top-5 right-5 text-right">
                             <p className="text-[10px] font-bold tracking-widest text-slate-400 uppercase mb-0.5">Meta Diaria</p>
                             <div className="text-xl font-black text-indigo-400">
                                  {loggedFlightsCount} <span className="text-slate-500 text-base">/ {totalFlightsTarget}</span>
                             </div>
                        </div>

                        <p className="text-[10px] font-bold tracking-widest text-slate-400 uppercase mb-1">{shiftName}</p>
                        <h2 className="text-2xl font-black text-white">{shiftName === 'Turno Diurno' ? '☀️ Día' : '🌙 Noche'}</h2>
                        <div className="mt-1 text-3xl font-mono font-bold text-white tracking-wider mb-5">
                            {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                        </div>
                        
                        <div className="grid grid-cols-2 gap-3">
                            <input type="file" id="upload" accept="image/*" className="hidden" onChange={handleImageUpload} />
                            <button 
                                onClick={(e) => { e.stopPropagation(); document.getElementById('upload').click(); }}
                                disabled={isScanning || isRaining}
                                className={`w-full py-3 rounded-xl font-bold text-sm transition flex justify-center items-center gap-2 ${isScanning ? 'bg-indigo-900/50 text-indigo-300 animate-pulse' : isRaining ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-[#1e293b] hover:bg-[#334155] text-white border border-slate-700'}`}
                            >
                                {isScanning ? '⏳ Analizando...' : '📸 IA CLIMA'}
                            </button>
                            
                            <button 
                                onClick={(e) => { e.stopPropagation(); toggleRainProtocol(); }}
                                className={`w-full py-3 rounded-xl font-bold text-sm transition flex justify-center items-center gap-2 ${isRaining ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)]' : 'bg-rose-900/40 hover:bg-rose-900/60 text-rose-400 border border-rose-900'}`}
                            >
                                {isRaining ? '☀️ REANUDAR' : '🌧️ LLUVIA LOCAL'}
                            </button>
                        </div>
                    </div>

                    {/* Alerta de Lluvia Activa */}
                    {isRaining && (
                        <div className="bg-rose-600 text-white text-center p-3 rounded-xl mb-5 font-black uppercase tracking-wider text-sm shadow-[0_0_20px_rgba(225,29,72,0.5)] animate-pulse">
                            ⚠️ OPERACIONES SUSPENDIDAS POR LLUVIA LOCAL ⚠️
                        </div>
                    )}

                    {/* Schedule List */}
                    <div className={`glass-card p-5 rounded-2xl mb-6 relative ${isRaining ? 'opacity-50 pointer-events-none' : ''}`}>
                        {isRaining && <div className="absolute inset-0 rain-overlay rounded-2xl z-10 flex items-center justify-center text-center p-4">
                            <span className="text-white font-bold text-lg">Esperando reanudación para recalcular...</span>
                        </div>}

                        <p className="text-[10px] font-bold tracking-widest text-slate-400 uppercase mb-3">🗓️ Plan Restante (Calculado)</p>
                        
                        {flights.length === 0 ? (
                            <div className="text-center py-6 text-xs font-bold text-slate-500">
                                Sube una captura para generar el itinerario.
                            </div>
                        ) : (
                            <div className="space-y-2.5">
                                {flights.map((f, i) => (
                                    <div key={i} className={`flex justify-between items-center p-3 bg-[#0f172a] border rounded-xl ${f.wind >= 42 ? 'border-rose-900/50 opacity-75' : 'border-slate-800'}`}>
                                        <div>
                                            <div className="text-lg font-black text-white tracking-wide">{f.time}</div>
                                            <div className={`text-[10px] font-bold mt-0.5 uppercase tracking-wider flex items-center gap-1 ${f.wind >= 42 ? 'text-rose-500' : 'text-emerald-400'}`}>
                                                {f.wind >= 42 ? `🚫 Suspendido (${f.wind} km/h)` : `✅ Libre (${f.wind} km/h)`}
                                            </div>
                                        </div>
                                        <span className={`text-[9px] font-black uppercase px-2.5 py-1 rounded border ${f.type === 'FORZOSO' ? 'bg-indigo-950 text-indigo-400 border-indigo-900' : f.type === 'REPROGRAMADO' ? 'bg-amber-950 text-amber-500 border-amber-900' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>
                                            {f.type}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Botón Flotante para Registrar Vuelo */}
                    <div className="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#0B0F19] via-[#0B0F19] to-transparent flex justify-center z-40 pointer-events-none">
                         <button 
                             onClick={(e) => { e.stopPropagation(); handleLogManualFlight(); }}
                             disabled={isRaining}
                             className={`pointer-events-auto w-full max-w-xs font-black py-3.5 rounded-xl transition transform hover:scale-105 ${isRaining ? 'bg-slate-800 text-slate-600' : 'bg-indigo-600 hover:bg-indigo-500 text-white shadow-[0_0_20px_rgba(79,70,229,0.4)]'}`}
                         >
                             ✈️ REGISTRAR VUELO
                         </button>
                    </div>

                    {/* Modal Ajustes */}
                    {settingsOpen && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4" onClick={(e) => e.stopPropagation()}>
                            <div className="bg-[#131826] border border-slate-800 rounded-2xl w-full max-w-sm shadow-2xl p-6">
                                <h2 className="text-lg font-black text-white mb-4">⚙️ Ajustes</h2>
                                
                                <div className="mb-5">
                                    <label className="block text-[10px] font-bold tracking-widest text-slate-400 uppercase mb-2">
                                        Llave Gemini API
                                    </label>
                                    <input 
                                        type="password" 
                                        value={geminiKey} 
                                        onChange={e => setGeminiKey(e.target.value)}
                                        placeholder="AQ. o AIzaSy..."
                                        className="w-full bg-[#1e293b] border border-slate-700 rounded-lg p-2.5 text-white focus:border-indigo-500 outline-none transition font-mono text-xs"
                                    />
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={() => setSettingsOpen(false)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 rounded-lg text-xs border border-slate-700">Cancelar</button>
                                    <button onClick={() => { localStorage.setItem('gemini_key', geminiKey); setSettingsOpen(false); speak("Ajustes guardados."); }} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-lg text-xs">Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
