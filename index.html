<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heliport Drone Dispatcher Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Módulos Compat) para fácil integración en un archivo -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Glassmorphism utils */
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600/20 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-600/20 rounded-full blur-[100px]"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MAX_WIND = 43;
        const DEFAULT_FORECAST = Array.from({ length: 24 }, (_, i) => ({
            time: `${i.toString().padStart(2, '0')}:00`,
            windGust: 25,
            condition: "Apto para volar (Base)"
        }));

        // Componente UI para Mensajes (Reemplaza a alert/confirm)
        const Modal = ({ isOpen, title, message, onClose, type = "info" }) => {
            if (!isOpen) return null;
            const colors = {
                error: "bg-rose-500",
                success: "bg-emerald-500",
                info: "bg-blue-500",
                warning: "bg-amber-500"
            };
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
                    <div className="bg-[#0f172a] border border-slate-700 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
                        <div className={`${colors[type]} h-2 w-full`}></div>
                        <div className="p-5">
                            <h3 className="text-lg font-bold text-white mb-2">{title}</h3>
                            <p className="text-sm text-slate-300 mb-6">{message}</p>
                            <button onClick={onClose} className="w-full py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition-colors">
                                Entendido
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [flights, setFlights] = useState(() => JSON.parse(localStorage.getItem('drone_flights_pro')) || []);
            const [forecast, setForecast] = useState(() => JSON.parse(localStorage.getItem('drone_forecast_pro')) || DEFAULT_FORECAST);
            const [lastScanDate, setLastScanDate] = useState(() => localStorage.getItem('drone_scan_date_pro') || "");
            
            // Configuraciones y Modos
            const [appMode, setAppMode] = useState(() => localStorage.getItem('drone_app_mode') || 'piloto'); // piloto | admin
            const [settingsOpen, setSettingsOpen] = useState(false);
            
            // LLAVES PREDEFINIDAS: Ya están integradas y listas para usar
            const [apiKeys, setApiKeys] = useState({
                gemini: "AQ.Ab8RN6Lu-oSyr3Qw9R-iO4Gpr95uBBgpsMT1nJ7Ivdu1w2M5sA",
                firebase: `{\n  "apiKey": "AIzaSyDXjwv133-dIKyprCktTUkjx_adAz1DHaY",\n  "authDomain": "control-vuelos.firebaseapp.com",\n  "projectId": "control-vuelos",\n  "storageBucket": "control-vuelos.firebasestorage.app",\n  "messagingSenderId": "756032981781",\n  "appId": "1:756032981781:web:451641e72abe3692c0771c"\n}`
            });
            
            // Nube y UI
            const [isCloudActive, setIsCloudActive] = useState(false);
            const [dbRef, setDbRef] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            const [audioUnlocked, setAudioUnlocked] = useState(false);
            
            // Modal state
            const [modal, setModal] = useState({ isOpen: false, title: "", message: "", type: "info" });

            const currentHourInt = currentTime.getHours();
            const currentMinInt = currentTime.getMinutes();
            const todayStr = currentTime.toDateString();
            const currentWind = forecast[currentHourInt]?.windGust || 0;
            const isFlightPermitted = currentWind <= MAX_WIND;
            
            const isNightShift = currentHourInt >= 19 || currentHourInt < 7;
            const activeShift = isNightShift ? "Turno Nocturno" : "Turno Diurno";

            useEffect(() => {
                if (!apiKeys.firebase) {
                    setIsCloudActive(false);
                    return;
                }

                try {
                    // Prevenir inicialización múltiple
                    if (!firebase.apps.length) {
                        const fbConfig = JSON.parse(apiKeys.firebase);
                        firebase.initializeApp(fbConfig);
                    }
                    const db = firebase.firestore();
                    const docRef = db.collection('drone_data').doc('master_log');
                    setDbRef(docRef);

                    // Escuchar cambios en vivo
                    const unsubscribe = docRef.onSnapshot((doc) => {
                        setIsCloudActive(true);
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.flights) {
                                setFlights(data.flights);
                                localStorage.setItem('drone_flights_pro', JSON.stringify(data.flights));
                            }
                            if (data.forecast) {
                                setForecast(data.forecast);
                                localStorage.setItem('drone_forecast_pro', JSON.stringify(data.forecast));
                            }
                            if (data.lastScanDate) {
                                setLastScanDate(data.lastScanDate);
                                localStorage.setItem('drone_scan_date_pro', data.lastScanDate);
                            }
                        }
                    }, (error) => {
                        console.error("Firebase Auth Error:", error);
                        setIsCloudActive(false);
                        setModal({ isOpen: true, title: "Error de Conexión", message: "Revisa la configuración de Firebase. Operando en Modo Local seguro.", type: "error" });
                    });

                    return () => unsubscribe();
                } catch (e) {
                    console.error("Firebase Init Error:", e);
                    setIsCloudActive(false);
                }
            }, [apiKeys.firebase]);

            const updateData = async (newData) => {
                // Guardar local siempre
                if (newData.flights) localStorage.setItem('drone_flights_pro', JSON.stringify(newData.flights));
                if (newData.forecast) localStorage.setItem('drone_forecast_pro', JSON.stringify(newData.forecast));
                if (newData.lastScanDate) localStorage.setItem('drone_scan_date_pro', newData.lastScanDate);

                // Guardar en nube si está disponible
                if (isCloudActive && dbRef) {
                    try {
                        await dbRef.set(newData, { merge: true });
                    } catch (e) {
                        console.warn("No se pudo sincronizar a la nube:", e);
                    }
                }
            };

            const speak = useCallback((text) => {
                if (!audioUnlocked) return;
                if (window.speechSynthesis.speaking) return; 
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-MX';
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }, [audioUnlocked]);

            // Desbloqueo de audio por interacción
            useEffect(() => {
                const unlockAudio = () => {
                    if (!audioUnlocked) {
                        setAudioUnlocked(true);
                        const u = new SpeechSynthesisUtterance("");
                        u.volume = 0;
                        window.speechSynthesis.speak(u);
                    }
                };
                window.addEventListener('click', unlockAudio);
                window.addEventListener('touchstart', unlockAudio);
                return () => {
                    window.removeEventListener('click', unlockAudio);
                    window.removeEventListener('touchstart', unlockAudio);
                };
            }, [audioUnlocked]);

            const generateDailyPlan = useCallback(() => {
                let plan = [];
                let scheduledHours = new Set();
                
                const todayFlights = flights.filter(f => new Date(f.timestamp).toDateString() === todayStr);

                const addForced = (h, m, name) => {
                    let wind = forecast[h]?.windGust || 0;
                    plan.push({
                        hour: h, min: m,
                        time: `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`,
                        type: name, isForced: true, wind: wind,
                        isPermitted: wind <= MAX_WIND,
                        isPast: (h < currentHourInt) || (h === currentHourInt && currentMinInt >= m)
                    });
                    scheduledHours.add(h);
                };

                addForced(6, 0, "Forzoso (Cambio Turno)");
                addForced(7, 20, "Forzoso (Llegada)");
                addForced(8, 25, "Forzoso (Post-Reunión)");
                addForced(14, 0, "Forzoso (Tarde)");
                addForced(21, 30, "Forzoso (Noche)");

                let needed = 13 - todayFlights.length;
                let futureForced = plan.filter(p => !p.isPast && p.isPermitted).length;
                let dynamicNeeded = needed - futureForced;

                if (dynamicNeeded > 0) {
                    for (let h = currentHourInt; h <= 23 && dynamicNeeded > 0; h++) {
                        let wind = forecast[h]?.windGust || 0;
                        if (!scheduledHours.has(h) && wind <= MAX_WIND) {
                            plan.push({
                                hour: h, min: 0,
                                time: `${h.toString().padStart(2,'0')}:00`,
                                type: "Vuelo Dinámico", isForced: false,
                                wind: wind, isPermitted: true, isPast: false
                            });
                            scheduledHours.add(h);
                            dynamicNeeded--;
                        }
                    }
                }

                return plan.sort((a, b) => a.hour === b.hour ? a.min - b.min : a.hour - b.hour);
            }, [flights, forecast, currentHourInt, currentMinInt, todayStr]);

            const masterPlan = generateDailyPlan();

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now);
                    
                    if (!audioUnlocked) return;

                    const nowSec = now.getSeconds();
                    const nowMin = now.getMinutes();
                    const nowHour = now.getHours();

                    // Aviso silencioso 12:01 AM (cada 5 min)
                    const needsScanToday = lastScanDate !== todayStr;
                    const isAfter1201 = (nowHour === 0 && nowMin >= 1) || (nowHour > 0 && nowHour < 19);
                    if (needsScanToday && isAfter1201 && nowSec === 0 && nowMin % 5 === 0) {
                        speak("Atención. Es necesario escanear la captura del clima del nuevo día.");
                    }

                    // Junta 7:50 AM
                    if (nowHour === 7 && nowMin === 50 && nowSec === 0) {
                        speak("Atención piloto. Faltan diez minutos para la reunión matutina.");
                    }

                    // Avisos de vuelo (10, 5 y 0 mins)
                    if (nowSec === 0) {
                        masterPlan.forEach(flight => {
                            let h = flight.hour, m = flight.min;

                            let h10 = h, m10 = m - 10;
                            if (m10 < 0) { m10 += 60; h10 -= 1; }
                            if (h10 < 0) h10 = 23;

                            let h5 = h, m5 = m - 5;
                            if (m5 < 0) { m5 += 60; h5 -= 1; }
                            if (h5 < 0) h5 = 23;

                            if (nowHour === h10 && nowMin === m10) {
                                if (!flight.isPermitted) speak(`El vuelo de las ${flight.time} se encuentra bloqueado por ráfagas.`);
                                else speak(`Faltan diez minutos para su próximo vuelo de las ${flight.time}.`);
                            }
                            else if (nowHour === h5 && nowMin === m5) {
                                if (flight.isPermitted) speak(`Faltan cinco minutos para el vuelo de las ${flight.time}. Prepárese.`);
                            }
                            else if (nowHour === h && nowMin === m && flight.isPermitted) {
                                speak(`Hora de despegue táctico. Inicie el vuelo de las ${flight.time}.`);
                            }
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [lastScanDate, audioUnlocked, masterPlan, speak, todayStr]);

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (!apiKeys.gemini) {
                    setModal({ isOpen: true, title: "Falta API Key", message: "Ve a configuración e ingresa tu API Key de Gemini para usar el escáner de Inteligencia Artificial.", type: "warning" });
                    e.target.value = null; // Reiniciar input
                    return;
                }

                setIsScanning(true);
                
                try {
                    const base64Data = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                             // Extraer solo la parte base64 de manera segura (quita el header data:image/png;base64,)
                            const result = reader.result;
                            const base64String = result.includes(',') ? result.split(',')[1] : result;
                            resolve(base64String);
                        };
                        reader.readAsDataURL(file);
                    });

                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKeys.gemini}`;
                    
                    const prompt = `
                    Eres un sistema experto de despacho de drones analizando una captura de la app meteorológica "Ok To Fly".
                    Hora actual de la captura: ${currentHourInt}:00. La primera fila de la tabla (donde dice AHORA) corresponde a esta hora.
                    Las filas subsecuentes incrementan de 1 en 1 hora (ej: fila 2 es ${currentHourInt + 1}:00).

                    REGLAS DE PELIGRO (ESTRICTAS Y EXACTAS):
                    - Si el texto dice "Ráfagas fuertes", "Ráfagas >50m", "Extremo", ">40", ">50", ">60", "13 30m", "14 60m", "12 60m", "Extremo UV 13", "Extremo UV 15", "Vientos fuertes >30m", "Vientos >40m" o está en un bloque de color ROJO o NARANJA, el windGust es 45 (Peligro).
                    - Si el texto dice "Vientos fuertes >30m, Ráfagas fuertes" o "Vientos >40m, Ráfagas fuertes", el windGust es 45 (Peligro).
                    - Si dice "Apto para volar" o está en bloque AZUL CLARO, el windGust es 25 (Seguro).
                    
                    Tu única tarea es devolver un objeto JSON estricto con un arreglo llamado "forecast" de 24 objetos.
                    Para las horas no visibles en la foto, asigna windGust 25.
                    Formato exacto esperado (solo JSON, NADA MÁS):
                    {
                      "forecast": [
                        {"hour": 0, "windGust": 25},
                        ...24 items...
                      ]
                    }
                    `;

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { 
                                        inlineData: { 
                                            mimeType: file.type || "image/png", 
                                            data: base64Data 
                                        } 
                                    }
                                ]
                            }],
                            generationConfig: {
                                responseMimeType: "application/json"
                            }
                        })
                    });

                    const result = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(`Error API: ${result.error?.message || response.statusText}`);
                    }
                    
                    if (result.candidates && result.candidates[0]?.content?.parts[0]?.text) {
                        const jsonText = result.candidates[0].content.parts[0].text;
                        const cleanJsonText = jsonText.replace(/```json\n?|```/g, '').trim();
                        const parsedData = JSON.parse(cleanJsonText);
                        
                        let newForecast = [...forecast];
                        parsedData.forecast.forEach(item => {
                            if (item.hour >= 0 && item.hour <= 23) {
                                newForecast[item.hour] = {
                                    time: `${item.hour.toString().padStart(2, '0')}:00`,
                                    windGust: item.windGust,
                                    condition: item.windGust >= 45 ? "Ráfagas Peligrosas" : "Apto para volar"
                                };
                            }
                        });

                        setForecast(newForecast);
                        const newScanDate = currentTime.toDateString();
                        setLastScanDate(newScanDate);
                        
                        updateData({ forecast: newForecast, lastScanDate: newScanDate });
                        setModal({ isOpen: true, title: "¡Análisis Inteligente Exitoso!", message: "El clima ha sido escaneado y el plan de vuelo fue actualizado.", type: "success" });
                    } else {
                        throw new Error("Respuesta inválida de IA o incompleta");
                    }
                } catch (err) {
                    console.error("Error IA detallado:", err);
                    // Fail-safe: Si falla la IA, apagar la alarma para no bloquear al piloto
                    const fallbackDate = currentTime.toDateString();
                    setLastScanDate(fallbackDate);
                    updateData({ lastScanDate: fallbackDate });
                    setModal({ 
                        isOpen: true, 
                        title: "Error Visual IA", 
                        message: `Hubo un error procesando la imagen. Detalle: ${err.message}. Se ha apagado la alarma para permitirte continuar operaciones.`, 
                        type: "warning" 
                    });
                } finally {
                    setIsScanning(false);
                    // Reset input para permitir volver a subir el mismo archivo si es necesario
                    e.target.value = null;
                }
            };

            const handleLogFlight = () => {
                const flightTime = currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const newLog = {
                    id: Date.now(),
                    time: flightTime,
                    timestamp: currentTime.toISOString(),
                    shift: activeShift,
                    wind: currentWind
                };
                
                const updatedLogs = [newLog, ...flights].sort((a,b) => b.id - a.id);
                setFlights(updatedLogs);
                updateData({ flights: updatedLogs });
                
                setModal({ isOpen: true, title: "¡Despegue Registrado!", message: `Vuelo de las ${flightTime} registrado exitosamente en la bitácora.`, type: "success" });
            };

            const handleSaveSettings = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const keys = { gemini: fd.get('gemini'), firebase: fd.get('firebase') };
                setApiKeys(keys);
                setSettingsOpen(false);
                setModal({ isOpen: true, title: "Configuración Guardada", message: "Las credenciales han sido actualizadas.", type: "success" });
            };

            const toggleMode = () => {
                const newMode = appMode === 'piloto' ? 'admin' : 'piloto';
                setAppMode(newMode);
                localStorage.setItem('drone_app_mode', newMode);
            };

            const todayFlightsTotal = flights.filter(f => new Date(f.timestamp).toDateString() === todayStr);
            const needsScanUI = lastScanDate !== todayStr && ((currentHourInt === 0 && currentMinInt >= 1) || (currentHourInt > 0 && currentHourInt < 19));

            return (
                <div className="p-4 pb-28 max-w-lg mx-auto space-y-5">
                    <Modal {...modal} onClose={() => setModal({ ...modal, isOpen: false })} />

                    {/* TOP BAR / HEADER */}
                    <div className="flex justify-between items-center bg-[#0f172a] p-3 rounded-2xl border border-slate-800 shadow-xl">
                        <div className="flex items-center gap-3">
                            <div className={`w-3 h-3 rounded-full animate-pulse ${isCloudActive ? 'bg-emerald-500 shadow-[0_0_10px_#10b981]' : 'bg-amber-500 shadow-[0_0_10px_#f59e0b]'}`}></div>
                            <div>
                                <h1 className="font-black text-sm tracking-widest uppercase text-white">Dispatcher PRO</h1>
                                <p className="text-[10px] font-bold text-slate-400">{isCloudActive ? '☁️ CONECTADO AL SERVIDOR' : '🏠 MODO LOCAL (OFFLINE)'}</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={toggleMode} className="p-2 rounded-xl bg-slate-800 hover:bg-slate-700 transition border border-slate-700 text-xs font-bold text-white flex items-center gap-1">
                                {appMode === 'piloto' ? '🧑‍✈️ Piloto' : '👨‍💻 Admin'}
                            </button>
                            <button onClick={() => setSettingsOpen(true)} className="p-2 rounded-xl bg-slate-800 hover:bg-slate-700 transition border border-slate-700 text-white">
                                ⚙️
                            </button>
                        </div>
                    </div>

                    {/* SETTINGS MODAL */}
                    {settingsOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-[#0f172a] border border-slate-700 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl p-5">
                                <h3 className="text-lg font-black text-white mb-4 border-b border-slate-700 pb-2">Configuración del Servidor</h3>
                                <form onSubmit={handleSaveSettings} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Google Gemini API Key (Visión IA)</label>
                                        <input type="password" name="gemini" defaultValue={apiKeys.gemini} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-2 text-sm text-white focus:border-indigo-500 outline-none" placeholder="AIzaSy..." />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Firebase Config (JSON - Opcional para nube)</label>
                                        <textarea name="firebase" defaultValue={apiKeys.firebase} rows="4" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-2 text-xs text-white focus:border-indigo-500 outline-none font-mono" placeholder='{"apiKey": "...", "projectId": "..."}'></textarea>
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setSettingsOpen(false)} className="flex-1 py-2 bg-slate-800 text-white rounded-xl font-bold text-sm">Cancelar</button>
                                        <button type="submit" className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-sm shadow-[0_0_15px_rgba(79,70,229,0.4)]">Guardar y Conectar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* VISTA PILOTO */}
                    {appMode === 'piloto' && (
                        <div className="space-y-5 animate-fade-in">
                            {/* STATUS PANEL */}
                            <div className="glass p-5 rounded-3xl relative overflow-hidden flex justify-between items-center">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                                <div>
                                    <p className="text-[10px] font-black tracking-widest text-indigo-400 uppercase mb-1">Turno en curso</p>
                                    <h2 className="text-2xl font-black text-white">{activeShift}</h2>
                                    <div className="mt-2 text-3xl font-mono font-bold text-white tracking-wider flex items-center gap-2">
                                        {!audioUnlocked && <span className="text-xs animate-pulse text-amber-500 border border-amber-500/50 bg-amber-500/10 px-2 py-1 rounded">🔇 Toca para Audio</span>}
                                        {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                                    </div>
                                </div>
                                <input 
                                    type="file" 
                                    id="file-upload-input"
                                    accept="image/*" 
                                    onChange={handleImageUpload} 
                                    className="hidden" 
                                />
                                <button 
                                    onClick={() => document.getElementById('file-upload-input').click()} 
                                    disabled={isScanning}
                                    className={`flex flex-col items-center justify-center p-3 rounded-2xl transition border ${isScanning ? 'bg-indigo-900/50 border-indigo-400 animate-pulse' : needsScanUI ? 'bg-rose-600 border-rose-400 shadow-[0_0_20px_rgba(225,29,72,0.4)] animate-pulse' : 'bg-indigo-600/20 border-indigo-500/30 hover:bg-indigo-600/40 cursor-pointer'}`}>
                                    <span className="text-2xl mb-1">{isScanning ? '⏳' : '📸'}</span>
                                    <span className={`text-[10px] font-black uppercase text-center ${needsScanUI || isScanning ? 'text-white' : 'text-indigo-300'}`}>
                                        {isScanning ? 'Analizando...' : needsScanUI ? 'URGE CLIMA' : 'Escanear IA'}
                                    </span>
                                </button>
                            </div>

                            {/* PLAN MAESTRO */}
                            <div className="glass rounded-3xl overflow-hidden border border-slate-800">
                                <div className="p-4 bg-slate-900/50 border-b border-slate-800 flex justify-between items-center">
                                    <h3 className="text-xs font-black tracking-widest text-slate-300 uppercase">📅 Plan Adaptativo</h3>
                                    <span className="text-[10px] bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded font-bold border border-indigo-500/30">Meta: 13</span>
                                </div>
                                <div className="p-3 space-y-2 max-h-[350px] overflow-y-auto">
                                    {masterPlan.map((p, idx) => {
                                        const isCurrent = p.hour === currentHourInt;
                                        return (
                                            <div key={idx} className={`flex justify-between items-center p-3 rounded-xl border transition-all ${p.isPast ? 'bg-slate-900/40 border-slate-800/50 opacity-50 grayscale' : isCurrent ? 'bg-indigo-900/30 border-indigo-500/50 shadow-[0_0_15px_rgba(79,70,229,0.1)]' : 'bg-slate-800/40 border-slate-700/50'}`}>
                                                <div className="flex items-center gap-3">
                                                    <span className={`text-sm font-black w-12 ${isCurrent ? 'text-indigo-400' : 'text-white'}`}>{p.time}</span>
                                                    <span className={`text-[9px] px-2 py-1 rounded-md tracking-wider font-bold uppercase ${p.isForced ? 'bg-rose-950 text-rose-400 border border-rose-900' : 'bg-slate-800 text-slate-300 border border-slate-700'}`}>
                                                        {p.type}
                                                    </span>
                                                </div>
                                                <span className={`text-xs font-black flex items-center gap-1.5 px-2.5 py-1 rounded-lg border ${!p.isPermitted ? 'bg-rose-950 text-rose-500 border-rose-900' : 'bg-emerald-950/40 text-emerald-500 border-emerald-900/50'}`}>
                                                    {!p.isPermitted ? '🚫' : '💨'} {p.wind} km/h
                                                </span>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                            
                            {/* BITÁCORA DEL PILOTO */}
                            <div className="glass rounded-3xl p-4 border border-slate-800 mb-6">
                                <h3 className="text-[11px] font-black tracking-widest text-slate-400 uppercase mb-3 flex items-center justify-between">
                                    <span>✅ Bitácora de Hoy (Piloto)</span>
                                    <span className="bg-indigo-600 text-white px-2 py-0.5 rounded-full text-[10px]">{todayFlightsTotal.length} / 13</span>
                                </h3>
                                <div className="space-y-2">
                                    {todayFlightsTotal.length === 0 ? (
                                        <div className="text-center py-4 text-xs text-slate-500 font-medium bg-slate-900/50 rounded-xl">Aún no has registrado vuelos hoy.</div>
                                    ) : (
                                        todayFlightsTotal.map((f, i) => (
                                            <div key={i} className="flex justify-between items-center p-2.5 rounded-xl bg-slate-800/40 border border-slate-700/50">
                                                <span className="text-white font-bold text-sm">Despegue: {f.time}</span>
                                                <span className="text-xs font-bold text-emerald-400 bg-emerald-950/50 px-2 py-1 rounded-md border border-emerald-900/50 block">{f.wind} km/h</span>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                            
                            {/* ACTION BUTTON (FIXED BOTTOM) */}
                            <div className="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent flex justify-center pointer-events-none z-40">
                                <button 
                                    onClick={handleLogFlight}
                                    disabled={!isFlightPermitted}
                                    className={`pointer-events-auto w-full max-w-lg py-4.5 rounded-2xl font-black text-sm uppercase tracking-widest transition-all active:scale-95 flex items-center justify-center gap-2 border-2 ${
                                        !isFlightPermitted 
                                        ? 'bg-slate-900 text-rose-500/50 cursor-not-allowed border-rose-900/30'
                                        : 'bg-emerald-500 hover:bg-emerald-400 text-emerald-950 border-emerald-400 shadow-[0_10px_30px_rgba(16,185,129,0.25)]'
                                    }`}
                                    style={{ padding: '1.25rem' }}
                                >
                                    {!isFlightPermitted ? (
                                        <><span>🚫</span> VUELO SUSPENDIDO ({currentWind} KM/H)</>
                                    ) : (
                                        <><span>⚡</span> REGISTRAR DESPEGUE <span>⚡</span></>
                                    )}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* VISTA ADMINISTRADOR (DASHBOARD) */}
                    {appMode === 'admin' && (
                        <div className="space-y-4 animate-fade-in">
                            <div className="glass p-6 rounded-3xl text-center border border-indigo-500/30 shadow-[0_0_30px_rgba(79,70,229,0.1)] relative overflow-hidden">
                                <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5"></div>
                                <h3 className="text-[10px] font-black tracking-widest text-slate-400 uppercase mb-2">Rendimiento Operativo (Hoy)</h3>
                                <div className="flex justify-center items-baseline gap-2 mb-4">
                                    <span className="text-7xl font-black text-white drop-shadow-lg">{todayFlightsTotal.length}</span>
                                    <span className="text-3xl font-bold text-slate-600">/</span>
                                    <span className="text-4xl font-black text-indigo-500">13</span>
                                </div>
                                <div className="w-full bg-slate-900 rounded-full h-3 overflow-hidden border border-slate-800">
                                    <div className="h-full bg-gradient-to-r from-indigo-600 to-cyan-500 transition-all duration-1000 ease-out" style={{ width: `${Math.min(100, (todayFlightsTotal.length / 13) * 100)}%` }}></div>
                                </div>
                                <p className="text-xs text-slate-400 mt-4 font-medium">
                                    {todayFlightsTotal.length >= 13 ? "✅ Meta diaria alcanzada" : `Faltan ${13 - todayFlightsTotal.length} vuelos para la meta`}
                                </p>
                            </div>

                            <div className="glass rounded-3xl p-4 border border-slate-800">
                                <h3 className="text-[11px] font-black tracking-widest text-slate-400 uppercase mb-4 flex items-center gap-2">
                                    <span>📡</span> Bitácora en Vivo
                                </h3>
                                <div className="space-y-2">
                                    {flights.length === 0 ? (
                                        <div className="text-center py-6 text-sm text-slate-500 font-medium bg-slate-900/50 rounded-2xl">No hay vuelos registrados aún.</div>
                                    ) : (
                                        flights.slice(0, 10).map((f, i) => (
                                            <div key={i} className="flex justify-between items-center p-3 rounded-xl bg-slate-800/40 border border-slate-700/50">
                                                <div>
                                                    <span className="text-white font-bold text-sm block">{f.time}</span>
                                                    <span className="text-[10px] text-slate-400 uppercase tracking-wider">{new Date(f.timestamp).toLocaleDateString()}</span>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-xs font-bold text-emerald-400 bg-emerald-950/50 px-2 py-1 rounded-md border border-emerald-900/50 block mb-1">{f.wind} km/h</span>
                                                    <span className="text-[9px] text-slate-500 uppercase">{f.shift}</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
