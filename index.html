<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dispatcher Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050b14; /* Fondo muy oscuro basado en la imagen */
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar para las tablas */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const DEFAULT_KEYS = {
            gemini: "AQ.Ab8RN6Lu-oSyr3Qw9R-iO4Gpr95uBBgpsMT1nJ7Ivdu1w2M5sA",
            firebase: {
                apiKey: "AIzaSyDXjwv133-dIKyprCktTUkjx_adAz1DhAY",
                authDomain: "control-vuelos.firebaseapp.com",
                projectId: "control-vuelos",
                storageBucket: "control-vuelos.firebasestorage.app",
                messagingSenderId: "756032981781",
                appId: "1:756032981781:web:451641e72abe3692c0771c"
            }
        };

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [flights, setFlights] = useState([]);
            const [forecast, setForecast] = useState(Array(24).fill({ time: '00:00', windGust: 25, condition: 'Apto para volar' }));
            const [isScanning, setIsScanning] = useState(false);
            const [modal, setModal] = useState(null);
            
            // UI States
            const [showMasterPlan, setShowMasterPlan] = useState(false);
            const [showBreakdown, setShowBreakdown] = useState(false);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                
                // Cargar datos locales iniciales simulando persistencia
                const savedData = localStorage.getItem('dispatcherDataV3');
                if(savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        if(parsed.flights) setFlights(parsed.flights);
                        if(parsed.forecast) setForecast(parsed.forecast);
                    } catch(e) {}
                }
                
                return () => clearInterval(timer);
            }, []);

            // Guardar local cada que cambien los datos
            useEffect(() => {
                localStorage.setItem('dispatcherDataV3', JSON.stringify({ flights, forecast }));
            }, [flights, forecast]);

            const currentHourInt = currentTime.getHours();
            const isDayShift = currentHourInt >= 7 && currentHourInt < 19;
            const activeShift = isDayShift ? "Turno Diurno" : "Turno Nocturno";
            const shiftTarget = isDayShift ? 8 : 5;
            
            const todayStr = currentTime.toDateString();
            const todayFlights = flights.filter(f => new Date(f.timestamp).toDateString() === todayStr);
            const shiftFlights = todayFlights.filter(f => f.shift === activeShift);
            
            const currentWindData = forecast[currentHourInt] || { windGust: 0 };
            const currentWind = currentWindData.windGust;
            const isOperable = currentWind < 45;

            const handleImageUpload = async (e) => {
                const eventTarget = e.target;
                const file = eventTarget.files[0];
                if (!file) return;

                setIsScanning(true);
                
                try {
                    // Limpieza segura de Base64
                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const result = reader.result;
                            const base64String = result.includes(',') ? result.split(',')[1] : result;
                            resolve(base64String);
                        };
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });

                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${DEFAULT_KEYS.gemini}`;
                    
                    const prompt = `
                    Eres un sistema experto analizando "Ok To Fly".
                    Hora actual: ${currentHourInt}:00. La primera fila (AHORA) es esta hora.
                    Reglas:
                    - Peligro (windGust = 45): "Ráfagas >50m", "14 60m", "12 60m", "13 30m", "Extremo UV", "Vientos fuertes >30m, Ráfagas fuertes" o fondos Rojos/Naranjas.
                    - Seguro (windGust = 25): "Apto para volar" o fondos Azules.
                    Devuelve JSON estricto: { "forecast": [{"hour": 0, "windGust": 25}, ...] }
                    `;

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: file.type || "image/png", data: base64Data } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const result = await response.json();
                    if (!response.ok) throw new Error(result.error?.message || "Error API");
                    
                    if (result.candidates && result.candidates[0]?.content?.parts[0]?.text) {
                        const jsonText = result.candidates[0].content.parts[0].text;
                        const cleanJsonText = jsonText.match(/\{[\s\S]*\}/)[0];
                        const parsedData = JSON.parse(cleanJsonText);
                        
                        let newForecast = [...forecast];
                        parsedData.forecast.forEach(item => {
                            if (item.hour >= 0 && item.hour <= 23) {
                                newForecast[item.hour] = {
                                    time: `${item.hour.toString().padStart(2, '0')}:00`,
                                    windGust: item.windGust,
                                    condition: item.windGust >= 45 ? "Ráfagas Peligrosas" : "Apto para volar"
                                };
                            }
                        });

                        setForecast(newForecast);
                        setModal({ isOpen: true, title: "Análisis Exitoso", message: "Clima actualizado correctamente.", type: "success" });
                    }
                } catch (err) {
                    setModal({ isOpen: true, title: "Error Visual IA", message: `Error leyendo imagen: ${err.message}`, type: "error" });
                } finally {
                    setIsScanning(false);
                    eventTarget.value = ''; // Reset input
                }
            };

            const handleLogFlight = (isPast = false) => {
                const now = new Date();
                // Si es pasado, permitimos elegir la hora (simplificado para UI: resta 30 mins)
                const flightDate = isPast ? new Date(now.getTime() - 30*60000) : now;
                
                const flightTime = flightDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const newLog = {
                    id: Date.now(),
                    time: flightTime,
                    timestamp: flightDate.toISOString(),
                    shift: activeShift,
                    wind: currentWind
                };
                
                setFlights(prev => [newLog, ...prev].sort((a,b) => b.id - a.id));
            };

            return (
                <div className="min-h-screen bg-[#050b14] text-white p-3 font-sans pb-24">
                    <div className="max-w-md mx-auto space-y-4">
                        
                        {/* TARJETA 1: TURNO ACTIVO */}
                        <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-5 shadow-lg">
                            <div className="flex justify-between items-start mb-2">
                                <span className="font-black tracking-wider text-xs text-blue-400 uppercase">TURNO ACTIVO</span>
                                <span className="font-mono font-bold bg-black/50 border border-slate-700 px-3 py-1 rounded text-sm text-slate-300">
                                    {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                                </span>
                            </div>
                            <h2 className="text-2xl font-black mb-1">{activeShift}</h2>
                            <p className="text-xs text-slate-400 mb-4">Meta del turno: <span className="text-white font-bold">{shiftTarget} vuelos</span> (Incluye heredados)</p>
                            
                            <label className={`w-full flex items-center justify-center gap-2 py-2.5 rounded-lg font-bold text-sm transition cursor-pointer border ${isScanning ? 'bg-indigo-900 border-indigo-500 text-indigo-300' : 'bg-[#4f46e5] hover:bg-[#4338ca] border-indigo-400 text-white shadow-[0_0_15px_rgba(79,70,229,0.3)]'}`}>
                                <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" disabled={isScanning} />
                                {isScanning ? '⏳ Analizando...' : '📸 Escanear OK to Fly'}
                            </label>
                        </div>

                        {/* TARJETA 2: ESTADO DE VUELO */}
                        <div className={`rounded-xl p-4 border flex items-center gap-3 transition-colors ${isOperable ? 'bg-[#064e3b]/80 border-[#047857]' : 'bg-[#7f1d1d]/80 border-[#b91c1c]'}`}>
                            <div className={`w-3 h-3 rounded-full animate-pulse ${isOperable ? 'bg-emerald-400' : 'bg-red-400'}`}></div>
                            <div>
                                <div className={`font-black tracking-wider text-xs uppercase ${isOperable ? 'text-emerald-400' : 'text-red-300'}`}>
                                    ESTADO DE VUELO (120M):
                                </div>
                                <div className={`text-sm font-semibold mt-0.5 ${isOperable ? 'text-emerald-100' : 'text-red-100'}`}>
                                    {isOperable ? 'OPERABLE' : 'BLOQUEADO'} (Viento: {currentWind} km/h - {isOperable ? 'Permitido' : 'Peligro'})
                                </div>
                            </div>
                        </div>

                        {/* TARJETA 3: CONTADOR CENTRAL GIGANTE */}
                        <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-6 flex flex-col items-center shadow-lg relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-20"></div>
                            
                            <div className="text-slate-400 font-bold tracking-widest text-xs mb-2">VUELOS DEL TURNO</div>
                            <div className="text-7xl font-black mb-1">
                                <span className="text-white">{shiftFlights.length}</span>
                                <span className="text-slate-600 text-5xl mx-2">/</span>
                                <span className="text-blue-400">{shiftTarget}</span>
                            </div>
                            <div className="text-[10px] text-slate-500 font-semibold tracking-wide uppercase">66CW+8Q Parque Industrial Jis Park, Pue.</div>
                            
                            <div className="w-full h-px bg-[#1e293b] my-5"></div>
                            
                            <div className="w-full flex justify-between items-center bg-[#050b14] p-3 rounded-xl border border-[#1e293b]">
                                <span className="font-black text-xs tracking-widest text-cyan-400 flex items-center gap-2">
                                    <span className="text-lg">📊</span> GLOBAL DEL DÍA
                                </span>
                                <span className="bg-cyan-500 text-black font-black px-3 py-1 rounded text-sm shadow-[0_0_10px_rgba(6,182,212,0.4)]">
                                    {todayFlights.length} VUELOS
                                </span>
                            </div>
                        </div>

                        {/* TARJETA 4: BITÁCORA DE VUELOS */}
                        <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-4 shadow-lg">
                            <div className="flex justify-between items-center mb-4">
                                <div className="font-bold tracking-widest text-xs text-slate-300 flex items-center gap-2">
                                    <span>📖</span> BITÁCORA DE VUELOS
                                </div>
                                <button 
                                    onClick={() => handleLogFlight(true)}
                                    className="bg-indigo-600/30 hover:bg-indigo-600/50 text-indigo-300 border border-indigo-500/30 text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 transition">
                                    + Añadir Pasado
                                </button>
                            </div>
                            
                            <div className="space-y-2">
                                {shiftFlights.length === 0 ? (
                                    <div className="bg-[#050b14] text-slate-500 text-xs text-center py-6 rounded-xl font-medium border border-[#1e293b]">
                                        Sin vuelos registrados en este turno.
                                    </div>
                                ) : (
                                    shiftFlights.map((f, i) => (
                                        <div key={i} className="flex justify-between items-center bg-[#050b14] p-3 rounded-xl border border-[#1e293b]">
                                            <div className="flex items-center gap-3">
                                                <div className="w-2 h-2 rounded-full bg-blue-500"></div>
                                                <span className="text-white font-bold text-sm">Despegue {f.time}</span>
                                            </div>
                                            <span className="text-xs font-bold text-slate-400 bg-slate-800 px-2 py-1 rounded">{f.wind} km/h</span>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {/* BOTONES INFERIORES */}
                        <button 
                            onClick={() => setShowMasterPlan(true)}
                            className="w-full bg-[#0f172a] hover:bg-[#1e293b] text-slate-300 font-bold py-3.5 rounded-xl border border-[#334155] transition text-sm flex justify-center items-center gap-2">
                            <span>🗓️</span> Ver Plan Maestro Diario (24h)
                        </button>

                        <button 
                            onClick={() => handleLogFlight(false)}
                            className="w-full bg-[#22c55e] hover:bg-[#16a34a] text-black font-black py-5 rounded-2xl text-lg flex justify-center items-center gap-2 shadow-[0_0_20px_rgba(34,197,94,0.3)] transition transform active:scale-95">
                            ⚡ ¡VOLAR AHORA! (REGISTRAR)
                        </button>

                        <button 
                            onClick={() => setShowBreakdown(!showBreakdown)}
                            className="w-full bg-[#050b14] text-slate-400 font-bold py-3 rounded-xl border border-[#1e293b] text-sm mt-4 hover:text-white transition">
                            {showBreakdown ? '▲ Ocultar Desglose OK to Fly' : '▼ Ver Desglose OK to Fly'}
                        </button>

                        {/* TABLA DE DESGLOSE EXPANDIBLE */}
                        {showBreakdown && (
                            <div className="bg-[#0f172a] border border-[#1e293b] rounded-xl p-3 animate-fade-in mt-2">
                                <div className="grid grid-cols-4 gap-2">
                                    {forecast.map((p, i) => (
                                        <div key={i} className={`p-2 rounded-lg text-center flex flex-col items-center justify-center border ${p.windGust < 45 ? 'bg-[#064e3b]/30 border-[#047857]/50' : 'bg-[#7f1d1d]/30 border-[#b91c1c]/50'}`}>
                                            <span className="text-white font-mono text-[10px] mb-1">{p.time}</span>
                                            <span className={`text-[10px] font-black ${p.windGust < 45 ? 'text-emerald-400' : 'text-red-400'}`}>{p.windGust}k</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODALES */}
                    {modal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl">
                                <div className="text-4xl mb-4">{modal.type === 'error' ? '❌' : '✅'}</div>
                                <h3 className="text-lg font-black text-white mb-2">{modal.title}</h3>
                                <p className="text-sm text-slate-400 mb-6">{modal.message}</p>
                                <button onClick={() => setModal(null)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">
                                    Entendido
                                </button>
                            </div>
                        </div>
                    )}
                    
                    {showMasterPlan && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
                            <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-6 max-w-md w-full h-[80vh] flex flex-col">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-black text-white">🗓️ Plan Maestro 24h</h3>
                                    <button onClick={() => setShowMasterPlan(false)} className="text-slate-400 hover:text-white font-bold text-xl">&times;</button>
                                </div>
                                <div className="overflow-y-auto flex-1 pr-2 space-y-2">
                                    {forecast.map((f, i) => (
                                        <div key={i} className="flex justify-between items-center p-3 rounded-xl bg-[#050b14] border border-[#1e293b]">
                                            <span className="font-mono font-bold text-slate-300">{f.time}</span>
                                            <span className={`text-xs font-black px-2 py-1 rounded ${f.windGust < 45 ? 'bg-emerald-900/50 text-emerald-400' : 'bg-red-900/50 text-red-400'}`}>
                                                {f.windGust} km/h - {f.condition}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
