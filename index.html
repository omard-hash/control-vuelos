<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heliport Drone Dispatcher Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [flights, setFlights] = useState([]);
            const [forecastData, setForecastData] = useState({});
            const [isScanning, setIsScanning] = useState(false);
            const [audioUnlocked, setAudioUnlocked] = useState(false);
            const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'info' });
            const [manualLogOpen, setManualLogOpen] = useState(false);
            const [settingsOpen, setSettingsOpen] = useState(false);
            
            // Estado de red / Firebase
            const [firebaseConfigStr, setFirebaseConfigStr] = useState(localStorage.getItem('dispatcher_firebase_config') || '');
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('dispatcher_gemini_key') || '');
            const [cloudStatus, setCloudStatus] = useState('offline'); // 'online', 'offline', 'error'
            const [localMode, setLocalMode] = useState(false);
            const [isRaining, setIsRaining] = useState(false);

            // Audio setup
            const unlockAudio = () => {
                if (!audioUnlocked) {
                    const silent = new Audio("data:audio/mp3;base64,//MkxAA...");
                    silent.play().catch(e => console.log("Audio unlock falló", e));
                    setAudioUnlocked(true);
                    speak("Sistema de audio activado.");
                }
            };

            const speak = (text) => {
                if ('speechSynthesis' in window && audioUnlocked) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'es-MX';
                    utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            };

            // EL CORTE SE HACE A LA MEDIANOCHE
            const getOperativeDayStart = (dateObj) => {
                const d = new Date(dateObj);
                d.setHours(0, 0, 0, 0); 
                return d;
            };

            const toOpMins = (h, m) => {
                return h * 60 + m; // 0 a 1440 min
            };

            const generateIntelligentSchedule = useCallback((currentForecast, currentFlights, rainStatus) => {
                // Vuelos obligatorios (Incluyendo el de las 6:00am)
                const targetSlots = [
                    { h: 6, m: 0, type: 'FORZOSO' },
                    { h: 8, m: 20, type: 'FORZOSO' },
                    { h: 14, m: 0, type: 'FORZOSO' },
                    { h: 17, m: 0, type: 'FORZOSO' },
                    { h: 21, m: 30, type: 'FORZOSO' }
                ];
                
                const now = currentTime;
                const currentOpMins = toOpMins(now.getHours(), now.getMinutes());
                
                const todayStart = getOperativeDayStart(now);
                const flightsToday = currentFlights.filter(f => new Date(f.timestamp) >= todayStart);
                
                const remainingTotal = Math.max(0, 13 - flightsToday.length);
                let schedule = [];

                if (rainStatus) {
                    return [{ time: "--:--", type: "BLOQUEO POR LLUVIA", isPermitted: false, wind: "N/A" }];
                }

                // Meter forzosos futuros
                targetSlots.forEach(slot => {
                    const slotMins = toOpMins(slot.h, slot.m);
                    if (slotMins > currentOpMins) {
                        const wind = currentForecast[slot.h] || 0;
                        const isPermitted = wind <= 43;
                        schedule.push({ time: `${String(slot.h).padStart(2, '0')}:${String(slot.m).padStart(2, '0')}`, wind, isPermitted, type: slot.type, slotMins });
                    }
                });

                // Meter dinámicos hasta llegar a 13 (contando los forzosos futuros)
                const futureForzososCount = schedule.length;
                let neededDynamics = remainingTotal - futureForzososCount;

                if (neededDynamics > 0) {
                    let possibleSlots = [];
                    for (let h = 0; h < 24; h++) {
                        let opH = h;
                        if (currentForecast[opH] && currentForecast[opH] > 43) continue; 
                        
                        for (let m = 0; m <= 50; m += 10) {
                            const sm = toOpMins(h, m);
                            // Solo horarios futuros, no chocar con forzosos, y no muy pegados al ahora
                            if (sm > currentOpMins + 15) {
                                const isBusy = targetSlots.some(t => Math.abs(toOpMins(t.h, t.m) - sm) < 30);
                                if (!isBusy) {
                                    possibleSlots.push({ h, m, slotMins: sm, wind: currentForecast[opH] || 0 });
                                }
                            }
                        }
                    }

                    // Distribuir equitativamente
                    if (possibleSlots.length > 0) {
                        const step = Math.max(1, Math.floor(possibleSlots.length / neededDynamics));
                        for (let i = 0; i < neededDynamics && i * step < possibleSlots.length; i++) {
                            const slot = possibleSlots[i * step];
                            schedule.push({ time: `${String(slot.h).padStart(2, '0')}:${String(slot.m).padStart(2, '0')}`, wind: slot.wind, isPermitted: true, type: 'DINÁMICO', slotMins: slot.slotMins });
                        }
                    } else {
                        // Comprimir si hay poco tiempo
                        schedule.push({ time: "Sin ventanas", wind: 0, isPermitted: false, type: "CRÍTICO", slotMins: 9999 });
                    }
                }

                schedule.sort((a, b) => a.slotMins - b.slotMins);
                return schedule.slice(0, remainingTotal);
            }, [currentTime]);

            useEffect(() => {
                let unsubscribe = null;
                
                const initFirebase = async () => {
                    if (!firebaseConfigStr) {
                        setCloudStatus('offline');
                        setLocalMode(true);
                        return;
                    }
                    try {
                        const config = JSON.parse(firebaseConfigStr);
                        if (!firebase.apps.length) {
                            firebase.initializeApp(config);
                        }
                        
                        // Intentar login anónimo silencioso (Necesario para las reglas nuevas)
                        try {
                            await firebase.auth().signInAnonymously();
                        } catch(authErr) {
                            console.warn("Fallo Auth Anónimo, intentando continuar sin él:", authErr);
                        }

                        const db = firebase.firestore();
                        const docRef = db.collection('operaciones').doc('estado_actual');

                        unsubscribe = docRef.onSnapshot((doc) => {
                            if (doc.exists) {
                                const data = doc.data();
                                if (data.flights) setFlights(data.flights);
                                if (data.forecast) setForecastData(data.forecast);
                                if (data.isRaining !== undefined) setIsRaining(data.isRaining);
                            }
                            setCloudStatus('online');
                            setLocalMode(false);
                        }, (error) => {
                            console.error("Error Firebase:", error);
                            setCloudStatus('error');
                            setLocalMode(true); // Activar supervivencia
                        });
                    } catch (error) {
                        console.error("Configuración de Firebase inválida:", error);
                        setCloudStatus('error');
                        setLocalMode(true);
                    }
                };

                initFirebase();
                return () => { if (unsubscribe) unsubscribe(); };
            }, [firebaseConfigStr]);

            const updateData = async (newData) => {
                // Actualización local siempre (Modo Supervivencia)
                if (newData.flights) setFlights(newData.flights);
                if (newData.forecast) setForecastData(newData.forecast);
                if (newData.isRaining !== undefined) setIsRaining(newData.isRaining);

                // Intento de actualización en la nube
                if (firebase.apps.length > 0 && !localMode) {
                    try {
                        const db = firebase.firestore();
                        await db.collection('operaciones').doc('estado_actual').set(newData, { merge: true });
                    } catch (error) {
                        console.error("Error guardando en la nube, continuando en modo local:", error);
                        setCloudStatus('error');
                        setLocalMode(true);
                    }
                }
            };

            const toggleRainStatus = () => {
                const newStatus = !isRaining;
                updateData({ isRaining: newStatus });
                if (newStatus) {
                    speak("Alerta. Condiciones de lluvia declaradas. Operaciones suspendidas.");
                } else {
                    speak("Condiciones de lluvia canceladas. Recalculando ventana operativa.");
                }
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now);
                    
                    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    const second = now.getSeconds();
                    const minute = now.getMinutes();
                    const hour = now.getHours();

                    if (second === 0) { // Evaluar eventos solo una vez por minuto
                        if (isRaining) return;

                        if (timeStr === "07:50") speak("Atención piloto. Es hora de aterrizar. Junta obligatoria en curso.");
                        
                        // Alertas de actualización mandatorias
                        if (timeStr === "00:00") speak("Atención. Corte de vuelos realizado a la medianoche. Pilotos, por favor actualicen la captura del clima para el nuevo día.");
                        if (timeStr === "12:00") speak("Atención. Actualización de medio día. Pilotos, por favor actualicen la captura del clima.");

                        // Alerta de caducidad cada 5 mins si no hay datos de esta hora
                        const hasDataForCurrentHour = forecastData && forecastData.hasOwnProperty(hour.toString());
                        if (!hasDataForCurrentHour && minute % 5 === 0) {
                            speak("Alerta. Datos del clima desactualizados para esta hora. Suba una nueva captura, por favor.");
                        }

                        // Alarma predictiva de despegue (10 minutos antes)
                        const futureDate = new Date(now.getTime() + 10 * 60000);
                        const targetTimeStr = futureDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                        
                        const schedule = generateIntelligentSchedule(forecastData, flights, isRaining);
                        const nextFlight = schedule.find(s => s.time === targetTimeStr);
                        
                        if (nextFlight) {
                            if (nextFlight.isPermitted) {
                                speak(`Pilotos, prepárense. Próximo despegue programado en 10 minutos.`);
                            } else {
                                speak(`Alerta. Vuelo de las ${targetTimeStr} bloqueado por vientos de ${nextFlight.wind} kilómetros por hora. No hay autorización para despegue.`);
                            }
                        }
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [forecastData, flights, audioUnlocked, isRaining, generateIntelligentSchedule]);

            const analyzeImage = async (base64Image) => {
                if (!geminiKey) {
                    setModal({ isOpen: true, title: 'Error', message: 'Falta la API Key de Gemini en configuración.', type: 'error' });
                    return;
                }
                
                setIsScanning(true);
                setModal({ isOpen: true, title: 'Escaneando Clima', message: 'La IA está analizando los vientos. Por favor espere...', type: 'info' });

                // INSTRUCCIONES ESTRICTAS (Parche 36 km/h y Ráfagas fuertes)
                const promptText = `Eres un sistema de seguridad de control de vuelos de drones. Analiza la imagen de la predicción meteorológica.
REGLAS ESTRICTAS DE PRIORIDAD ABSOLUTA:
1. Si ves la frase EXACTA "Ráfagas fuertes" (en un recuadro rojo, ej. "Ráfagas fuertes >20m"), DETÉN TODO y asígnale inmediatamente 45 km/h a esa hora. No importa si a la derecha dice "13" u otro número, la advertencia "Ráfagas fuertes" = 45.
2. Si un panel (como "AHORA") está expandido y ves recuadros de colores con detalles internos (como uno rojo que dice "Ráfagas (km/h) 36@20m"), DEBES extraer ESE número interno mayor (ej. 36) e ignorar los números confusos del título de arriba.
3. Para la fila "AHORA", asume que representa la hora actual.
4. Devuelve ÚNICAMENTE un objeto JSON estricto con las horas en formato de 24 hrs como claves (ej. "20", "21") y la ráfaga de viento en km/h como número entero.
Ejemplo de salida válida:
{"19": 45, "20": 36, "21": 15, "22": 10}
Si una hora dice "Apto para volar", asume 10 km/h. No devuelvas texto adicional, solo el JSON.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro-vision:generateContent?key=${geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: promptText },
                                    { inlineData: { mimeType: "image/jpeg", data: base64Image.split(',')[1] } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    let textResult = data.candidates[0].content.parts[0].text;
                    textResult = textResult.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedForecast = JSON.parse(textResult);

                    const nowHr = new Date().getHours();
                    if (parsedForecast["AHORA"]) {
                        parsedForecast[nowHr.toString()] = parsedForecast["AHORA"];
                        delete parsedForecast["AHORA"];
                    }

                    // Falso Seguro: Garantizar que la hora actual exista o se quede vacía para activar advertencia
                    if (!parsedForecast.hasOwnProperty(nowHr.toString())) {
                        console.warn("La IA no detectó datos para la hora actual.");
                    }

                    updateData({ forecast: parsedForecast });
                    setModal({ isOpen: true, title: 'Análisis Completo', message: 'Datos meteorológicos actualizados correctamente por IA.', type: 'success' });
                    speak("Análisis meteorológico completado. Plan maestro recalculado.");

                } catch (error) {
                    console.error(error);
                    setModal({ isOpen: true, title: 'Error de IA', message: 'No se pudo leer la imagen. Intenta de nuevo. ' + error.message, type: 'error' });
                } finally {
                    setIsScanning(false);
                    setTimeout(() => setModal(prev => ({...prev, isOpen: false})), 3000);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => analyzeImage(reader.result);
                reader.readAsDataURL(file);
            };

            const handleManualLogSubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const timeStr = formData.get('timeStr');
                const windNum = parseInt(formData.get('windNum')) || 0;
                
                const [h, m] = timeStr.split(':').map(Number);
                const shift = (h >= 7 && h < 19) ? 'Turno Diurno' : 'Turno Nocturno';

                const newTimestamp = new Date();
                newTimestamp.setHours(h, m, 0, 0); // Asignado al día natural (00:00 a 23:59)

                const newLog = { id: Date.now(), time: timeStr, timestamp: newTimestamp.toISOString(), shift: shift, wind: windNum };
                const updatedLogs = [newLog, ...flights].sort((a,b) => b.id - a.id);
                updateData({ flights: updatedLogs });
                setManualLogOpen(false);
            };

            const activeShift = (currentTime.getHours() >= 7 && currentTime.getHours() < 19) ? 'Turno Diurno' : 'Turno Nocturno';
            const currentHourStr = currentTime.getHours().toString();
            
            // Lógica de "Falso Seguro" corregida
            const hasCurrentData = forecastData.hasOwnProperty(currentHourStr);
            const currentWind = hasCurrentData ? forecastData[currentHourStr] : null;
            
            let isPermitted = false;
            let currentStatusClass = "bg-slate-900 border-slate-700 text-slate-400";
            let currentStatusText = "ESPERANDO DATOS...";
            
            if (isRaining) {
                isPermitted = false;
                currentStatusClass = "bg-rose-950/80 border-rose-900 shadow-[0_0_20px_rgba(225,29,72,0.6)]";
                currentStatusText = "PELIGRO: LLUVIA LOCAL DETECTADA";
            } else if (hasCurrentData) {
                isPermitted = currentWind <= 43;
                if (!isPermitted) {
                    currentStatusClass = "bg-rose-950/50 border-rose-900";
                    currentStatusText = `PELIGRO: BLOQUEADO (${currentWind} KM/H)`;
                } else {
                    currentStatusClass = "bg-emerald-950/30 border-emerald-900";
                    currentStatusText = `OPERABLE (${currentWind} KM/H)`;
                }
            } else {
                // Alerta gris de volar a ciegas
                currentStatusClass = "bg-slate-800 border-slate-600";
                currentStatusText = "⚠️ SIN DATOS PARA ESTA HORA";
            }

            const todayStart = getOperativeDayStart(currentTime);
            const todayFlightsTotal = flights.filter(f => new Date(f.timestamp) >= todayStart);
            const dayCount = todayFlightsTotal.filter(f => f.shift === 'Turno Diurno').length;
            const nightCount = todayFlightsTotal.filter(f => f.shift === 'Turno Nocturno').length;
            const dynamicSchedule = generateIntelligentSchedule(forecastData, flights, isRaining);

            const handleLogFlight = () => {
                const flightTime = currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
                const windToSave = currentWind !== null ? currentWind : 0;
                const newLog = {
                    id: Date.now(),
                    time: flightTime,
                    timestamp: currentTime.toISOString(),
                    shift: activeShift,
                    wind: windToSave
                };
                
                const updatedLogs = [newLog, ...flights].sort((a,b) => b.id - a.id);
                updateData({ flights: updatedLogs });
                setModal({ isOpen: true, title: "¡Despegue Registrado!", message: `Vuelo de las ${flightTime} guardado.`, type: "success" });
            };

            return (
                <div className="w-full max-w-md mx-auto p-4 flex flex-col h-full relative" onClick={unlockAudio}>
                    
                    {/* Header y Nube Status */}
                    <div className="flex justify-between items-center mb-6 pt-2">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-black text-xl shadow-lg shadow-indigo-600/30">DP</div>
                            <div>
                                <h1 className="font-black text-lg leading-none tracking-tight">DISPATCHER PRO</h1>
                                <div className="text-[10px] font-bold mt-1 flex items-center gap-1 uppercase tracking-wider">
                                    <span className="text-indigo-400">V15_MIDNIGHT</span>
                                    {cloudStatus === 'online' ? <span className="text-emerald-400 flex items-center gap-1"><span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Nube Activa</span> : 
                                     cloudStatus === 'error' || localMode ? <span className="text-rose-400 flex items-center gap-1"><span className="w-2 h-2 bg-rose-500 rounded-full"></span> Sin Red (Modo Local)</span> : 
                                     <span className="text-slate-400">Desconectado</span>}
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={toggleRainStatus} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1 shadow-lg ${isRaining ? 'bg-rose-600 text-white shadow-rose-600/30 animate-pulse' : 'bg-blue-600 text-white shadow-blue-600/20'}`}>
                                {isRaining ? '🌧️ QUITAR LLUVIA' : '🌧️ LLUVIA LOCAL'}
                            </button>
                            <button onClick={() => setSettingsOpen(true)} className="p-2 bg-slate-800 rounded-xl hover:bg-slate-700 transition">
                                ⚙️
                            </button>
                        </div>
                    </div>

                    <div className="flex-grow overflow-y-auto hide-scroll pb-24 space-y-4">
                        
                        {/* Status principal del turno */}
                        <div className="glass p-5 rounded-3xl relative overflow-hidden flex justify-between items-center">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                            <div>
                                <p className="text-[10px] font-black tracking-widest text-indigo-400 uppercase mb-1">Turno en curso</p>
                                <h2 className="text-2xl font-black text-white">{activeShift}</h2>
                                <div className="mt-2 text-3xl font-mono font-bold text-white tracking-wider flex items-center gap-2">
                                    {!audioUnlocked && <span className="text-xs animate-pulse text-amber-500 border border-amber-500/50 bg-amber-500/10 px-2 py-1 rounded">🔇 Activa Audio</span>}
                                    {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                                </div>
                            </div>
                            <input type="file" id="file-upload" accept="image/*" onChange={handleImageUpload} className="hidden" />
                            <button onClick={() => document.getElementById('file-upload').click()} disabled={isScanning}
                                className={`flex flex-col items-center justify-center p-3 rounded-2xl transition border w-20 h-20 ${isScanning ? 'bg-indigo-900/50 border-indigo-400 animate-pulse' : !hasCurrentData && !isRaining ? 'bg-rose-600 border-rose-400 shadow-[0_0_20px_rgba(225,29,72,0.4)] animate-pulse' : 'bg-indigo-600/20 border-indigo-500/30 hover:bg-indigo-600/40'}`}>
                                <span className="text-2xl mb-1">{isScanning ? '⏳' : '📸'}</span>
                                <span className="text-[9px] font-black uppercase text-center text-white">{isScanning ? 'Pensando' : !hasCurrentData && !isRaining ? 'URGE CLIMA' : 'Escanear IA'}</span>
                            </button>
                        </div>

                        {/* Indicador de Viento */}
                        <div className={`p-4 rounded-3xl border flex items-center gap-3 transition-colors ${currentStatusClass}`}>
                            <div className={`w-4 h-4 rounded-full ${isPermitted ? 'bg-emerald-500' : 'bg-rose-500 animate-pulse'}`}></div>
                            <div>
                                <p className="text-[10px] font-black tracking-widest uppercase opacity-70">Estado actual del viento</p>
                                <p className={`font-black uppercase tracking-wide ${isPermitted ? 'text-emerald-400' : 'text-rose-400'}`}>{currentStatusText}</p>
                            </div>
                        </div>

                        {/* Contadores */}
                        <div className="glass rounded-3xl p-5 border border-slate-800">
                            <div className="flex justify-between items-end mb-4">
                                <p className="text-[10px] font-black tracking-widest text-slate-400 uppercase">Meta Operativa de Hoy</p>
                                <button onClick={() => setManualLogOpen(true)} className="text-[10px] bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg font-bold transition">+ Añadir Pasado</button>
                            </div>
                            <div className="text-center mb-6">
                                <span className="text-6xl font-black text-indigo-400">{todayFlightsTotal.length}</span>
                                <span className="text-xl font-bold text-slate-500"> / 13 Totales</span>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-slate-900/50 rounded-2xl p-3 border border-slate-800 flex flex-col items-center">
                                    <span className="text-[10px] font-black text-slate-400 uppercase mb-1">☀️ Diurno</span>
                                    <span className="text-2xl font-black text-amber-500">{dayCount}</span>
                                </div>
                                <div className="bg-slate-900/50 rounded-2xl p-3 border border-slate-800 flex flex-col items-center">
                                    <span className="text-[10px] font-black text-slate-400 uppercase mb-1">🌙 Nocturno</span>
                                    <span className="text-2xl font-black text-blue-400">{nightCount}</span>
                                </div>
                            </div>
                        </div>

                        {/* Itinerario IA */}
                        <div className="glass rounded-3xl p-4 border border-slate-800">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-[11px] font-black tracking-widest text-indigo-300 uppercase flex items-center gap-1.5"><span className="text-sm">🤖</span> Plan Maestro Restante</h3>
                                <button onClick={() => speak("Leyendo itinerario actual.")} className="bg-indigo-600/20 text-indigo-300 px-2 py-1 rounded text-[10px] font-bold">🔊 Forzar Voz</button>
                            </div>
                            <div className="space-y-2">
                                {dynamicSchedule.map((p, i) => (
                                    <div key={i} className={`flex justify-between items-center p-3 rounded-xl border ${p.isPermitted ? 'bg-slate-900/40 border-slate-800' : 'bg-rose-950/20 border-rose-900/30'}`}>
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <span className={`font-black text-lg ${p.isPermitted ? 'text-white' : 'text-rose-400 line-through'}`}>{p.time}</span>
                                                <span className="text-[10px] text-slate-500">({(parseInt(p.time) >= 7 && parseInt(p.time) < 19) ? 'Diurno' : 'Nocturno'})</span>
                                            </div>
                                            <div className="text-[10px] font-medium flex items-center gap-1 mt-0.5">
                                                {p.isPermitted ? <span className="text-emerald-400">✅ Libre</span> : <span className="text-rose-400">❌ Bloqueo</span>}
                                                <span className="text-slate-500">({p.wind} km/h est.)</span>
                                            </div>
                                        </div>
                                        <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border ${p.type === 'FORZOSO' ? 'bg-indigo-900/50 text-indigo-300 border-indigo-700/50' : p.type === 'BLOQUEO POR LLUVIA' ? 'bg-rose-900/50 text-rose-300 border-rose-700/50' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>
                                            {p.type}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>

                    </div>

                    {/* Botón Flotante */}
                    <div className="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent flex justify-center z-40">
                        <button onClick={handleLogFlight} disabled={!isPermitted}
                            className={`w-full max-w-md py-4 rounded-2xl font-black text-lg tracking-wide shadow-xl transition-all ${isPermitted ? 'bg-emerald-500 text-slate-950 shadow-emerald-500/20 hover:bg-emerald-400 hover:-translate-y-1' : 'bg-rose-950/50 text-rose-500 border border-rose-900 cursor-not-allowed'}`}>
                            {isPermitted ? '🚀 REGISTRAR DESPEGUE' : isRaining ? 'BLOQUEO (LLUVIA)' : 'BLOQUEO (CLIMA)'}
                        </button>
                    </div>

                    {/* Modales */}
                    {modal.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-slate-900 border border-slate-700 p-6 rounded-3xl w-full max-w-sm text-center">
                                <div className="text-4xl mb-3">{modal.type === 'error' ? '⚠️' : modal.type === 'success' ? '✅' : 'ℹ️'}</div>
                                <h3 className="text-xl font-black mb-2">{modal.title}</h3>
                                <p className="text-slate-400 text-sm mb-6">{modal.message}</p>
                                {modal.type !== 'info' && (
                                    <button onClick={() => setModal({...modal, isOpen: false})} className="w-full bg-slate-800 py-3 rounded-xl font-bold">Cerrar</button>
                                )}
                            </div>
                        </div>
                    )}

                    {manualLogOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-slate-900 border border-slate-700 p-6 rounded-3xl w-full max-w-sm">
                                <h3 className="text-lg font-black mb-4">Añadir Vuelo Anterior</h3>
                                <form onSubmit={handleManualLogSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Hora de Despegue (HH:MM)</label>
                                        <input type="time" name="timeStr" required className="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Viento Estimado (km/h)</label>
                                        <input type="number" name="windNum" defaultValue="0" min="0" max="100" className="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white" />
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setManualLogOpen(false)} className="flex-1 bg-slate-800 py-3 rounded-xl font-bold">Cancelar</button>
                                        <button type="submit" className="flex-1 bg-indigo-600 py-3 rounded-xl font-bold">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {settingsOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-slate-900 border border-slate-700 p-6 rounded-3xl w-full max-w-sm h-[80vh] overflow-y-auto">
                                <h3 className="text-lg font-black mb-4">Configuración Cloud</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Gemini API Key</label>
                                        <input type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm text-white font-mono" placeholder="AIzaSy..." />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Firebase Config (JSON)</label>
                                        <textarea value={firebaseConfigStr} onChange={(e) => setFirebaseConfigStr(e.target.value)} className="w-full h-32 bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs text-white font-mono" placeholder='{ "apiKey": "..." }' />
                                    </div>
                                    <button onClick={() => {
                                        localStorage.setItem('dispatcher_gemini_key', geminiKey);
                                        localStorage.setItem('dispatcher_firebase_config', firebaseConfigStr);
                                        window.location.reload();
                                    }} className="w-full bg-indigo-600 py-3 rounded-xl font-bold mt-4">Guardar y Reiniciar</button>
                                    <button onClick={() => setSettingsOpen(false)} className="w-full bg-slate-800 py-3 rounded-xl font-bold">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
