<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dispatcher Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050b14;
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Llave proporcionada
        const DEFAULT_KEYS = {
            gemini: "AQ.Ab8RN6KWJWZZY1CNMokGPUWlUo6yRrqr7EAHIRxZrtNEYWglxg",
        };

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [flights, setFlights] = useState([]);
            const [forecast, setForecast] = useState(Array(24).fill({ time: '00:00', windGust: 25, condition: 'Apto para volar' }));
            const [isScanning, setIsScanning] = useState(false);
            const [modal, setModal] = useState(null);
            
            // UI toggles
            const [showMasterPlan, setShowMasterPlan] = useState(false);
            const [showBreakdown, setShowBreakdown] = useState(false);
            
            // Estados para el sistema de seguridad de llaves
            const [showKeyWarning, setShowKeyWarning] = useState(false);
            const [tempNewKey, setTempNewKey] = useState("");
            const [activeGeminiKey, setActiveGeminiKey] = useState(DEFAULT_KEYS.gemini);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                
                // Recuperar datos guardados
                const savedData = localStorage.getItem('dispatcherDataV5');
                if(savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        if(parsed.flights) setFlights(parsed.flights);
                        if(parsed.forecast) setForecast(parsed.forecast);
                        if(parsed.geminiKey) setActiveGeminiKey(parsed.geminiKey);
                    } catch(e) {
                        console.error("Error cargando datos:", e);
                    }
                }
                
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                localStorage.setItem('dispatcherDataV5', JSON.stringify({ flights, forecast, geminiKey: activeGeminiKey }));
            }, [flights, forecast, activeGeminiKey]);

            // Variables de cálculo para turnos
            const currentHourInt = currentTime.getHours();
            const isDayShift = currentHourInt >= 7 && currentHourInt < 19;
            const activeShift = isDayShift ? "Turno Diurno" : "Turno Nocturno";
            const shiftTarget = isDayShift ? 8 : 5;
            
            const todayStr = currentTime.toDateString();
            const todayFlights = flights.filter(f => new Date(f.timestamp).toDateString() === todayStr);
            const shiftFlights = todayFlights.filter(f => f.shift === activeShift);
            
            const currentWindData = forecast[currentHourInt] || { windGust: 0 };
            const currentWind = currentWindData.windGust;
            const isOperable = currentWind < 45;

            const handleImageUpload = async (e) => {
                const eventTarget = e.target;
                const file = eventTarget.files[0];
                if (!file) return;

                setIsScanning(true);
                
                try {
                    // Convertir imagen a base64 limpio (sin prefijos)
                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const result = reader.result;
                            const base64String = result.includes(',') ? result.split(',')[1] : result;
                            resolve(base64String);
                        };
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });

                    // IMPORTANTE: Cambio a pro-latest para evitar error de "modelo no encontrado"
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${activeGeminiKey}`;
                    
                    const prompt = `
                    Eres un sistema experto analizando la app "Ok To Fly".
                    Hora actual de la captura: ${currentHourInt}:00. La primera fila (AHORA) es esta hora.
                    Reglas de Peligro: Si lees "Ráfagas >50m", "14 60m", "12 60m", "13 30m", "Ráfagas fuertes", "Extremo UV", "Vientos fuertes >30m, Ráfagas fuertes", "Vientos >40m", "Extremo UV 13", o celdas rojas/naranjas.
                    Seguro: "Apto para volar" o celdas azules.
                    Devuelve un objeto JSON estricto: { "forecast": [{"hour": 0, "windGust": 25}, ...] }
                    Para horas no visibles, pon windGust: 25.
                    `;

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: file.type || "image/png", data: base64Data } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const result = await response.json();
                    
                    if (!response.ok) {
                         if(result.error?.message?.includes("authentication") || result.error?.message?.includes("API key")) {
                             throw new Error("ERROR_LLAVE_INVALIDA");
                         }
                         throw new Error(result.error?.message || "Error de conexión");
                    }
                    
                    if (result.candidates && result.candidates[0]?.content?.parts[0]?.text) {
                        const jsonText = result.candidates[0].content.parts[0].text;
                        const jsonMatch = jsonText.match(/\{[\s\S]*\}/);
                        const cleanJsonText = jsonMatch ? jsonMatch[0] : jsonText.replace(/```json\n?|```/g, '').trim();
                        const parsedData = JSON.parse(cleanJsonText);
                        
                        let newForecast = [...forecast];
                        parsedData.forecast.forEach(item => {
                            if (item.hour >= 0 && item.hour <= 23) {
                                newForecast[item.hour] = {
                                    time: `${item.hour.toString().padStart(2, '0')}:00`,
                                    windGust: item.windGust,
                                    condition: item.windGust >= 45 ? "Ráfagas Peligrosas" : "Apto para volar"
                                };
                            }
                        });

                        setForecast(newForecast);
                        setModal({ isOpen: true, title: "Análisis Exitoso", message: "Clima actualizado correctamente por la IA.", type: "success" });
                    }
                } catch (err) {
                    if(err.message === "ERROR_LLAVE_INVALIDA") {
                         setShowKeyWarning(true);
                    } else {
                         setModal({ isOpen: true, title: "Error Visual IA", message: "Hubo un error procesando la imagen. Detalle: " + err.message, type: "error" });
                    }
                } finally {
                    setIsScanning(false);
                    eventTarget.value = ''; // Limpiar input para permitir reintento de la misma foto
                }
            };

            const handleLogFlight = (isPast = false) => {
                const now = new Date();
                const flightDate = isPast ? new Date(now.getTime() - 30*60000) : now;
                
                const flightTime = flightDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const newLog = {
                    id: Date.now(),
                    time: flightTime,
                    timestamp: flightDate.toISOString(),
                    shift: activeShift,
                    wind: currentWind
                };
                
                setFlights(prev => [newLog, ...prev].sort((a,b) => b.id - a.id));
                if(!isPast) {
                    setModal({ isOpen: true, title: "¡Despegue Registrado!", message: `Vuelo de las ${flightTime} registrado exitosamente.`, type: "success" });
                }
            };

            const saveNewKey = () => {
                if(tempNewKey.startsWith('AIza')) {
                    setActiveGeminiKey(tempNewKey);
                    setShowKeyWarning(false);
                    setModal({ isOpen: true, title: "Llave Actualizada", message: "Ahora puedes volver a intentar el escaneo.", type: "success" });
                } else {
                    alert("Por favor, asegúrate de que la llave empiece con las letras 'AIza'");
                }
            }

            return (
                <div className="min-h-screen bg-[#050b14] text-white p-3 font-sans pb-24">
                    <div className="max-w-md mx-auto space-y-4">
                        
                        {/* TARJETA 1: TURNO ACTIVO (Diseño Clásico Exacto) */}
                        <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-5 shadow-lg relative flex flex-col justify-between">
                            <div className="flex justify-between items-start mb-3">
                                <div>
                                    <span className="font-black tracking-wider text-[10px] text-[#3b82f6] uppercase">TURNO ACTIVO</span>
                                    <h2 className="text-2xl font-black text-slate-200">{activeShift}</h2>
                                </div>
                                <span className="font-mono font-bold bg-black/40 border border-[#1e293b] px-3 py-1.5 rounded-md text-xs text-slate-300">
                                    {currentTime.toLocaleTimeString('en-US', { hour12: false })}
                                </span>
                            </div>
                            
                            <div className="flex justify-between items-end mt-2">
                                <p className="text-xs text-slate-400 w-1/2">
                                    Meta del turno: <span className="text-white font-bold">{shiftTarget} vuelos</span> <br/>
                                    <span className="text-[10px]">(Incluye +3 heredados)</span>
                                </p>
                                
                                <label className={`flex items-center justify-center px-4 py-2.5 rounded-lg font-bold text-xs transition cursor-pointer border ${isScanning ? 'bg-indigo-900 border-indigo-500 text-indigo-300 pointer-events-none' : 'bg-[#4f46e5] hover:bg-[#4338ca] border-indigo-500 text-white shadow-[0_0_15px_rgba(79,70,229,0.2)]'}`}>
                                    <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" disabled={isScanning} />
                                    <span>{isScanning ? '⏳ Analizando...' : '📸 Escanear OK to Fly'}</span>
                                </label>
                            </div>
                        </div>

                        {}
                        {/* TARJETA 2: ESTADO DE VUELO (Verde/Rojo Clásico) */}
                        <div className={`rounded-2xl p-4 border flex items-center gap-3 transition-colors shadow-lg ${isOperable ? 'bg-[#064e3b] border-[#047857]' : 'bg-[#7f1d1d] border-[#b91c1c]'}`}>
                            <div className={`w-3.5 h-3.5 rounded-full animate-pulse ${isOperable ? 'bg-[#34d399]' : 'bg-red-400'}`}></div>
                            <div>
                                <div className={`font-black tracking-widest text-[10px] uppercase ${isOperable ? 'text-[#6ee7b7]' : 'text-red-300'}`}>
                                    ESTADO DE VUELO (120M):
                                </div>
                                <div className={`text-sm font-semibold mt-0.5 ${isOperable ? 'text-white' : 'text-red-100'}`}>
                                    {isOperable ? 'OPERABLE' : 'BLOQUEADO'} (Viento actual: {currentWind} km/h - {isOperable ? 'Permitido' : 'Peligro'})
                                </div>
                            </div>
                        </div>

                        {}
                        {/* TARJETA 3: CONTADOR CENTRAL GIGANTE */}
                        <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-6 flex flex-col items-center shadow-lg relative overflow-hidden">
                            <div className="text-slate-400 font-bold tracking-widest text-xs mb-2">VUELOS DEL TURNO</div>
                            <div className="text-7xl font-black mb-2 flex items-baseline">
                                <span className="text-white">{shiftFlights.length}</span>
                                <span className="text-slate-600 text-5xl mx-3">/</span>
                                <span className="text-[#3b82f6]">{shiftTarget}</span>
                            </div>
                            <div className="text-[10px] text-slate-500 font-semibold tracking-wide uppercase mb-6">66CW+8Q Parque Industrial Jis Park, Pue.</div>
                            
                            <div className="w-full h-px bg-[#1e293b] mb-4"></div>
                            
                            <div className="w-full flex justify-between items-center bg-[#050b14] p-3 rounded-xl border border-[#1e293b]">
                                <span className="font-black text-xs tracking-widest text-[#06b6d4] flex items-center gap-2">
                                    <span className="text-lg">📊</span> GLOBAL DEL DÍA
                                </span>
                                <span className="bg-[#06b6d4] text-black font-black px-3 py-1.5 rounded-md text-sm shadow-[0_0_10px_rgba(6,182,212,0.4)]">
                                    {todayFlights.length} VUELOS
                                </span>
                            </div>
                        </div>

                        {}
                        {/* TARJETA 4: BITÁCORA DE VUELOS */}
                        <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-4 shadow-lg">
                            <div className="flex justify-between items-center mb-4">
                                <div className="font-bold tracking-widest text-[11px] text-slate-300 flex items-center gap-2">
                                    <span>📖</span> BITÁCORA DE VUELOS
                                </div>
                                <button 
                                    onClick={() => handleLogFlight(true)}
                                    className="bg-[#6366f1] hover:bg-[#4f46e5] text-white text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 transition">
                                    + Añadir Pasado
                                </button>
                            </div>
                            
                            <div className="space-y-2">
                                {shiftFlights.length === 0 ? (
                                    <div className="bg-[#050b14] text-slate-500 text-xs text-center py-5 rounded-xl font-medium border border-[#1e293b]">
                                        Sin vuelos registrados en este turno.
                                    </div>
                                ) : (
                                    shiftFlights.map((f, i) => (
                                        <div key={i} className="flex justify-between items-center bg-[#050b14] p-3 rounded-xl border border-[#1e293b]">
                                            <div className="flex items-center gap-3">
                                                <div className="w-1.5 h-1.5 rounded-full bg-[#3b82f6]"></div>
                                                <span className="text-white font-bold text-sm">Despegue {f.time}</span>
                                            </div>
                                            <span className="text-xs font-bold text-slate-400 bg-slate-800/50 px-2 py-1 rounded">{f.wind} km/h</span>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {}
                        {/* BOTONES INFERIORES */}
                        <button 
                            onClick={() => setShowMasterPlan(true)}
                            className="w-full bg-[#0f172a] hover:bg-[#1e293b] text-slate-300 font-bold py-3.5 rounded-xl border border-[#1e293b] transition text-sm flex justify-center items-center gap-2 shadow-lg">
                            <span>🗓️</span> Ver Plan Maestro Diario (24h)
                        </button>

                        <button 
                            onClick={() => handleLogFlight(false)}
                            className="w-full bg-[#10b981] hover:bg-[#059669] text-black font-black py-5 rounded-2xl text-lg flex justify-center items-center gap-2 shadow-[0_0_20px_rgba(16,185,129,0.3)] transition transform active:scale-95 my-4">
                            ⚡ ¡VOLAR AHORA! (REGISTRAR)
                        </button>

                        <button 
                            onClick={() => setShowBreakdown(!showBreakdown)}
                            className="w-full bg-[#0f172a] text-slate-400 font-bold py-3 rounded-xl border border-[#1e293b] text-sm hover:text-white transition">
                            {showBreakdown ? '▲ Ocultar Desglose OK to Fly' : '▼ Ver Desglose OK to Fly'}
                        </button>

                        {}
                        {/* TABLA DE DESGLOSE EXPANDIBLE */}
                        {showBreakdown && (
                            <div className="bg-[#0f172a] border border-[#1e293b] rounded-xl p-3 animate-fade-in mt-2">
                                <div className="grid grid-cols-4 gap-2">
                                    {forecast.map((p, i) => (
                                        <div key={i} className={`p-2 rounded-lg text-center flex flex-col items-center justify-center border ${p.windGust < 45 ? 'bg-[#064e3b]/40 border-[#047857]' : 'bg-[#7f1d1d]/40 border-[#b91c1c]'}`}>
                                            <span className="text-white font-mono text-[10px] mb-1">{p.time}</span>
                                            <span className={`text-[10px] font-black ${p.windGust < 45 ? 'text-[#34d399]' : 'text-red-400'}`}>{p.windGust}k</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {}
                    {/* MODAL ESTÁNDAR */}
                    {modal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl">
                                <div className="text-4xl mb-4">{modal.type === 'error' ? '❌' : modal.type === 'warning' ? '⚠️' : '✅'}</div>
                                <h3 className="text-lg font-black text-white mb-2">{modal.title}</h3>
                                <p className="text-sm text-slate-400 mb-6">{modal.message}</p>
                                <button onClick={() => setModal(null)} className="w-full bg-[#3b82f6] hover:bg-[#2563eb] text-white font-bold py-3 rounded-xl transition">
                                    Entendido
                                </button>
                            </div>
                        </div>
                    )}
                    
                    {}
                    {/* ADVERTENCIA DE LLAVE INVÁLIDA (LA HERRAMIENTA SECRETA) */}
                    {showKeyWarning && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[60] p-4">
                            <div className="bg-[#4c0519] border border-[#e11d48] rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                                <h3 className="text-lg font-black text-[#fda4af] mb-2 flex items-center gap-2"><span>⚠️</span> GOOGLE RECHAZÓ LA LLAVE</h3>
                                <p className="text-sm text-rose-200 mb-4 font-medium leading-relaxed">
                                    La API Key de Google ha sido rechazada o requiere otra versión del modelo.
                                </p>
                                <div className="text-xs text-rose-300 mb-4 bg-black/40 p-3 rounded-lg border border-rose-900/50">
                                    <p className="mb-2">1. Ve a <b>aistudio.google.com/app/apikey</b></p>
                                    <p className="mb-2">2. Crea una llave de API nueva.</p>
                                    <p>3. Pégala aquí abajo (debe empezar con <b>AIza...</b>):</p>
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="AIzaSy..." 
                                    className="w-full bg-black/60 border border-[#e11d48] text-white p-3 rounded-xl mb-5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-rose-500"
                                    value={tempNewKey}
                                    onChange={(e) => setTempNewKey(e.target.value)}
                                />
                                <div className="flex gap-3">
                                     <button onClick={() => setShowKeyWarning(false)} className="flex-1 bg-black/40 hover:bg-black text-white font-bold py-3 rounded-xl transition text-sm">
                                        Cancelar
                                    </button>
                                    <button onClick={saveNewKey} className="flex-1 bg-[#e11d48] hover:bg-[#be123c] text-white font-bold py-3 rounded-xl transition text-sm shadow-[0_0_15px_rgba(225,29,72,0.4)]">
                                        Guardar y Reparar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    {/* PLAN MAESTRO 24H */}
                    {showMasterPlan && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
                            <div className="bg-[#0f172a] border border-[#1e293b] rounded-2xl p-6 max-w-md w-full h-[80vh] flex flex-col">
                                <div className="flex justify-between items-center mb-5">
                                    <h3 className="text-lg font-black text-white flex items-center gap-2"><span>🗓️</span> Plan Maestro 24h</h3>
                                    <button onClick={() => setShowMasterPlan(false)} className="text-slate-500 hover:text-white font-bold text-2xl">&times;</button>
                                </div>
                                <div className="overflow-y-auto flex-1 pr-2 space-y-2">
                                    {forecast.map((f, i) => (
                                        <div key={i} className="flex justify-between items-center p-3 rounded-xl bg-[#050b14] border border-[#1e293b]">
                                            <span className="font-mono font-bold text-slate-300">{f.time}</span>
                                            <span className={`text-[11px] font-black px-2.5 py-1 rounded-lg ${f.windGust < 45 ? 'bg-[#064e3b]/50 text-[#34d399]' : 'bg-[#7f1d1d]/50 text-red-400'}`}>
                                                {f.windGust} km/h - {f.condition}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
